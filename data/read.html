<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Knowledge Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0b0e14;--bg2:#11161e;--bg3:#18202a;--bg4:#1f2937;--bg5:#263340;
  --border:#1e2a3a;--border-light:#2a3a4e;
  --fg:#e3eaf0;--fg2:#94a3b8;--fg3:#64748b;
  --accent:#60a5fa;--accent-hover:#93c5fd;
  --green:#34d399;--green-bg:rgba(52,211,149,.08);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.08);
  --red:#f87171;--red-bg:rgba(248,113,113,.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.08);
  --pink:#f472b6;--orange:#fb923c;
  --code-fg:#e3eaf0;--code-bg:#0f1520;
  --radius:8px;--radius-sm:5px;
  --font-display:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono','Fira Code',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-lg:0 4px 16px rgba(0,0,0,.4);
  --font-size:15px;
  --toc-bg:var(--bg2);--overlay:rgba(0,0,0,.5);--search-result-bg:var(--bg3);--search-result-hover:var(--bg4);--search-result-border:var(--border);--search-result-fg:var(--fg2);--search-highlight:rgba(251,191,36,.25);
  --float-toc-bg:var(--bg3);--float-toc-border:var(--border);--float-toc-shadow:var(--shadow-lg);
}
[data-theme="light"]{
  --bg:#f8f9fa;--bg2:#ffffff;--bg3:#f1f3f5;--bg4:#e9ecef;--bg5:#dee2e6;
  --border:#e0e0e0;--border-light:#d0d0d0;
  --fg:#1a1a2e;--fg2:#495057;--fg3:#868e96;
  --accent:#2563eb;--accent-hover:#1d4ed8;
  --green:#059669;--green-bg:rgba(5,150,105,.08);
  --yellow:#d97706;--yellow-bg:rgba(217,119,6,.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,.08);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,.08);
  --pink:#db2777;--orange:#ea580c;
  --code-fg:#1a1a2e;--code-bg:#f1f3f5;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 4px 16px rgba(0,0,0,.1);
  --toc-bg:var(--bg2);--overlay:rgba(0,0,0,.2);--search-result-bg:#fff;--search-result-hover:var(--bg3);--search-result-border:var(--border);--search-result-fg:var(--fg2);--search-highlight:rgba(217,119,6,.15);
  --float-toc-bg:var(--bg2);--float-toc-border:var(--border);--float-toc-shadow:0 2px 12px rgba(0,0,0,.12);
}
body{
  font-family:var(--font-display);background:var(--bg);color:var(--fg);
  height:100vh;overflow:hidden;font-size:var(--font-size);line-height:1.7;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
.app{display:flex;height:100vh}

/* ─── Sidebar ─── */
.sidebar{
  width:280px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .25s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed{width:48px}
.sidebar-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 14px 12px;flex-shrink:0;gap:6px;
}
.sidebar-header h2{
  font-size:13px;font-weight:700;letter-spacing:.04em;
  color:var(--fg2);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;flex:1;
}
.sidebar-toolbar{display:flex;gap:4px}
.sidebar-btn{
  background:none;border:none;color:var(--fg3);cursor:pointer;
  padding:2px 6px;border-radius:var(--radius-sm);font-size:14px;
  line-height:1;transition:all .15s;flex-shrink:0;
}
.sidebar-btn:hover{background:var(--bg4);color:var(--fg)}
.sidebar-search{
  padding:0 10px 8px;flex-shrink:0;
}
.sidebar-search input{
  width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--fg);font-size:12.5px;outline:none;
  transition:border-color .15s;font-family:var(--font-display);
}
.sidebar-search input::placeholder{color:var(--fg3)}
.sidebar-search input:focus{border-color:var(--accent);background:var(--bg4)}
.search-status{
  padding:3px 14px 5px;font-size:11px;color:var(--fg3);
  border-bottom:1px solid var(--border);flex-shrink:0;display:none;
}
.recent-label{
  padding:4px 12px 3px;font-size:9px;font-weight:600;text-transform:uppercase;
  letter-spacing:.04em;color:var(--fg3);cursor:pointer;user-select:none;
  display:flex;align-items:center;gap:4px;
}
.recent-label:hover{color:var(--fg)}
.recent-label .arrow{font-size:7px;transition:transform .15s}
.recent-label.open .arrow{transform:rotate(90deg)}
.recent-list{
  padding:0 8px 4px;border-bottom:1px solid var(--border);display:none;
}
.recent-list.show{display:block}
.recent-item{
  padding:3px 8px;font-size:10.5px;color:var(--fg2);cursor:pointer;
  border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  transition:all .1s;
}
.recent-item:hover{background:var(--bg4);color:var(--fg)}
.tree-scroll{flex:1;overflow-y:auto;padding:6px 0}
.tree-item{
  display:flex;align-items:center;padding:4px 10px;cursor:pointer;
  gap:6px;font-size:12.5px;user-select:none;white-space:nowrap;
  transition:background .1s;border-left:2px solid transparent;
}
.tree-item:hover{background:var(--bg3)}
.tree-item.active{background:var(--accent);color:#000;font-weight:600;border-left-color:#fff}
.tree-item .icon{flex-shrink:0;font-size:12px;width:18px;text-align:center;opacity:.7}
.tree-item.active .icon{opacity:1}
.tree-item.file{padding-left:22px}
.tree-item.hidden{display:none}
.tree-item .hl{background:var(--yellow);color:#000;padding:0 2px;border-radius:2px;font-weight:600}
.tree-item .bookmark-icon{font-size:10px;margin-left:auto;opacity:0;transition:opacity .12s}
.tree-item:hover .bookmark-icon{opacity:.5}
.tree-item.bookmarked .bookmark-icon{opacity:1;color:var(--yellow)}
.tree-toggle{
  cursor:pointer;color:var(--fg3);font-size:9px;width:14px;
  text-align:center;flex-shrink:0;transition:transform .15s;
}
.tree-toggle.open{transform:rotate(90deg)}
.tree-children{padding-left:14px;display:none}
.tree-children.open{display:block}

/* ─── Content Header ─── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
.scroll-progress{
  position:absolute;top:0;left:0;right:0;height:2px;z-index:20;
  background:var(--border);pointer-events:none;
}
.scroll-progress .fill{
  height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--purple));
  transition:width .1s linear;border-radius:0 1px 1px 0;
}
.content-header{
  padding:12px 28px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--bg2);position:relative;z-index:10;
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
  flex-wrap:wrap;
}
.header-left{flex:1;min-width:0}
.header-right{display:flex;gap:12px;flex-wrap:wrap}

/* ─── Domain badge ─── */
.domain-row{
  display:flex;align-items:center;gap:8px;margin-bottom:6px;
}
.domain-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;padding:2px 9px;border-radius:4px;
  background:var(--bg3);color:var(--fg2);border:1px solid var(--border);
  white-space:nowrap;
}
.domain-badge .dot{
  width:6px;height:6px;border-radius:50%;display:inline-block;
}

/* ─── Breadcrumb ─── */
.breadcrumb{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  font-size:11px;color:var(--fg3);font-family:var(--font-mono);
}
.breadcrumb .seg{
  color:var(--fg3);cursor:pointer;padding:1px 4px;border-radius:3px;
  transition:all .12s;text-decoration:none;
}
.breadcrumb .seg:hover{color:var(--accent);background:var(--bg4)}
.breadcrumb .sep{color:var(--border-light);font-size:9px;font-weight:700}

/* ─── Title ─── */
.title-row{
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  margin-top:2px;flex-wrap:wrap;width:100%;
}
.title-area{min-width:0;flex:1}
.title-area h1{
  font-size:20px;font-weight:800;letter-spacing:-.02em;line-height:1.3;
  color:var(--fg);
}
.title-area .subtitle{
  font-size:12px;color:var(--fg3);margin-top:2px;
}

/* ─── File Stats ─── */
.file-stats{
  display:flex;gap:8px;flex-shrink:0;align-items:center;flex-wrap:wrap;
}
.file-stats .stat{
  display:flex;align-items:center;gap:4px;
  font-size:10.5px;color:var(--fg3);font-weight:500;
  padding:3px 8px;background:var(--bg3);border-radius:4px;
  border:1px solid var(--border);white-space:nowrap;
}

/* ─── Controls ─── */
.header-controls{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.control-btn{
  padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg3);color:var(--fg2);cursor:pointer;font-size:11px;
  font-family:var(--font-display);transition:all .12s;
}
.control-btn:hover{border-color:var(--border-light);background:var(--bg4);color:var(--fg)}
.control-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}

/* ─── Layer Toggles ─── */
.toggles-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  margin-top:8px;padding-top:8px;border-top:1px solid var(--border);
  flex-wrap:wrap;width:100%;
}
.toggles-label{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em;color:var(--fg3);white-space:nowrap;
}
.layer-toggles{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.layer-btn{
  padding:4px 12px;border:1px solid var(--border);border-radius:20px;
  background:var(--bg3);color:var(--fg3);cursor:pointer;font-size:10px;
  font-weight:600;letter-spacing:.03em;text-transform:uppercase;
  transition:all .18s cubic-bezier(.4,0,.2,1);font-family:var(--font-display);
}
.layer-btn:hover{border-color:var(--border-light);color:var(--fg2);background:var(--bg4)}
.layer-btn.on{color:#000;font-weight:700;border-color:transparent}
.layer-btn.l1.on{background:#4a8bc2}
.layer-btn.l2.on{background:var(--green)}
.layer-btn.l3.on{background:var(--purple)}
.layer-btn.l4.on{background:var(--orange)}
.layer-btn.l5.on{background:var(--pink)}

/* ─── Content Body ─── */
.content-body{
  flex:1;overflow-y:auto;padding:28px 32px 80px;
  max-width:900px;width:100%;margin:0 auto;
}
@media(max-width:1100px){.content-body{padding:20px 24px 60px}}

/* ─── Start Screen ─── */
.start-screen{
  display:flex;flex-direction:column;height:100%;padding:40px;overflow-y:auto;
}
.start-screen-header{
  text-align:center;margin-bottom:40px;flex-shrink:0;
}
.start-screen-header .big-icon{font-size:56px;margin-bottom:8px}
.start-screen-header h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.start-screen-header p{color:var(--fg2);font-size:14px;line-height:1.6}
.topics-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex:1;
}
.topic-box{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 20px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);cursor:pointer;transition:all .2s;
  text-decoration:none;color:var(--fg);min-height:160px;
}
.topic-box:hover{background:var(--bg4);border-color:var(--accent);transform:translateY(-4px)}
.topic-box .icon{font-size:40px;margin-bottom:12px}
.topic-box .name{font-weight:600;font-size:14px;text-align:center}
@media(max-width:1100px){.topics-grid{grid-template-columns:repeat(2,1fr);gap:16px}}
@media(max-width:700px){.topics-grid{grid-template-columns:1fr;gap:12px}}

/* ═══ MARKDOWN STYLING ═══ */
.md{font-size:var(--font-size);line-height:1.75;color:var(--fg)}
.md h1{
  font-size:28px;font-weight:800;margin:32px 0 12px;letter-spacing:-.025em;
  padding-bottom:10px;border-bottom:2px solid var(--border);
  position:relative;
}
.md h1::after{
  content:'';position:absolute;bottom:-2px;left:0;width:80px;
  height:2px;background:linear-gradient(90deg,var(--accent),transparent);
  border-radius:1px;
}
.md h2{
  font-size:20px;font-weight:700;margin:28px 0 10px;letter-spacing:-.015em;
  color:var(--fg);
}
.md h3{
  font-size:17px;font-weight:600;margin:22px 0 8px;color:var(--fg);
}
.md h4{
  font-size:14px;font-weight:600;margin:16px 0 6px;color:var(--fg2);
  text-transform:uppercase;letter-spacing:.04em;
}
.md h5{font-size:13px;font-weight:600;margin:12px 0 4px;color:var(--fg2)}
.md h6{font-size:12px;font-weight:600;margin:10px 0 4px;color:var(--fg3);text-transform:uppercase;letter-spacing:.05em}
.md p{margin:9px 0;color:var(--fg)}
.md ul,.md ol{margin:8px 0;padding-left:24px}
.md li{margin:4px 0;line-height:1.7}
.md li::marker{color:var(--fg3)}
.md strong{color:#fff;font-weight:600}
.md em{color:var(--fg2);font-style:italic}
.md a{
  color:var(--accent);text-decoration:none;cursor:pointer;
  transition:color .12s;font-weight:500;
}
.md a:hover{color:var(--accent-hover);text-decoration:underline}
.md code{
  font-family:var(--font-mono);background:var(--code-bg);padding:2px 7px;
  border-radius:4px;font-size:13px;color:var(--green);
  border:1px solid rgba(52,211,149,.12);
}
.md pre{
  background:var(--code-bg);padding:16px;border-radius:var(--radius);
  overflow-x:auto;margin:14px 0;border:1px solid var(--border);
  position:relative;
}
.md pre::before{
  content:attr(data-lang);position:absolute;top:8px;right:12px;
  font-size:10px;font-family:var(--font-mono);font-weight:600;
  color:var(--fg3);text-transform:uppercase;letter-spacing:.05em;
}
.md pre code{
  background:none;padding:0;font-size:13px;line-height:1.65;
  color:var(--code-fg);font-family:var(--font-mono);
  border:none;
}
.md pre .copy-btn{
  position:absolute;top:6px;right:6px;background:var(--bg4);
  border:1px solid var(--border);color:var(--fg3);padding:3px 8px;
  border-radius:4px;cursor:pointer;font-size:10px;font-family:var(--font-display);
  opacity:0;transition:opacity .2s;
}
.md pre .copy-btn:hover{background:var(--bg5);color:var(--fg);border-color:var(--border-light)}
.md pre:hover .copy-btn{opacity:1}
.md blockquote{
  border-left:3px solid var(--accent);padding:10px 18px;margin:14px 0;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent) 3px,var(--bg3) 3px);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
}
.md blockquote p{color:var(--fg2);margin:5px 0;font-size:14px;}
.md blockquote p:first-child{margin-top:0}
.md blockquote p:last-child{margin-bottom:0}
.md table{
  border-collapse:separate;border-spacing:0;width:100%;
  margin:14px 0;border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;font-size:13px;
}
.md thead{position:sticky;top:0}
.md th{
  background:var(--bg4);font-weight:600;text-transform:uppercase;
  letter-spacing:.03em;font-size:11px;color:var(--fg2);padding:10px 14px;
  text-align:left;border-bottom:1px solid var(--border);
}
.md td{
  padding:9px 14px;border-bottom:1px solid var(--border);color:var(--fg);
  vertical-align:top;
}
.md tr:last-child td{border-bottom:none}
.md tr:nth-child(even) td{background:var(--bg2)}
.md hr{
  border:none;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);
  margin:28px 0;
}
.md .diagram-container{
  position:relative;margin:20px 0;
}
.md .diagram-controls{
  display:flex;gap:4px;position:absolute;top:8px;right:8px;z-index:10;
}
.md .diagram-btn{
  padding:4px 8px;background:var(--bg4);border:1px solid var(--border);
  border-radius:4px;color:var(--fg3);cursor:pointer;font-size:11px;
  transition:all .12s;
}
.md .diagram-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.md .mermaid-wrap{
  display:flex;justify-content:center;margin:0;
  padding:20px;background:var(--bg3);border-radius:var(--radius);
  border:1px solid var(--border);overflow:auto;
  transition:opacity .4s,transform .3s;
  box-shadow:var(--shadow);
  position:relative;
}
.diagram-fullscreen{
  position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;opacity:0;pointer-events:none;transition:opacity .2s;
}
.diagram-fullscreen.open{opacity:1;pointer-events:auto}
.diagram-fullscreen .close-btn{
  position:absolute;top:20px;right:30px;background:none;border:none;
  color:#fff;font-size:32px;cursor:pointer;opacity:.7;transition:opacity .15s;
}
.diagram-fullscreen .close-btn:hover{opacity:1}
.diagram-fullscreen .fs-content{
  max-width:90vw;max-height:90vh;overflow:auto;display:flex;
  align-items:center;justify-content:center;
}
.diagram-fullscreen .mermaid{transform:scale(1)!important}
.md .mermaid-wrap.animate-in{animation:fadeSlide .5s ease-out}
@keyframes fadeSlide{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
.md img{
  max-width:100%;border-radius:var(--radius);
  border:1px solid var(--border);margin:14px 0;cursor:zoom-in;
}
.md .layer-section{transition:opacity .3s,max-height .35s cubic-bezier(.4,0,.2,1);overflow:hidden}
.md .layer-section.hidden-l{opacity:0;max-height:0;margin:0;padding:0}
.md .layer-label{
  display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;
  border-radius:4px;margin-right:10px;text-transform:uppercase;
  letter-spacing:.04em;vertical-align:middle;
}
.md .layer-label.l1{background:#4a8bc2;color:#fff}
.md .layer-label.l2{background:var(--green);color:#000}
.md .layer-label.l3{background:var(--purple);color:#fff}
.md .layer-label.l4{background:var(--orange);color:#000}
.md .layer-label.l5{background:var(--pink);color:#000}
.md .anchor-link{
  opacity:0;margin-left:6px;font-size:14px;color:var(--fg3);
  text-decoration:none!important;transition:opacity .12s;font-weight:400;
}
.md h1:hover .anchor-link,.md h2:hover .anchor-link,.md h3:hover .anchor-link,
.md h4:hover .anchor-link,.md h5:hover .anchor-link,.md h6:hover .anchor-link{opacity:1}
.md .anchor-link:hover{color:var(--accent)!important}

/* ─── TOC Sidebar ─── */
.toc-sidebar{
  width:210px;background:var(--bg2);border-left:1px solid var(--border);
  padding:12px 0;overflow-y:auto;flex-shrink:0;display:none;
}
.toc-sidebar.show{display:block}
.toc-item{
  padding:4px 16px;font-size:12px;color:var(--fg3);cursor:pointer;
  border-left:2px solid transparent;transition:all .12s;
  line-height:1.4;font-family:var(--font-display);
}
.toc-item:hover{color:var(--fg)}
.toc-item.active{color:var(--accent);border-left-color:var(--accent)}
.toc-item.h2{padding-left:16px}
.toc-item.h3{padding-left:26px;font-size:11px;color:var(--fg3)}

/* ─── Floating TOC ─── */
.float-toc{
  position:fixed;right:20px;top:100px;z-index:50;
  background:var(--float-toc-bg);border:1px solid var(--float-toc-border);
  border-radius:var(--radius);padding:8px 0;min-width:180px;max-width:220px;
  box-shadow:var(--float-toc-shadow);max-height:60vh;overflow-y:auto;
  opacity:0;transform:translateY(-8px);pointer-events:none;
  transition:opacity .2s,transform .2s;font-family:var(--font-display);
}
.float-toc.show{opacity:1;transform:translateY(0);pointer-events:auto}
.float-toc-label{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--fg3);padding:4px 14px 6px;border-bottom:1px solid var(--border);
}
.float-toc-item{
  display:block;padding:4px 14px;font-size:11.5px;color:var(--fg3);
  cursor:pointer;border-left:2px solid transparent;transition:all .1s;
  text-decoration:none;line-height:1.35;
}
.float-toc-item:hover{color:var(--fg);background:var(--bg4)}
.float-toc-item.active{color:var(--accent);border-left-color:var(--accent);font-weight:600}
.float-toc-item.h3{padding-left:22px;font-size:11px}

/* ─── In-Page Search ─── */
.inpage-search{
  position:sticky;top:0;z-index:15;background:var(--bg2);
  border-bottom:1px solid var(--border);padding:8px 16px;
  display:none;align-items:center;gap:8px;flex-shrink:0;
}
.inpage-search.show{display:flex}
.inpage-search input{
  flex:1;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);
  border-radius:5px;color:var(--fg);font-size:13px;outline:none;font-family:var(--font-display);
}
.inpage-search input:focus{border-color:var(--accent)}
.inpage-search .match-count{font-size:11px;color:var(--fg3);white-space:nowrap}
.inpage-search .nav-btn{
  background:var(--bg3);border:1px solid var(--border);color:var(--fg2);
  border-radius:4px;cursor:pointer;padding:4px 8px;font-size:12px;transition:all .1s;
}
.inpage-search .nav-btn:hover{background:var(--bg4);color:var(--fg)}
.inpage-search .close-ips{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:18px;padding:0 4px}

/* ─── Full-Text Search Results ─── */
.search-overlay{
  position:fixed;inset:0;z-index:200;background:var(--overlay);
  display:none;align-items:flex-start;justify-content:center;
  padding-top:60px;opacity:0;transition:opacity .2s;
}
.search-overlay.open{display:flex;opacity:1}
.search-panel{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  width:min(700px,90vw);max-height:70vh;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.3);display:flex;flex-direction:column;
}
.search-panel-header{
  display:flex;align-items:center;gap:8px;padding:12px 16px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.search-panel-header input{
  flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--fg);font-size:14px;outline:none;font-family:var(--font-display);
}
.search-panel-header input:focus{border-color:var(--accent)}
.search-panel-header .close-so{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:22px;padding:0 6px}
.search-panel-body{overflow-y:auto;flex:1;padding:8px 0}
.search-result-item{
  padding:10px 16px;cursor:pointer;transition:background .1s;
  border-bottom:1px solid var(--search-result-border);
}
.search-result-item:hover{background:var(--search-result-hover)}
.search-result-item .path{font-size:10.5px;color:var(--fg3);font-family:var(--font-mono);margin-bottom:2px}
.search-result-item .title{font-size:13px;font-weight:600;color:var(--fg)}
.search-result-item .snippet{font-size:12px;color:var(--search-result-fg);margin-top:2px;line-height:1.4}
.search-result-item .snippet em{font-style:normal;background:var(--search-highlight);padding:0 2px;border-radius:2px;font-weight:600}
.search-result-item .match-line{font-size:10.5px;color:var(--fg3);margin-top:2px}
.search-status-text{padding:16px;text-align:center;color:var(--fg3);font-size:13px}

/* ─── Page Transition ─── */
.page-transition{
  position:fixed;inset:0;z-index:300;pointer-events:none;
  background:var(--bg);opacity:0;transition:opacity .25s;
}
.page-transition.active{opacity:1}
.content-body.loading{opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s}
.content-body.loaded{opacity:1;transform:translateY(0)}

/* ─── Auto-Hide Sidebar ─── */
@media(max-width:900px){
  .sidebar{transition:transform .25s cubic-bezier(.4,0,.2,1),width .25s}
  .sidebar.hide-mobile{transform:translateX(-100%)}
  .sidebar.hide-mobile.collapsed{width:0;transform:none}
}

/* ─── Lightbox ─── */
.lightbox{
  position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;
  cursor:zoom-out;opacity:0;transition:opacity .2s;pointer-events:none;
}
.lightbox.open{opacity:1;pointer-events:auto}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);transform:scale(.95);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.lightbox.open img{transform:scale(1)}
.lightbox .lb-close{
  position:absolute;top:20px;right:28px;color:#fff;font-size:28px;
  cursor:pointer;opacity:.7;transition:opacity .15s;background:none;border:none;
}
.lightbox .lb-close:hover{opacity:1}

/* ─── Floating Controls ─── */
.floating-controls{
  position:fixed;bottom:24px;right:24px;z-index:100;
  display:flex;flex-direction:column;gap:8px;align-items:flex-end;
}
.floating-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--bg4);border:1px solid var(--border);
  color:var(--fg2);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(12px);
  transition:all .2s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--shadow);
}
.floating-btn.show{opacity:1;transform:translateY(0)}
.floating-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);transform:translateY(-2px)}

/* ─── Keyboard Panel ─── */
.kb-panel{
  position:fixed;bottom:72px;right:24px;z-index:100;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;min-width:240px;box-shadow:var(--shadow-lg);
  opacity:0;transform:translateY(8px);transition:all .15s;pointer-events:none;
}
.kb-panel.open{opacity:1;transform:translateY(0);pointer-events:auto}
.kb-panel h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--fg3);margin-bottom:10px}
.kb-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px;gap:16px}
.kb-row .key{font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 6px;background:var(--bg4);border:1px solid var(--border);border-radius:3px;color:var(--fg2);white-space:nowrap}
.kb-row .desc{color:var(--fg2)}

/* ─── Scrollbar & General ─── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-light)}
.content-body{scroll-behavior:smooth}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

@media(max-width:900px){
  .sidebar{width:220px}
  .toc-sidebar{display:none!important}
  .content-body{padding:16px 18px 50px}
  .content-header{padding:12px 18px;flex-direction:column}
  .title-area h1{font-size:17px}
  .file-stats .stat{font-size:9px;padding:2px 6px}
  .toggles-row{flex-wrap:wrap;gap:6px}
}

@media(max-width:640px){
  .sidebar{width:100%;position:fixed;z-index:10;height:100vh}
  .sidebar.collapsed{width:0;border:none}
  .content-body{padding:14px 14px 40px}
}
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Explorer</h2>
      <div class="sidebar-toolbar">
        <button class="sidebar-btn" id="homeBtn" data-action="home" title="Home">🏠</button>
        <button class="sidebar-btn" id="bookmarkToggle" title="Bookmarks">⭐</button>
        <button class="sidebar-btn" id="collapseSidebar" title="Toggle sidebar">◀</button>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Search files..." autocomplete="off">
    </div>
    <div class="search-status" id="searchStatus"></div>
    <div class="recent-label" id="recentToggle"><span class="arrow">▶</span> Recent</div>
    <div class="recent-list" id="recentList"></div>
    <div class="tree-scroll" id="tree"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="scroll-progress" id="scrollProgress"><div class="fill" id="scrollFill"></div></div>
    <div class="content-header">
      <div class="header-left">
        <div class="domain-row" id="domainRow" style="display:none">
          <span class="domain-badge" id="domainBadge"><span class="dot"></span><span id="domainName"></span></span>
        </div>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="title-row">
          <div class="title-area">
            <h1 id="fileTitle"></h1>
            <div class="subtitle" id="fileSubtitle"></div>
          </div>
        </div>
      </div>
      <div class="header-right">
        <div class="file-stats" id="fileStats" style="display:none">
          <span class="stat">📝 <span id="wordCount">0</span> words</span>
          <span class="stat">⏱ <span id="readingTime">0</span> min</span>
          <span class="stat">📑 <span id="sectionCount">0</span> sections</span>
        </div>
        <div class="header-controls">
          <button class="control-btn" id="zoomOut" title="Decrease font size">A−</button>
          <button class="control-btn" id="zoomReset" title="Reset font size">A</button>
          <button class="control-btn" id="zoomIn" title="Increase font size">A+</button>
          <button class="control-btn" id="themeBtn" title="Toggle theme">🌓</button>
          <button class="control-btn" id="ftsBtn" title="Search all files">🔍</button>
          <button class="control-btn" id="fullscreenBtn" title="Fullscreen reading">⛶</button>
        </div>
      </div>
    </div>
    <div class="toggles-row" id="togglesRow" style="display:none;padding:8px 28px;border-bottom:1px solid var(--border)">
      <span class="toggles-label">Focus:</span>
      <div class="layer-toggles" id="layerToggles">
        <button class="layer-btn l1 on" data-layer="1"><span>L1 · Beginner</span></button>
        <button class="layer-btn l2 on" data-layer="2"><span>L2 · Intermediate</span></button>
        <button class="layer-btn l3 on" data-layer="3"><span>L3 · Advanced</span></button>
        <button class="layer-btn l4 on" data-layer="4"><span>L4 · Production</span></button>
        <button class="layer-btn l5 on" data-layer="5"><span>L5 · Staff</span></button>
      </div>
    </div>
    <div id="start" class="start-screen">
      <div class="start-screen-header">
        <div class="big-icon">📚</div>
        <h1>Engineering Knowledge Universe</h1>
        <p>Explore topics in depth</p>
      </div>
      <div class="topics-grid" id="topicsGrid"></div>
    </div>
    <div id="fileView" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
      <div class="inpage-search" id="inpageSearch">
        <input type="text" id="inpageSearchInput" placeholder="Find in page..." autocomplete="off">
        <span class="match-count" id="inpageMatchCount"></span>
        <button class="nav-btn" id="inpagePrev">▲</button>
        <button class="nav-btn" id="inpageNext">▼</button>
        <button class="close-ips" id="inpageClose">✕</button>
      </div>
      <div class="content-body md" id="fileContent"></div>
    </div>
  </div>

  <div class="toc-sidebar" id="tocSidebar"></div>
  <div class="lightbox" id="lightbox">
    <button class="lb-close" data-action="closeLightbox">✕</button>
    <img id="lightboxImg" src="" alt="">
  </div>
  <div class="diagram-fullscreen" id="diagramFullscreen">
    <button class="close-btn" data-action="closeDiagramFullscreen">✕</button>
    <div class="fs-content" id="fsContent"></div>
  </div>
  <div class="floating-controls">
    <button class="floating-btn" id="backTopBtn" title="Back to top">↑</button>
    <button class="floating-btn" id="kbToggle" title="Keyboard shortcuts">⌘</button>
  </div>
  <div class="float-toc" id="floatToc"><div class="float-toc-label">On this page</div></div>
  <div class="search-overlay" id="searchOverlay">
    <div class="search-panel">
      <div class="search-panel-header">
        <input type="text" id="ftsInput" placeholder="Search all files..." autocomplete="off">
        <button class="close-so" id="ftsClose">✕</button>
      </div>
      <div class="search-panel-body" id="ftsResults"></div>
    </div>
  </div>
  <div class="page-transition" id="pageTransition"></div>
  <div class="kb-panel" id="kbPanel">
    <h3>Keyboard Shortcuts</h3>
    <div class="kb-row"><span class="desc">Search files</span><span class="key">⌘K</span></div>
    <div class="kb-row"><span class="desc">Find in page</span><span class="key">⌘F</span></div>
    <div class="kb-row"><span class="desc">Sidebar</span><span class="key">⌘B</span></div>
    <div class="kb-row"><span class="desc">Theme toggle</span><span class="key">⌘T</span></div>
    <div class="kb-row"><span class="desc">Top</span><span class="key">⌘↑</span></div>
    <div class="kb-row"><span class="desc">Zoom −</span><span class="key">⌘−</span></div>
    <div class="kb-row"><span class="desc">Zoom +</span><span class="key">⌘+</span></div>
    <div class="kb-row"><span class="desc">Fullscreen</span><span class="key">⌘F</span></div>
    <div class="kb-row"><span class="desc">Layers 1−5</span><span class="key">1−5</span></div>
  </div>
</div>

<script>
const CONFIG = {
  api: '/api',
  debounceMs: 80,
  searchHighlightMs: 2000,
  scrollProgressThreshold: 300,
  treeDepthPx: 12,
  zoomStep: 0.1,
  zoomMin: 0.8,
  zoomMax: 1.5,
};

const STATE = {
  treeData: [],
  flatFiles: [],
  currentContent: '',
  currentPath: '',
  tocItems: [],
  searchTimeout: null,
  zoomLevel: 1.0,
  activeLayers: new Set(['1', '2', '3', '4', '5']),
  bookmarks: new Set(),
  recentFiles: [],
  isFullscreen: false,
};

const DOMAIN_ICONS = {
  'ai-ml':'🤖','backend':'⚙️','cloud':'☁️','kubernetes':'☸️','databases':'🗄️',
  'messaging':'📨','sre-observability':'📊','microservices':'🔗','software-architecture':'🏗️',
  'interviews':'💼','production-stories':'🚨','software-engineering':'📐','foundations':'📐',
  'frontend':'🎨','devops':'🔄','networking':'🌐','operating-systems':'⚡',
  'security':'🔒','system-design':'📋','performance-engineering':'⚡','testing':'🧪',
  'cheat-sheets':'📎','arch':'🏛️','data-engineering':'📊',
  'projects':'📦'
};

// ─── Initialization ───
document.addEventListener('DOMContentLoaded', init);

async function init() {
  loadPersistentState();
  attachEventDelegation();
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      background: '#18202a',
      primaryColor: '#60a5fa',
      primaryBorderColor: '#1e2a3a',
      primaryTextColor: '#e3eaf0',
      lineColor: '#94a3b8',
      tertiaryColor: '#11161e',
      fontSize: '14px',
      fontFamily: 'Inter,system-ui,sans-serif'
    }
  });
  await loadTree();
  renderTree();
  renderTopics();
  renderRecentFiles();
  attachTreeEvents();
  attachNavigationEvents();
}

function attachNavigationEvents() {
  // Handle browser back/forward
  window.addEventListener('popstate', (e) => {
    if (e.state && e.state.path) {
      loadFile(e.state.path);
    } else {
      goHome();
    }
  });

  // Handle hash changes
  window.addEventListener('hashchange', () => {
    const hash = window.location.hash.replace(/^#/, '');
    if (hash) {
      navigateTo(hash);
    }
  });
}

// ─── State Persistence ───
function loadPersistentState() {
  const stored = localStorage.getItem('kb-state');
  if (stored) {
    try {
      const data = JSON.parse(stored);
      STATE.bookmarks = new Set(data.bookmarks || []);
      STATE.recentFiles = data.recentFiles || [];
      STATE.zoomLevel = data.zoomLevel || 1.0;
      STATE.activeLayers = new Set(data.activeLayers || ['1', '2', '3', '4', '5']);
    } catch (e) {
      console.error('Failed to load state:', e);
    }
  }
}

function savePersistentState() {
  const data = {
    bookmarks: Array.from(STATE.bookmarks),
    recentFiles: STATE.recentFiles.slice(0, 10),
    zoomLevel: STATE.zoomLevel,
    activeLayers: Array.from(STATE.activeLayers),
  };
  localStorage.setItem('kb-state', JSON.stringify(data));
}

// ─── Event Delegation ───
function attachEventDelegation() {
  document.addEventListener('click', (e) => {
    const action = e.target.closest('[data-action]')?.dataset.action;
    if (!action) return;

    const actionMap = {
      'closeLightbox': () => closeLightbox(),
      'toggleBookmark': (el) => toggleBookmark(el.dataset.path),
      'zoomOut': () => changeZoom(-CONFIG.zoomStep),
      'zoomIn': () => changeZoom(CONFIG.zoomStep),
      'zoomReset': () => changeZoom(0),
      'fullscreen': () => toggleFullscreen(),
      'diagramZoomOut': (el) => zoomDiagram(el.dataset.diagram, -0.2),
      'diagramZoomIn': (el) => zoomDiagram(el.dataset.diagram, 0.2),
      'diagramZoomReset': (el) => resetDiagramZoom(el.dataset.diagram),
      'diagramFullscreen': (el) => openDiagramFullscreen(el.dataset.diagram),
      'closeDiagramFullscreen': () => closeDiagramFullscreen(),
      'home': () => goHome(),
    };

    if (action in actionMap) {
      actionMap[action](e.target.closest('[data-action]'));
    }
  });

  document.addEventListener('keydown', (e) => {
    const meta = e.metaKey || e.ctrlKey;
    if (meta && e.key === 'b') { e.preventDefault(); toggleSidebar(); }
    if (meta && e.key === 'ArrowUp') { e.preventDefault(); scrollContentToTop(); }
    if (meta && e.key === '-') { e.preventDefault(); changeZoom(-CONFIG.zoomStep); }
    if (meta && e.key === '+' || meta && e.key === '=') { e.preventDefault(); changeZoom(CONFIG.zoomStep); }
    if (meta && e.key === 'f') { e.preventDefault(); toggleFullscreen(); }
    if (e.key === 'Escape') { closeLightbox(); closeKeyboardPanel(); }
    if (e.key >= '1' && e.key <= '5') { toggleLayer(e.key); }
  });
}

// ─── Tree Loading & Rendering ───
async function loadTree() {
  try {
    const r = await fetch(CONFIG.api + '/tree');
    const d = await r.json();
    STATE.treeData = d.tree || [];
    window.__fileTree = STATE.treeData;
    flattenFiles(STATE.treeData);
    // After tree loaded, handle initial hash routing
    handleHashNavigation();
  } catch (e) {
    console.error('Failed to load tree:', e);
    document.getElementById('tree').innerHTML = '<div style="padding:14px;color:var(--fg3)">Failed to load</div>';
  }
}

function handleHashNavigation() {
  const hash = window.location.hash.replace(/^#/, '');
  if (hash) {
    navigateTo(hash);
  } else {
    const lastFile = localStorage.getItem('lastViewedFile');
    if (lastFile) {
      navigateTo(lastFile);
    }
  }
}

function flattenFiles(nodes, prefix = '') {
  for (const n of nodes) {
    const p = prefix ? prefix + '/' + n.name : n.name;
    if (n.type === 'dir') {
      flattenFiles(n.children || [], p);
    } else {
      STATE.flatFiles.push({ path: p, name: n.name });
    }
  }
  window.__flatFiles = STATE.flatFiles;
}

function renderTree() {
  const html = buildTreeHtml(STATE.treeData);
  document.getElementById('tree').innerHTML = html;
}

function buildTreeHtml(nodes, depth = 0) {
  let h = '';
  for (const n of nodes) {
    if (n.type === 'dir') {
      const icon = DOMAIN_ICONS[n.name] || '📁';
      h += `<div class="tree-item" style="padding-left:${depth * CONFIG.treeDepthPx}px">
        <span class="tree-toggle open">▼</span>
        <span class="icon">${icon}</span>
        <span>${esc(n.name)}</span>
      </div>
      <div class="tree-children open">
        ${buildTreeHtml(n.children || [], depth + 1)}
      </div>`;
    } else {
      const isBookmarked = STATE.bookmarks.has(n.path);
      h += `<div class="tree-item file" data-path="${esc(n.path)}" style="padding-left:${depth * CONFIG.treeDepthPx + 12}px">
        <span class="icon">📄</span>
        <span>${esc(n.name.replace(/\.md$/, ''))}</span>
        <span class="bookmark-icon" data-action="toggleBookmark" data-path="${esc(n.path)}">${isBookmarked ? '⭐' : '☆'}</span>
      </div>`;
    }
  }
  return h;
}

function renderTopics() {
  const grid = document.getElementById('topicsGrid');
  if (!grid) return;

  const topicDirs = STATE.treeData.filter(n => n.type === 'dir').slice(0, 12);
  let html = '';

  for (const topic of topicDirs) {
    const icon = DOMAIN_ICONS[topic.name] || '📁';
    const name = topic.name.replace(/^\d+-/, '').replace(/-/g, ' ');
    const path = topic.path;
    html += `
      <div class="topic-box" data-path="${esc(path)}">
        <div class="icon">${icon}</div>
        <div class="name">${esc(name)}</div>
      </div>
    `;
  }

  grid.innerHTML = html;

  grid.querySelectorAll('.topic-box').forEach(el => {
    el.addEventListener('click', () => {
      const path = el.dataset.path;
      if (path) {
        const firstFile = STATE.flatFiles.find(f => f.path.startsWith(path));
        if (path) {
          const firstFile = STATE.flatFiles.find(f => f.path.startsWith(path));
          if (firstFile) navigateTo(firstFile.path);
        }
      }
    });
  });
}

function attachTreeEvents() {
  document.querySelectorAll('.tree-toggle').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const ch = el.parentElement.nextElementSibling;
      if (ch && ch.classList.contains('tree-children')) {
        ch.classList.toggle('open');
        el.textContent = ch.classList.contains('open') ? '▼' : '▶';
      }
    });
  });

  document.querySelectorAll('.tree-item.file').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('bookmark-icon')) return;
      navigateTo(el.dataset.path);
    });
  });
}

// ─── Search ───
const search = document.getElementById('search');
search.addEventListener('input', () => {
  clearTimeout(STATE.searchTimeout);
  STATE.searchTimeout = setTimeout(doSearch, CONFIG.debounceMs);
});
search.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && STATE.currentContent) {
    const q = search.value.trim();
    if (q) scrollToFirstMatch(q);
  }
});

function doSearch() {
  const q = search.value.toLowerCase().trim();
  const st = document.getElementById('searchStatus');

  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('hidden'));
  document.querySelectorAll('.tree-item .hl').forEach(el => el.outerHTML = el.textContent);

  if (!q) {
    st.style.display = 'none';
    return;
  }

  const matches = STATE.flatFiles.filter(f => f.path.toLowerCase().includes(q));
  document.querySelectorAll('.tree-item.file').forEach(el => {
    const p = el.dataset.path;
    el.classList.toggle('hidden', !(p && matches.some(m => m.path === p)));
  });

  st.textContent = `${matches.length} result${matches.length !== 1 ? 's' : ''}`;
  st.style.display = matches.length ? 'block' : 'none';

  const ql = q.length;
  document.querySelectorAll('.tree-item.file:not(.hidden)').forEach(el => {
    const sp = el.querySelector('span:nth-child(2)');
    const tx = sp.textContent;
    const ix = tx.toLowerCase().indexOf(q);
    if (ix !== -1) {
      sp.innerHTML = esc(tx.slice(0, ix)) + `<span class="hl">${esc(tx.slice(ix, ix + ql))}</span>` + esc(tx.slice(ix + ql));
    }
  });
}

function scrollToFirstMatch(q) {
  const body = document.getElementById('fileContent');
  const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, null, false);
  let node;
  while (node = walker.nextNode()) {
    if (node.textContent.toLowerCase().includes(q)) {
      node.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
      node.parentElement.style.background = 'rgba(251,191,36,.12)';
      setTimeout(() => { node.parentElement.style.background = ''; }, CONFIG.searchHighlightMs);
      return;
    }
  }
}

// ─── URI Resolution ───
function resolvePath(uri) {
  // Bare path like /java → look for README or first .md in directory
  if (!uri.endsWith('.md') && !uri.endsWith('.html')) {
    // Strip leading slash
    const clean = uri.replace(/^\//, '');
    return findEntryFile(clean);
  }
  // Ensure leading slash is stripped for API
  return uri.replace(/^\//, '');
}

function findEntryFile(dir) {
  const files = window.__flatFiles || [];
  // Strip leading/trailing slash
  const clean = dir.replace(/^\/+|\/+$/g, '');
  // Prefer README.md in that directory
  const readme = files.find(f => f.path === clean + '/README.md');
  if (readme) return readme.path;
  // Try exact match
  const exact = files.find(f => f.path === clean);
  if (exact) return exact.path;
  // First .md file starting with this directory
  const first = files.find(f => f.path.startsWith(clean + '/') && f.path.endsWith('.md'));
  if (first) return first.path;
  // Try without domain number prefix
  const bare = files.find(f => {
    const parts = f.path.split('/');
    return parts.some(p => p.replace(/^\d+-/, '') === clean || p === clean);
  });
  if (bare) return bare.path;
  return clean;
}

// ─── Navigation ───
function navigateTo(uri) {
  const resolved = resolvePath(uri);
  if (resolved.endsWith('.html')) {
    // HTML simulators: open in new tab
    window.open('/' + resolved, '_blank');
    return;
  }
  // Update URL hash without triggering hashchange
  const newHash = '#' + resolved;
  if (window.location.hash !== newHash) {
    history.pushState({ path: resolved }, '', newHash);
  }
  loadFile(resolved);
}

// ─── File Loading ───
async function loadFile(path) {
  document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`[data-path="${path}"]`);
  if (el) el.classList.add('active');

  document.getElementById('start').style.display = 'none';
  document.getElementById('fileView').style.display = 'flex';
  document.getElementById('togglesRow').style.display = 'flex';

  STATE.currentPath = path;
  localStorage.setItem('lastViewedFile', path);
  addToRecentFiles(path);

  const name = path.split('/').pop().replace(/\.md$/, '');
  document.getElementById('fileTitle').textContent = name;
  document.getElementById('fileSubtitle').textContent = path;

  // Breadcrumb
  const segs = path.split('/');
  let bc = '';
  for (let i = 0; i < segs.length; i++) {
    const s = segs[i].replace(/\.md$/, '');
    if (i === segs.length - 1) {
      bc += `<span class="sep">›</span> <span style="color:var(--fg)">${esc(s)}</span>`;
    } else {
      bc += `${i > 0 ? '<span class="sep">›</span>' : ''}<a class="seg">${esc(s)}</a>`;
    }
  }
  document.getElementById('breadcrumb').innerHTML = bc;

  // Domain badge
  const domainMatch = path.match(/^\d{2}-([^/]+)/);
  const domainRow = document.getElementById('domainRow');
  if (domainMatch) {
    domainRow.style.display = 'flex';
    const dname = domainMatch[1].replace(/-/g, ' ');
    document.getElementById('domainName').textContent = dname.replace(/\b\w/g, c => c.toUpperCase());
  } else {
    domainRow.style.display = 'none';
  }

  const body = document.getElementById('fileContent');
  body.innerHTML = '<span class="loading" style="color:var(--fg3)">Loading...</span>';

  // Strip leading / for API (server resolves relative to data/ root)
  const apiPath = path.replace(/^\//, '');
  try {
    const r = await fetch(CONFIG.api + '/file?path=' + encodeURIComponent(apiPath));
    const d = await r.json();
    if (d.error) {
      body.innerHTML = `<p>Error: ${esc(d.error)}</p>`;
      return;
    }
    STATE.currentContent = d.content || '';
    renderContent(body, STATE.currentContent);
    buildTOC();
    computeStats(body);
    applyZoom();
  } catch (e) {
    console.error('Failed to load file:', e);
    body.innerHTML = '<p>Failed to load file</p>';
  }
}

function addToRecentFiles(path) {
  STATE.recentFiles = STATE.recentFiles.filter(p => p !== path);
  STATE.recentFiles.unshift(path);
  STATE.recentFiles = STATE.recentFiles.slice(0, 10);
  savePersistentState();
  renderRecentFiles();
}

function renderRecentFiles() {
  const list = document.getElementById('recentList');
  const toggle = document.getElementById('recentToggle');
  if (STATE.recentFiles.length === 0) {
    list.classList.remove('show');
    toggle.style.display = 'none';
    return;
  }
  toggle.style.display = 'flex';
  list.classList.add('show');
  list.innerHTML = STATE.recentFiles.map(path => `
    <div class="recent-item" data-path="${esc(path)}">${esc(path.split('/').pop().replace(/\.md$/, ''))}</div>
  `).join('');

  list.querySelectorAll('.recent-item').forEach(el => {
        el.addEventListener('click', () => navigateTo(el.dataset.path));
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const toggle = document.getElementById('recentToggle');
  const list = document.getElementById('recentList');
  if (toggle) {
    toggle.addEventListener('click', () => {
      list.classList.toggle('show');
      toggle.classList.toggle('open');
    });
  }
});

// ─── Bookmarks ───
function toggleBookmark(path) {
  if (STATE.bookmarks.has(path)) {
    STATE.bookmarks.delete(path);
  } else {
    STATE.bookmarks.add(path);
  }
  savePersistentState();
  updateBookmarkUI(path);
}

function updateBookmarkUI(path) {
  const items = document.querySelectorAll(`.bookmark-icon[data-path="${path}"]`);
  const isBookmarked = STATE.bookmarks.has(path);
  items.forEach(el => {
    el.textContent = isBookmarked ? '⭐' : '☆';

}

// ─── Zoom ───
function changeZoom(delta) {
  if (delta === 0) {
    STATE.zoomLevel = 1.0;
  } else {
    STATE.zoomLevel = Math.max(CONFIG.zoomMin, Math.min(CONFIG.zoomMax, STATE.zoomLevel + delta));
  }
  applyZoom();
  savePersistentState();
}

function applyZoom() {
  const scale = STATE.zoomLevel;
  document.documentElement.style.setProperty('--font-size', (15 * scale) + 'px');
}

// ─── Layers ───
document.querySelectorAll('.layer-btn').forEach(btn => {

function toggleLayer(layer) {

function applyLayers() {

// ─── Content Rendering ───
function computeStats(container) {
  const text = container.textContent || '';
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('wordCount').textContent = words.toLocaleString();
  document.getElementById('readingTime').textContent = Math.max(1, Math.round(words / 200));
  const sections = container.querySelectorAll('h1,h2,h3').length;
  document.getElementById('sectionCount').textContent = sections;
  document.getElementById('fileStats').style.display = 'flex';
}

function renderContent(container, text) {
  if (!text) {
    container.innerHTML = '<p>Empty</p>';
    return;
  }

  const blocks = [];
  const diagrams = [];

  // Extract code blocks and diagrams
  text = text.replace(/```mermaid\n([\s\S]*?)```/g, (m, c) => {
    diagrams.push(c.trim());
    return `__MERMAID${diagrams.length - 1}__`;
  });
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (m, l, c) => {
    blocks.push({ lang: l || '', code: c.trim() });
    return `__CODE${blocks.length - 1}__`;
  });

  // Inline formatting
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, l, u) => {
    const isExternal = u.startsWith('http://') || u.startsWith('https://') || u.startsWith('//');
    if (isExternal) return `<a href="${u}" target="_blank" rel="noopener">${l}</a>`;
    // Internal: .md, .html, or bare path → use navigateTo
    return `<a class="internal-link" data-href="${u}" href="${u}">${l}</a>`;
  });

  // Headers with anchors
  text = text.replace(/^######\s+(.+)$/gm, (m, t) => `<h6 id="h6-${slugify(t)}">${t}<a class="anchor-link" href="#h6-${slugify(t)}">#</a></h6>`);
  text = text.replace(/^#####\s+(.+)$/gm, (m, t) => `<h5 id="h5-${slugify(t)}">${t}<a class="anchor-link" href="#h5-${slugify(t)}">#</a></h5>`);
  text = text.replace(/^####\s+(.+)$/gm, (m, t) => `<h4 id="h4-${slugify(t)}">${t}<a class="anchor-link" href="#h4-${slugify(t)}">#</a></h4>`);
  text = text.replace(/^###\s+(.+)$/gm, (m, t) => {
    const l = detectLayer(t);
    return l ? `</div><div class="layer-section" data-layer="${l}"><h3 id="h3-${slugify(t)}">${t}<a class="anchor-link" href="#h3-${slugify(t)}">#</a></h3>` : `<h3 id="h3-${slugify(t)}">${t}<a class="anchor-link" href="#h3-${slugify(t)}">#</a></h3>`;
  });
  text = text.replace(/^##\s+(.+)$/gm, (m, t) => {
    const l = detectLayer(t);
    const id = `h2-${slugify(t)}`;
    return l ? `</div><div class="layer-section" data-layer="${l}"><h2 id="${id}"><span class="layer-label l${l}">L${l}</span>${t}<a class="anchor-link" href="#${id}">#</a></h2>` : `<h2 id="${id}">${t}<a class="anchor-link" href="#${id}">#</a></h2>`;
  });
  text = text.replace(/^#\s+(.+)$/gm, (m, t) => `<h1 id="h1-${slugify(t)}">${t}</h1>`);
  text += '</div>';

  // Lists
  text = text.replace(/^\s*[-*+]\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  text = text.replace(/^\s*\d+\.\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/((?:<li>.*<\/li>\n?)+)/g, m => m.includes('<ul>') ? m : '<ol>' + m + '</ol>');

  // Blockquotes
  text = text.replace(/^>\s+(.+)$/gm, '__BQ__$1\n');
  text = text.replace(/((__BQ__[^\n]+\n?)+)/g, m => {
    const l = m.split('\n').map(x => x.replace('__BQ__', '').trim()).filter(Boolean);
    return '<blockquote>' + l.map(x => '<p>' + x + '</p>').join('') + '</blockquote>\n';
  });

  // Tables
  text = text.replace(/^\|(.+)\|\n\|[\s\-:|\s]+\|\n((?:\|.+\|\n?)*)/gm, m => {
    const l = m.trim().split('\n');
    if (l.length < 3) return m;
    const h = l[0].split('|').map(x => x.trim()).filter(Boolean);
    const r = l.slice(2).map(x => x.split('|').map(c => c.trim()).filter(Boolean));
    let hh = '<table><thead><tr>' + h.map(x => '<th>' + x + '</th>').join('') + '</tr></thead><tbody>';
    for (const row of r) hh += '<tr>' + row.map(c => '<td>' + c + '</td>').join('') + '</tr>';
    return hh + '</tbody></table>\n';
  });

  // HR & paragraphs
  text = text.replace(/^---$/gm, '<hr>');
  text = text.replace(/^(?!<[hHh]|<ul|<ol|<blockquote|<table|<pre|<hr|<\/div|$)(.+)$/gm, '<p>$1</p>');
  text = text.replace(/<p>\s*<\/p>/g, '');

  // Insert code blocks and diagrams
  for (let i = 0; i < blocks.length; i++) {
    const { lang, code } = blocks[i];
    text = text.replace(`__CODE${i}__`, `<pre data-lang="${esc(lang || 'text')}"><button class="copy-btn" data-action="copyCode">Copy</button><code class="lang-${esc(lang)}">${highlight(code, lang)}</code></pre>`);
  }
  for (let i = 0; i < diagrams.length; i++) {
    text = text.replace(`__MERMAID${i}__`, `
      <div class="diagram-container">
        <div class="diagram-controls">
          <button class="diagram-btn" data-action="diagramZoomOut" data-diagram="${i}">−</button>
          <button class="diagram-btn" data-action="diagramZoomReset" data-diagram="${i}">Reset</button>
          <button class="diagram-btn" data-action="diagramZoomIn" data-diagram="${i}">+</button>
          <button class="diagram-btn" data-action="diagramFullscreen" data-diagram="${i}">⛶</button>
        </div>
        <div class="mermaid-wrap animate-in" data-diagram-id="${i}"><div class="mermaid" style="transform:scale(1);transform-origin:top center">${diagrams[i]}</div></div>
      </div>
    `);
  }

  container.innerHTML = text;
  applyLayers();

  // Image lightbox
  container.querySelectorAll('img').forEach(img => {
    img.addEventListener('click', (e) => {
      e.stopPropagation();
      openLightbox(img.src);
    });
  });

  // Internal link handler
  container.querySelectorAll('.internal-link').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const href = el.dataset.href;
      if (!href) return;

      // Resolve relative paths
      let fullPath = href;
      if (!href.startsWith('/') && !href.startsWith('#')) {
        const currentDir = STATE.currentPath.replace(/[^/]+$/, '');
        fullPath = currentDir + href;
      }

      // Handle hash-only links (same-page anchors)
      if (fullPath.startsWith('#')) {
        const target = document.getElementById(fullPath.slice(1));
        if (target) target.scrollIntoView({ behavior: 'smooth' });
        return;
      }

      navigateTo(fullPath);
    });
  });

  // Code copy handler
  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const code = btn.parentElement.querySelector('code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    });
  });

  if (diagrams.length > 0) {
    setTimeout(() => {
      if (window.mermaid) {
        mermaid.run({ nodes: container.querySelectorAll('.mermaid') }).catch(e => {
          console.error('Mermaid render failed:', e);
        });
      }
    }, 50);
  }
}

const diagramZooms = {};

function getDiagramScale(diagramId) {
  return diagramZooms[diagramId] || 1;
}

function setDiagramScale(diagramId, scale) {
  diagramZooms[diagramId] = Math.max(0.5, Math.min(3, scale));
  const mermaidEl = document.querySelector(`[data-diagram-id="${diagramId}"] .mermaid`);
  if (mermaidEl) {
    mermaidEl.style.transform = `scale(${diagramZooms[diagramId]})`;
  }
}

function zoomDiagram(diagramId, delta) {
  const current = getDiagramScale(diagramId);
  setDiagramScale(diagramId, current + delta);
}

function resetDiagramZoom(diagramId) {
  setDiagramScale(diagramId, 1);
}

function openDiagramFullscreen(diagramId) {
  const source = document.querySelector(`[data-diagram-id="${diagramId}"]`);
  if (!source) return;
  const mermaidEl = source.querySelector('.mermaid');

  const fsModal = document.getElementById('diagramFullscreen');
  const fsContent = document.getElementById('fsContent');

  // If SVG already rendered, display it directly. No re-render needed.
  const svg = mermaidEl.querySelector('svg');
  if (svg) {
    fsContent.innerHTML = `<div class="mermaid" style="transform:scale(1.2);transform-origin:center center">${svg.outerHTML}</div>`;
  } else {
    // Not yet rendered — use raw source
    const raw = mermaidEl.textContent || mermaidEl.innerHTML;
    fsContent.innerHTML = `<div class="mermaid">${raw}</div>`;
    setTimeout(() => {
      mermaid.run({ nodes: fsContent.querySelectorAll('.mermaid') }).catch(() => {});
    }, 50);
  }
  fsModal.classList.add('open');
}

function closeDiagramFullscreen() {
  document.getElementById('diagramFullscreen').classList.remove('open');
}

function goHome() {
  document.getElementById('start').style.display = 'flex';
  document.getElementById('fileView').style.display = 'none';
  document.getElementById('togglesRow').style.display = 'none';
  STATE.currentPath = '';
  localStorage.removeItem('lastViewedFile');
  document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
  history.pushState({ path: '' }, '', window.location.pathname);
}

function slugify(t) {
  return t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function detectLayer(t) {
  const m = t.match(/LAYER\s*(\d)/i);
  return m ? m[1] : null;
}

function highlight(code, lang) {
  code = esc(code);
  lang = (lang || '').toLowerCase().trim();

  code = code.replace(/(&quot;(?:[^&quot;\\]|\\.)*&quot;|&#039;(?:[^&#039;\\]|\\.)*&#039;)/g, '<span style="color:#a5d6ff">$1</span>');
  code = code.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#79c0ff">$1</span>');
  code = code.replace(/(\/\/.*$|\/\*[\s\S]*?\*\/|#.*$)/gm, '<span style="color:#8b949e;font-style:italic">$1</span>');

  const kw = lang === 'python' || lang === 'py' ? '\\b(if|else|elif|for|while|def|class|import|from|return|try|except|True|False|None|self|async|await|yield|with|as|pass|raise|finally|lambda|print)\\b' :
    lang === 'java' ? '\\b(public|private|protected|class|static|void|if|else|for|while|return|new|import|package|extends|implements|interface|abstract|final|try|catch|throw|throws|synchronized|volatile|transient|this|super|int|long|double|float|boolean|String|var|record|sealed|permits)\\b' :
    lang === 'go' ? '\\b(func|if|else|for|range|return|var|type|struct|interface|map|chan|go|defer|select|case|switch|break|continue|package|import|const|nil|true|false|make|len|cap|append|error|string|int|bool|byte|rune|float64|uint64)\\b' :
    lang === 'sql' ? '\\b(SELECT|FROM|WHERE|INSERT|UPDATE|DELETE|CREATE|DROP|JOIN|ON|GROUP|ORDER|BY|LIMIT|DISTINCT|HAVING|UNION|ALTER|TABLE|INDEX|PRIMARY|KEY|FOREIGN|REFERENCES|CASCADE|SET|VALUES|INTO|AND|OR|NOT|NULL|AS|LEFT|RIGHT|INNER|OUTER|FULL)\\b' :
    lang === 'yaml' || lang === 'yml' ? '\\b(true|false|yes|no|null|on|off)\\b' :
    lang === 'bash' || lang === 'shell' ? '\\b(if|then|else|fi|for|while|do|done|function|export|source|return|local|exit|echo|set|unset|read|eval|exec|trap)\\b' :
    lang === 'javascript' || lang === 'js' || lang === 'typescript' || lang === 'ts' || lang === 'jsx' || lang === 'tsx' ? '\\b(const|let|var|function|return|if|else|for|while|class|new|import|export|default|async|await|try|catch|throw|typeof|instanceof|from|interface|type|extends|implements|enum|keyof)\\b' : null;

  if (kw) {
    code = code.replace(new RegExp(kw, 'gi'), '<span style="color:#ff7b72;font-weight:bold">$1</span>');
  }

  return code;
}

// ─── TOC ───
function buildTOC() {
  const sidebar = document.getElementById('tocSidebar');
  const headings = document.querySelectorAll('#fileContent h1,#fileContent h2,#fileContent h3');

  if (headings.length < 3) {
    sidebar.classList.remove('show');
    return;
  }

  sidebar.classList.add('show');
  STATE.tocItems = [];

  let html = '<div style="padding:0 16px 10px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--fg3)">On this page</div>';

  headings.forEach(h => {
    const lvl = h.tagName.toLowerCase();
    const tx = h.textContent.replace(/L\d\s*/i, '');
    const id = 'toc-' + STATE.tocItems.length;
    h.id = h.id || id;

    html += `<div class="toc-item ${lvl}" data-target="${h.id}">${esc(tx)}</div>`;
    STATE.tocItems.push(h);
  });

  sidebar.innerHTML = html;

  // Scroll tracking
  const body = document.getElementById('fileContent');
  body.addEventListener('scroll', () => {
    let active = null;
    const st = body.scrollTop + 100;

    for (const h of STATE.tocItems) {
      if (h.offsetTop <= st) active = h;
      else break;
    }

    sidebar.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
    if (active) {
      const el = sidebar.querySelector(`[data-target="${active.id}"]`);
      if (el) el.classList.add('active');
    }

    // Scroll progress
    const max = body.scrollHeight - body.clientHeight;
    document.getElementById('scrollFill').style.width = max > 0 ? (body.scrollTop / max * 100) + '%' : '0%';

    // Back to top visibility
    document.getElementById('backTopBtn').classList.toggle('show', body.scrollTop > CONFIG.scrollProgressThreshold);
  }, { passive: true });
}

// ─── UI Controls ───
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  s.classList.toggle('collapsed');
  document.getElementById('collapseSidebar').textContent = s.classList.contains('collapsed') ? '▶' : '◀';
  setTimeout(() => {
    if (window.mermaid) {
      const unrendered = document.querySelectorAll('.mermaid:not(:has(svg))');
      if (unrendered.length) {
        mermaid.run({ nodes: unrendered }).catch(() => {});
      }
    }
  }, 100);
}

function toggleFullscreen() {
  STATE.isFullscreen = !STATE.isFullscreen;
  document.body.style.overflow = STATE.isFullscreen ? 'hidden' : 'auto';
  const header = document.querySelector('.content-header');
  const toggles = document.getElementById('togglesRow');
  header.style.display = STATE.isFullscreen ? 'none' : 'flex';
  toggles.style.display = STATE.isFullscreen ? 'none' : 'flex';
}

function scrollContentToTop() {
  document.getElementById('fileContent').scrollTo({ top: 0, behavior: 'smooth' });
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function toggleKeyboardPanel() {
  document.getElementById('kbPanel').classList.toggle('open');
}

function closeKeyboardPanel() {
  document.getElementById('kbPanel').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════
// THEME TOGGLE
// ═══════════════════════════════════════════════════════════════

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('kb-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '🌓' : '☀️';
}

function detectTheme() {
  const saved = localStorage.getItem('kb-theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

document.getElementById('themeBtn').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
  if (!localStorage.getItem('kb-theme')) {
    applyTheme(e.matches ? 'light' : 'dark');
  }
});

applyTheme(detectTheme());

// ═══════════════════════════════════════════════════════════════
// FULL-TEXT SEARCH (overlay)
// ═══════════════════════════════════════════════════════════════

const ftsInput = document.getElementById('ftsInput');
const ftsResults = document.getElementById('ftsResults');
const searchOverlay = document.getElementById('searchOverlay');
let ftsTimeout = null;

function openSearchOverlay() {
  searchOverlay.classList.add('open');
  setTimeout(() => ftsInput.focus(), 100);
  ftsInput.value = '';
  ftsResults.innerHTML = '';
}

function closeSearchOverlay() {
  searchOverlay.classList.remove('open');
  document.getElementById('search').focus();
}

document.getElementById('ftsBtn').addEventListener('click', openSearchOverlay);
document.getElementById('ftsClose').addEventListener('click', closeSearchOverlay);
searchOverlay.addEventListener('click', (e) => {
  if (e.target === searchOverlay) closeSearchOverlay();
});

ftsInput.addEventListener('input', () => {
  clearTimeout(ftsTimeout);
  const q = ftsInput.value.trim();
  if (!q) { ftsResults.innerHTML = ''; return; }
  ftsTimeout = setTimeout(() => doFTS(q), 200);
});

ftsInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const first = ftsResults.querySelector('.search-result-item');
    if (first) first.click();
  }
  if (e.key === 'Escape') closeSearchOverlay();
});

async function doFTS(q) {
  ftsResults.innerHTML = '<div class="search-status-text">Searching…</div>';
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (!d.results || d.results.length === 0) {
      ftsResults.innerHTML = '<div class="search-status-text">No results found</div>';
      return;
    }
    let html = `<div class="search-status-text">${d.count} result${d.count !== 1 ? 's' : ''} for "${esc(q)}"</div>`;
    for (const res of d.results) {
      const name = res.name || res.path.split('/').pop().replace(/\.md$/, '');
      let snippet = '';
      if (res.matches && res.matches.length > 0) {
        snippet = res.matches[0].text;
        const idx = snippet.toLowerCase().indexOf(q.toLowerCase());
        if (idx !== -1) {
          snippet = esc(snippet.substring(0, idx)) + '<em>' + esc(snippet.substring(idx, idx + q.length)) + '</em>' + esc(snippet.substring(idx + q.length));
        } else {
          snippet = esc(snippet);
        }
        snippet = `<div class="snippet">${snippet}</div>`;
      }
      html += `<div class="search-result-item" data-path="${esc(res.path)}">
        <div class="path">${esc(res.path)}</div>
        <div class="title">${esc(name)}${res.nameMatch ? '' : ''}</div>
        ${snippet}
        <div class="match-line">${res.matches ? res.matches.length + ' match(es)' : 'filename match'}</div>
      </div>`;
    }
    ftsResults.innerHTML = html;
    ftsResults.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => {
        closeSearchOverlay();
        navigateTo(el.dataset.path);
      });
    });
  } catch (e) {
    ftsResults.innerHTML = '<div class="search-status-text">Search failed</div>';
  }
}

// ═══════════════════════════════════════════════════════════════
// FLOATING TOC
// ═══════════════════════════════════════════════════════════════

function buildFloatingTOC() {
  const ftoc = document.getElementById('floatToc');
  const headings = document.querySelectorAll('#fileContent h2, #fileContent h3');
  if (headings.length < 3) {
    ftoc.classList.remove('show');
    return;
  }
  // Remove old items except label
  ftoc.querySelectorAll('.float-toc-item').forEach(el => el.remove());
  let prevH2 = null;
  headings.forEach(h => {
    const tag = h.tagName.toLowerCase();
    const tx = h.textContent.replace(/L\d\s*/i, '').trim();
    const id = h.id || ('ftoc-' + Math.random().toString(36).slice(2));
    h.id = h.id || id;
    const item = document.createElement('a');
    item.className = 'float-toc-item ' + tag;
    item.href = '#' + id;
    item.textContent = tx;
    item.addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
    });
    ftoc.appendChild(item);
    if (tag === 'h2') prevH2 = item;
  });
  ftoc.classList.add('show');
}

function updateFloatingTOC() {
  const ftoc = document.getElementById('floatToc');
  const body = document.getElementById('fileContent');
  if (!ftoc.classList.contains('show')) return;
  const items = ftoc.querySelectorAll('.float-toc-item');
  let active = null;
  const st = body.scrollTop + 120;
  items.forEach(item => item.classList.remove('active'));
  document.querySelectorAll('#fileContent h2, #fileContent h3').forEach(h => {
    if (h.offsetTop <= st) active = h;
  });
  if (active) {
    const el = ftoc.querySelector(`[href="#${active.id}"]`);
    if (el) el.classList.add('active');
  }
}

// ═══════════════════════════════════════════════════════════════
// IN-PAGE SEARCH (⌘F)
// ═══════════════════════════════════════════════════════════════

const inpageSearch = document.getElementById('inpageSearch');
const inpageInput = document.getElementById('inpageSearchInput');
const inpageMatchCount = document.getElementById('inpageMatchCount');
let inpageMatches = [];
let inpageCurrent = -1;

function openInpageSearch() {
  if (!STATE.currentPath) return;
  inpageSearch.classList.add('show');
  setTimeout(() => inpageInput.focus(), 50);
  inpageInput.select();
}

function closeInpageSearch() {
  inpageSearch.classList.remove('show');
  inpageInput.value = '';
  clearInpageHighlights();
  inpageMatches = [];
  inpageCurrent = -1;
  inpageMatchCount.textContent = '';
}

function clearInpageHighlights() {
  document.querySelectorAll('.inpage-highlight').forEach(el => {
    const parent = el.parentNode;
    parent.replaceChild(document.createTextNode(el.textContent), el);
    parent.normalize();
  });
}

function doInpageSearch() {
  clearInpageHighlights();
  const q = inpageInput.value.trim().toLowerCase();
  if (!q) { inpageMatchCount.textContent = ''; return; }
  const body = document.getElementById('fileContent');
  const walker = document.createTextNode(body);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);
  inpageMatches = [];
  for (const node of textNodes) {
    const text = node.textContent;
    const lower = text.toLowerCase();
    let idx = 0;
    while ((idx = lower.indexOf(q, idx)) !== -1) {
      const span = document.createElement('span');
      span.className = 'inpage-highlight';
      span.textContent = text.substring(idx, idx + q.length);
      const after = node.splitText(idx + q.length);
      node.splitText(idx);
      node.parentNode.replaceChild(span, node.nextSibling);
      inpageMatches.push(span);
      idx = idx + q.length;
      node = after;
      lower = after.textContent.toLowerCase();
      idx = lower.indexOf(q, idx);
    }
  }
  inpageCurrent = inpageMatches.length > 0 ? 0 : -1;
  updateInpageMatch();
  if (inpageMatches.length > 0) scrollToInpageMatch(0);
}

function updateInpageMatch() {
  inpageMatchCount.textContent = inpageMatches.length > 0
    ? `${inpageCurrent + 1}/${inpageMatches.length}`
    : '0 matches';
  document.querySelectorAll('.inpage-highlight').forEach(el => el.style.background = 'var(--search-highlight)');
  if (inpageMatches[inpageCurrent]) {
    inpageMatches[inpageCurrent].style.background = 'rgba(251,191,36,.45)';
  }
}

function scrollToInpageMatch(idx) {
  if (idx >= 0 && idx < inpageMatches.length) {
    inpageMatches[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

document.getElementById('inpagePrev').addEventListener('click', () => {
  if (inpageMatches.length === 0) return;
  inpageCurrent = (inpageCurrent - 1 + inpageMatches.length) % inpageMatches.length;
  updateInpageMatch();
  scrollToInpageMatch(inpageCurrent);
});

document.getElementById('inpageNext').addEventListener('click', () => {
  if (inpageMatches.length === 0) return;
  inpageCurrent = (inpageCurrent + 1) % inpageMatches.length;
  updateInpageMatch();
  scrollToInpageMatch(inpageCurrent);
});

document.getElementById('inpageClose').addEventListener('click', closeInpageSearch);

inpageInput.addEventListener('input', doInpageSearch);
inpageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (e.shiftKey) {
      document.getElementById('inpagePrev').click();
    } else {
      document.getElementById('inpageNext').click();
    }
  }
  if (e.key === 'Escape') closeInpageSearch();
});

// ═══════════════════════════════════════════════════════════════
// AUTO-HIDE SIDEBAR ON MOBILE SCROLL
// ═══════════════════════════════════════════════════════════════

let lastScrollY = 0;

document.getElementById('fileContent').addEventListener('scroll', () => {
  const sidebar = document.getElementById('sidebar');
  if (window.innerWidth > 900) return;
  const st = document.getElementById('fileContent').scrollTop;
  if (st > lastScrollY && st > 60) {
    sidebar.classList.add('hide-mobile');
  } else {
    sidebar.classList.remove('hide-mobile');
  }
  lastScrollY = st;
}, { passive: true });

// ═══════════════════════════════════════════════════════════════
// EXTEND KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════

document.addEventListener('keydown', (e) => {
  const meta = e.metaKey || e.ctrlKey;
  if (meta && e.key === 'k') {
    e.preventDefault();
    openSearchOverlay();
  }
  if (meta && e.key === 'f') {
    e.preventDefault();
    // Don't open if we're in the FTS overlay
    if (searchOverlay.classList.contains('open')) return;
    openInpageSearch();
  }
  if (meta && e.key === 't') {
    e.preventDefault();
    document.getElementById('themeBtn').click();
  }
});

// ═══════════════════════════════════════════════════════════════
// PAGE TRANSITIONS
// ═══════════════════════════════════════════════════════════════

function showPageTransition() {
  const pt = document.getElementById('pageTransition');
  pt.classList.add('active');
  setTimeout(() => pt.classList.remove('active'), 300);
}

// Patch loadFile to add transition
const origLoadFile = loadFile;
loadFile = function(path) {
  showPageTransition();
  const body = document.getElementById('fileContent');
  body.classList.add('loading');
  body.classList.remove('loaded');
  Promise.resolve(origLoadFile(path)).then(() => {
    body.classList.remove('loading');
    body.classList.add('loaded');
    setTimeout(buildFloatingTOC, 100);
  }).catch(() => {
    body.classList.remove('loading');
  });
};

// ═══════════════════════════════════════════════════════════════
// EXTEND loadFile COMPUTED STATS FOR FLOATING TOC
// ═══════════════════════════════════════════════════════════════

// Patch buildTOC to also update floating TOC
const origBuildTOC = buildTOC;
buildTOC = function() {
  origBuildTOC();
  setTimeout(buildFloatingTOC, 50);
};

// Patch the scroll listener in buildTOC to also update floating TOC
const origBodyScroll = document.getElementById('fileContent');
if (origBodyScroll) {
  origBodyScroll.addEventListener('scroll', updateFloatingTOC, { passive: true });
}

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
function esc(s) {
  const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return (s || '').replace(/[&<>"']/g, x => m[x]);
}

// Event listeners for floating buttons
document.getElementById('backTopBtn').addEventListener('click', scrollContentToTop);
document.getElementById('kbToggle').addEventListener('click', toggleKeyboardPanel);
document.getElementById('collapseSidebar').addEventListener('click', toggleSidebar);
document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
document.getElementById('zoomOut').addEventListener('click', () => changeZoom(-CONFIG.zoomStep));
document.getElementById('zoomReset').addEventListener('click', () => changeZoom(0));
document.getElementById('zoomIn').addEventListener('click', () => changeZoom(CONFIG.zoomStep));
document.getElementById('lightbox').addEventListener('click', closeLightbox);
</script>
