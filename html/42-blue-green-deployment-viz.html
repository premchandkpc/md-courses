<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue-Green Deployment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .environments { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
    .env { background: #334155; padding: 20px; border-radius: 8px; border: 2px solid #64748b; text-align: center; }
    .env.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    .env-name { font-weight: bold; margin-bottom: 8px; }
    .env-status { font-size: 14px; margin: 8px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Blue-Green Deployment</h1>
    <a href="../data/14-sre-observability/monitoring/02-grafana-slos-alerting-incident-response.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Environment Status</h2>
      <div class="environments" id="envs"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Deployment</label>
        <button onclick="app.switchOver()">Switch to Green</button>
        <button onclick="app.rollback()">Rollback</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Active: <strong id="active">Blue</strong></div>
        <div>Traffic: <strong id="traffic">100% Blue</strong></div>
      </div>
      <div class="info-text">
        <strong>Blue-Green:</strong> Two identical environments
      </div>
      <div class="info-text">
        <strong>Switch:</strong> Instant traffic cutover
      </div>
      <div class="info-text">
        <strong>Rollback:</strong> One-click revert
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { active: 'blue' },
      init() { this.render(); },
      switchOver() { this.state.active = 'green'; this.render(); },
      rollback() { this.state.active = 'blue'; this.render(); },
      reset() { this.state.active = 'blue'; this.render(); },
      render() {
        const envsDiv = document.getElementById('envs');
        envsDiv.innerHTML = `
          <div class="env ${this.state.active === 'blue' ? 'active' : ''}">
            <div class="env-name">🔵 Blue (v1.0)</div>
            <div class="env-status">${this.state.active === 'blue' ? '◉ Active' : '◯ Standby'}</div>
            <div style="font-size:11px;color:#cbd5e1;margin-top:8px;">Production v1.0</div>
          </div>
          <div class="env ${this.state.active === 'green' ? 'active' : ''}">
            <div class="env-name">🟢 Green (v1.1)</div>
            <div class="env-status">${this.state.active === 'green' ? '◉ Active' : '◯ Ready'}</div>
            <div style="font-size:11px;color:#cbd5e1;margin-top:8px;">Production v1.1</div>
          </div>
        `;
        document.getElementById('active').textContent = this.state.active.toUpperCase();
        document.getElementById('traffic').textContent = this.state.active === 'blue' ? '100% Blue' : '100% Green';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
