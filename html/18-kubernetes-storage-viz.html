<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kubernetes Storage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .storage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
    .storage-item { background: #334155; padding: 15px; border-radius: 8px; border-left: 3px solid #60a5fa; }
    .storage-item h3 { margin-bottom: 8px; font-size: 13px; }
    .detail { font-size: 11px; color: #cbd5e1; margin: 4px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Kubernetes Storage</h1>
    <a href="../data/07-kubernetes/05-kubernetes-storage.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Storage Options</h2>
      <div class="storage-grid" id="storage"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Scenario</label>
        <button onclick="app.setScenario('ephemeral')">Ephemeral</button>
        <button onclick="app.setScenario('persistent')">Persistent</button>
      </div>
      <div class="status">
        <div>Type: <strong id="type">Ephemeral</strong></div>
        <div>Lifecycle: <strong id="lifecycle">Pod</strong></div>
      </div>
      <div class="info-text">
        <strong>EmptyDir:</strong> Temporary pod storage
      </div>
      <div class="info-text">
        <strong>PersistentVolume:</strong> Cluster-scoped storage
      </div>
      <div class="info-text">
        <strong>StorageClass:</strong> Dynamic provisioning
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { scenario: 'ephemeral' },
      scenarios: {
        ephemeral: [
          { name: 'EmptyDir', lifecycle: 'Pod lifetime', use: 'Scratch space' },
          { name: 'HostPath', lifecycle: 'Node lifetime', use: 'Node-local data' }
        ],
        persistent: [
          { name: 'PVC+PV', lifecycle: 'Explicit delete', use: 'Databases' },
          { name: 'StorageClass', lifecycle: 'Dynamic', use: 'Auto-provisioned' }
        ]
      },
      init() { this.render(); },
      setScenario(s) { this.state.scenario = s; this.render(); },
      render() {
        const items = this.scenarios[this.state.scenario];
        const storage = document.getElementById('storage');
        storage.innerHTML = items.map(item => `
          <div class="storage-item">
            <h3>${item.name}</h3>
            <div class="detail">Lifecycle: ${item.lifecycle}</div>
            <div class="detail">Use: ${item.use}</div>
          </div>
        `).join('');
        document.getElementById('type').textContent = this.state.scenario === 'ephemeral' ? 'Ephemeral' : 'Persistent';
        document.getElementById('lifecycle').textContent = items[0].lifecycle;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
