<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP Caching Headers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; }
    h1 { font-size: 24px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    .header-list { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .header-item { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 4px solid #60a5fa; font-size: 11px; font-family: monospace; }
    .header-item.active { border-left-color: #10b981; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 HTTP Caching Headers</h1>
    <a href="../data/15-system-design/01-networking/03-http-https.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Cache Headers Configuration</h2>
      <div class="header-list" id="headers"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Scenario</label>
        <button onclick="app.setScenario('static')">Static Assets</button>
        <button onclick="app.setScenario('dynamic')">Dynamic Content</button>
        <button onclick="app.setScenario('api')">API Response</button>
      </div>
      <div class="status">
        <div>Scenario: <strong id="scenario">Static</strong></div>
        <div>Cache Duration: <strong id="duration">1 year</strong></div>
      </div>
      <div class="control-group">
        <button onclick="app.refresh()">Refresh Page</button>
      </div>
      <div class="info-text">
        <strong>Cache-Control:</strong> max-age, public/private, no-cache
      </div>
      <div class="info-text">
        <strong>ETag:</strong> Validate if stale with 304 Not Modified
      </div>
      <div class="info-text">
        <strong>Expires:</strong> Legacy absolute expiration time
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { scenario: 'static', hits: 0 },
      scenarios: {
        static: [
          'Cache-Control: public, max-age=31536000',
          'ETag: "abc123"',
          '→ Cached 1 year, checked via ETag'
        ],
        dynamic: [
          'Cache-Control: public, max-age=3600',
          'ETag: "dynamic-xyz"',
          '→ Cached 1 hour, revalidate daily'
        ],
        api: [
          'Cache-Control: private, no-cache',
          'ETag: "api-response-v1"',
          '→ Not cached, always revalidate'
        ]
      },
      init() { this.render(); },
      setScenario(s) { this.state.scenario = s; this.state.hits = 0; this.render(); },
      refresh() { this.state.hits++; this.render(); },
      render() {
        const headersDiv = document.getElementById('headers');
        const headers = this.scenarios[this.state.scenario];
        headersDiv.innerHTML = headers.map(h => `<div class="header-item ${h.includes('→') ? 'active' : ''}">${h}</div>`).join('');
        document.getElementById('scenario').textContent = this.state.scenario.charAt(0).toUpperCase() + this.state.scenario.slice(1);
        const durationMap = { static: '1 year', dynamic: '1 hour', api: 'None (always revalidate)' };
        document.getElementById('duration').textContent = durationMap[this.state.scenario];
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
