<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Raft Consensus — Interactive Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#e6edf3;padding:24px;max-width:900px;margin:0 auto}
h1{font-size:20px;margin-bottom:4px;color:#58a6ff}
.sub{color:#8b949e;font-size:13px;margin-bottom:20px}

/* cluster viz */
.cluster-container{position:relative;margin:24px 0;background:#161b22;border-radius:8px;border:1px solid #30363d}
.cluster-controls{display:flex;gap:8px;padding:12px;background:#0d1117;border-bottom:1px solid #30363d;border-radius:8px 8px 0 0;align-items:center}
.zoom-controls{display:flex;gap:4px}
.cluster-zoom-btn{padding:6px 12px;border:1px solid #30363d;border-radius:4px;background:#1c2128;color:#e6edf3;cursor:pointer;font-size:11px;transition:all .15s}
.cluster-zoom-btn:hover{border-color:#8b949e;background:#21262d}
.zoom-level{font-size:11px;color:#8b949e;margin:0 8px;min-width:40px;text-align:center}

.cluster{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;transition:transform .15s ease-out;transform-origin:top left}
.cluster-wrapper{padding:20px;background:#161b22;border-radius:0 0 8px 8px;overflow:auto;max-height:600px;position:relative}

.cluster.fullscreen-mode{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;background:#0d1117;border-radius:0;padding:60px 20px 20px;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));max-height:none;overflow:visible;display:grid}
.cluster-modal-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.7);z-index:9998;display:none}
.cluster-modal-overlay.active{display:block}
.cluster-close-btn{position:fixed;top:20px;right:20px;z-index:10000;padding:8px 16px;background:#f85149;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px}

.node{padding:16px;border-radius:8px;border:2px solid #30363d;background:#0d1117}
.node.follower{border-color:#2d5a7b;background:#1a3a5c}
.node.candidate{border-color:#d29922;background:#3a2a1a}
.node.leader{border-color:#3fb950;background:#1a3a2c}

.node-id{font-size:18px;font-weight:700;margin-bottom:8px}
.node-state{font-size:12px;font-weight:600;padding:4px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
.node-state.follower{background:#2d5a7b;color:#58a6ff}
.node-state.candidate{background:#3a2a1a;color:#d29922}
.node-state.leader{background:#1a3a2c;color:#3fb950}

.node-info{font-size:11px;color:#8b949e;margin:8px 0}
.node-info strong{color:#e6edf3;display:block;margin-top:4px}

/* vote viz */
.votes{margin-top:12px;padding:8px;background:#161b22;border-radius:4px}
.vote-item{font-size:10px;margin:2px 0;color:#8b949e}
.vote-item.granted{color:#3fb950}
.vote-item.denied{color:#f85149}

/* controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.btn{padding:8px 16px;border:1px solid #30363d;border-radius:6px;background:#1c2128;color:#e6edf3;cursor:pointer;font-size:12px;transition:all .15s}
.btn:hover{border-color:#8b949e;background:#21262d}
.btn.primary{background:#58a6ff;color:#000;border-color:#58a6ff;font-weight:600}
.btn.primary:hover{background:#79b8ff}
.btn.danger{background:#f85149;color:#fff;border-color:#f85149}
.btn.danger:hover{background:#da3633}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* timeline */
.timeline{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:16px 0}
.tl-item{padding:12px;margin:8px 0;border-left:3px solid #30363d;background:#0d1117;border-radius:4px;font-size:12px}
.tl-item.election{border-left-color:#d29922}
.tl-item.success{border-left-color:#3fb950}
.tl-item.info{border-left-color:#58a6ff}

.tl-ts{color:#8b949e;font-size:11px}
.tl-msg{color:#e6edf3;margin-top:4px}

/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin:12px 0}
.stat{background:#1c2128;padding:12px;border-radius:6px;border:1px solid #30363d;text-align:center}
.stat .num{font-size:24px;font-weight:700;color:#58a6ff}
.stat .lbl{font-size:10px;color:#8b949e;margin-top:4px}

h2{font-size:14px;margin:16px 0 8px;color:#e6edf3}

/* event log enhancements */
.log-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.log-search{flex:1;min-width:200px;padding:6px 12px;background:#1c2128;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px}
.log-search::placeholder{color:#8b949e}
.filter-btn{padding:6px 12px;border:1px solid #30363d;border-radius:6px;background:#1c2128;color:#e6edf3;cursor:pointer;font-size:11px;transition:all .15s}
.filter-btn:hover{border-color:#8b949e}
.filter-btn.active{background:#58a6ff;color:#000;border-color:#58a6ff;font-weight:600}

.timeline-grouped{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:16px 0}

.tl-term-group{margin-bottom:16px}
.tl-term-header{padding:8px 12px;background:#1c2128;border-left:4px solid #58a6ff;border-radius:4px;font-size:12px;font-weight:600;color:#58a6ff;cursor:pointer;user-select:none}
.tl-term-header:hover{background:#21262d}
.tl-term-header.collapsed::before{content:'▶ '}
.tl-term-header:not(.collapsed)::before{content:'▼ '}
.tl-term-events{margin-top:8px}
.tl-term-events.hidden{display:none}

.tl-item{padding:12px;margin:6px 0;border-left:3px solid #30363d;background:#0d1117;border-radius:4px;font-size:12px;animation:slideIn .3s ease-out;position:relative}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

.tl-item.election{border-left-color:#d29922}
.tl-item.success{border-left-color:#3fb950}
.tl-item.info{border-left-color:#58a6ff}

.tl-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;margin-right:6px;margin-bottom:6px}
.tl-badge.election{background:#3a2a1a;color:#d29922}
.tl-badge.success{background:#1a3a2c;color:#3fb950}
.tl-badge.info{background:#1a3a5c;color:#58a6ff}

.tl-ts{color:#8b949e;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.tl-duration{color:#6e7681;font-size:10px}

.tl-msg{color:#e6edf3;margin:8px 0;line-height:1.4}
.tl-nodes{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tl-node{padding:2px 8px;background:#1c2128;border:1px solid #30363d;border-radius:3px;font-size:10px;color:#8b949e}
.tl-node.leader{border-color:#3fb950;color:#3fb950;font-weight:600}
.tl-node.candidate{border-color:#d29922;color:#d29922;font-weight:600}
.tl-node.follower{border-color:#2d5a7b;color:#58a6ff}

.tl-diff{font-size:10px;color:#6e7681;margin-top:6px;padding:6px;background:#1c2128;border-radius:3px;font-family:monospace}
.tl-diff.added{color:#3fb950}
.tl-diff.removed{color:#f85149}

.tl-controls{display:flex;gap:8px;margin-bottom:12px}
.tl-btn{padding:6px 12px;border:1px solid #30363d;border-radius:6px;background:#1c2128;color:#e6edf3;cursor:pointer;font-size:11px;transition:all .15s}
.tl-btn:hover{border-color:#8b949e}
.tl-btn.playing{background:#58a6ff;color:#000}

@media(max-width:768px){.cluster{grid-template-columns:1fr}.controls{flex-direction:column}.log-controls{flex-direction:column}.log-search{min-width:100%}}
</style>
</head>
<body>

<h1>Raft Consensus — Leader Election Simulator</h1>
<div class="sub">Watch 3 nodes run Raft leader election. Click buttons to trigger events.</div>

<h2>Cluster State</h2>
<div class="cluster-container">
  <div class="cluster-controls">
    <div class="zoom-controls">
      <button class="cluster-zoom-btn" onclick="zoomCluster(-0.2)">−</button>
      <button class="cluster-zoom-btn" onclick="zoomCluster(0.2)">+</button>
      <button class="cluster-zoom-btn" onclick="resetZoom()">100%</button>
    </div>
    <div class="zoom-level" id="zoomLevel">100%</div>
    <div style="flex:1"></div>
    <button class="cluster-zoom-btn" onclick="toggleFullscreen()" style="background:#58a6ff;color:#000;border-color:#58a6ff;font-weight:600">⛶ Fullscreen</button>
  </div>
  <div class="cluster-wrapper">
    <div class="cluster" id="cluster"></div>
  </div>
</div>
<div class="cluster-modal-overlay" id="clusterOverlay" onclick="toggleFullscreen()"></div>
<button class="cluster-close-btn" id="clusterCloseBtn" style="display:none" onclick="toggleFullscreen()">✕ Exit Fullscreen</button>

<h2>Controls</h2>
<div class="controls">
  <button class="btn primary" onclick="triggerElectionTimeout()">⏱ Election Timeout</button>
  <button class="btn primary" onclick="triggerFollowerVote()">✓ Grant Vote</button>
  <button class="btn danger" onclick="triggerNetworkPartition()">⚠ Network Partition</button>
  <button class="btn" onclick="resetSim()">⟳ Reset</button>
</div>

<h2>Statistics</h2>
<div class="stats">
  <div class="stat"><div class="num" id="statTerm">0</div><div class="lbl">Current Term</div></div>
  <div class="stat"><div class="num" id="statLeaders">0</div><div class="lbl">Leaders Elected</div></div>
  <div class="stat"><div class="num" id="statElections">0</div><div class="lbl">Elections</div></div>
  <div class="stat"><div class="num" id="statPartitions">0</div><div class="lbl">Partitions</div></div>
</div>

<h2>Event Log</h2>
<div class="log-controls">
  <input type="text" class="log-search" id="logSearch" placeholder="Search events...">
  <button class="filter-btn active" data-filter="all" onclick="toggleFilter('all')">All</button>
  <button class="filter-btn" data-filter="election" onclick="toggleFilter('election')">⏱ Elections</button>
  <button class="filter-btn" data-filter="success" onclick="toggleFilter('success')">✓ Success</button>
  <button class="filter-btn" data-filter="info" onclick="toggleFilter('info')">ℹ Info</button>
</div>
<div class="tl-controls">
  <button class="tl-btn" id="playbackBtn" onclick="togglePlayback()">⏵ Playback</button>
  <button class="tl-btn" onclick="expandAll()">⊕ Expand All</button>
  <button class="tl-btn" onclick="collapseAll()">⊖ Collapse All</button>
</div>
<div class="timeline-grouped" id="timeline"></div>

<script>
const nodes = {
  A: { id: 'A', state: 'follower', term: 0, votedFor: null, votes: 0, timeout: randomTimeout() },
  B: { id: 'B', state: 'follower', term: 0, votedFor: null, votes: 0, timeout: randomTimeout() },
  C: { id: 'C', state: 'follower', term: 0, votedFor: null, votes: 0, timeout: randomTimeout() }
};

const sim = {
  electionCount: 0,
  leaderCount: 0,
  partitionCount: 0,
  partitioned: false,
  logs: [],
  activeFilters: { all: true, election: false, success: false, info: false },
  searchQuery: '',
  playbackActive: false,
  playbackIndex: 0,
  zoomLevel: 1.0,
  isFullscreen: false
};

function randomTimeout() {
  return 150 + Math.random() * 150;
}

function renderCluster() {
  const html = Object.values(nodes).map(node => `
    <div class="node ${node.state}">
      <div class="node-id">Node ${node.id}</div>
      <div class="node-state ${node.state}">${node.state.toUpperCase()}</div>
      <div class="node-info">
        <strong>Term: ${node.term}</strong>
        <strong>Timeout: ${node.timeout.toFixed(0)}ms</strong>
      </div>
      ${node.votedFor ? `<div class="node-info">Voted for: <strong>${node.votedFor}</strong></div>` : ''}
      ${node.votes > 0 ? `<div class="node-info">Votes received: <strong>${node.votes}/3</strong></div>` : ''}
    </div>
  `).join('');

  document.getElementById('cluster').innerHTML = html;
}

function triggerElectionTimeout() {
  const followerIds = Object.keys(nodes).filter(id => nodes[id].state === 'follower');
  if (followerIds.length === 0) return;

  const candidate = nodes[followerIds[Math.floor(Math.random() * followerIds.length)]];
  candidate.state = 'candidate';
  candidate.term++;
  candidate.votedFor = candidate.id;
  candidate.votes = 1;

  sim.electionCount++;
  log(`election`, `Node ${candidate.id} election timeout → CANDIDATE (term ${candidate.term})`, [candidate.id]);

  // Simulate vote collection
  let grantedVotes = 1;
  const voters = [];
  Object.keys(nodes).forEach(id => {
    if (id !== candidate.id) {
      const voter = nodes[id];
      if (voter.term < candidate.term) {
        voter.term = candidate.term;
        voter.votedFor = candidate.id;
        voter.state = 'follower';
        grantedVotes++;
        voters.push(id);
        log(`info`, `Node ${id} grants vote to Node ${candidate.id}`, [candidate.id, id]);
      }
    }
  });

  if (grantedVotes >= 2) {
    candidate.state = 'leader';
    candidate.votes = grantedVotes;
    sim.leaderCount++;
    log(`success`, `Node ${candidate.id} elected LEADER (${grantedVotes}/3 votes)`, [candidate.id]);

    // Reset non-leaders
    Object.keys(nodes).forEach(id => {
      if (id !== candidate.id) {
        nodes[id].state = 'follower';
        nodes[id].votes = 0;
      }
    });
  }

  updateStats();
  renderCluster();
}

function triggerFollowerVote() {
  const candidates = Object.values(nodes).filter(n => n.state === 'candidate');
  if (candidates.length === 0) return;

  const candidate = candidates[0];
  candidate.votes = Math.min(3, candidate.votes + 1);

  log(`info`, `Vote granted to Node ${candidate.id} (${candidate.votes}/3)`, [candidate.id]);

  if (candidate.votes >= 2) {
    candidate.state = 'leader';
    sim.leaderCount++;
    log(`success`, `Node ${candidate.id} wins election with ${candidate.votes}/3 votes`, [candidate.id]);
  }

  updateStats();
  renderCluster();
}

function triggerNetworkPartition() {
  sim.partitionCount++;
  sim.partitioned = !sim.partitioned;

  const msg = sim.partitioned ?
    'Network partition detected — Node C isolated' :
    'Network healed — full connectivity restored';

  log(`election`, msg, ['C']);

  if (sim.partitioned) {
    nodes.C.state = 'follower';
    nodes.C.term++;
  }

  updateStats();
  renderCluster();
}

function resetSim() {
  Object.keys(nodes).forEach(id => {
    nodes[id].state = 'follower';
    nodes[id].term = 0;
    nodes[id].votedFor = null;
    nodes[id].votes = 0;
    nodes[id].timeout = randomTimeout();
  });

  sim.logs = [];
  sim.partitioned = false;
  updateStats();
  renderCluster();
  renderTimeline();
}

function log(type, msg, affectedNodes = []) {
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const currentTerm = Math.max(...Object.values(nodes).map(n => n.term));
  const nodeStates = {};
  Object.keys(nodes).forEach(id => {
    nodeStates[id] = { state: nodes[id].state, term: nodes[id].term, votes: nodes[id].votes };
  });

  const newLog = {
    type,
    msg,
    ts,
    term: currentTerm,
    affectedNodes: affectedNodes.length > 0 ? affectedNodes : [],
    nodeStates: JSON.parse(JSON.stringify(nodeStates)),
    index: sim.logs.length
  };

  sim.logs.unshift(newLog);
  if (sim.logs.length > 50) sim.logs.pop();

  if (!sim.playbackActive) renderTimeline();
}

function renderTimeline() {
  // Filter logs based on active filters and search query
  let filtered = sim.logs.filter(log => {
    const matchesFilter = sim.activeFilters.all || sim.activeFilters[log.type];
    const matchesSearch = log.msg.toLowerCase().includes(sim.searchQuery.toLowerCase());
    return matchesFilter && matchesSearch;
  });

  // Group by term
  const grouped = {};
  filtered.forEach(log => {
    if (!grouped[log.term]) grouped[log.term] = [];
    grouped[log.term].push(log);
  });

  // Sort terms descending
  const terms = Object.keys(grouped).map(Number).sort((a, b) => b - a);

  let html = terms.map(term => {
    const events = grouped[term];
    const isCollapsed = localStorage.getItem(`term-${term}-collapsed`) === 'true';

    return `
      <div class="tl-term-group">
        <div class="tl-term-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleTerm(${term})">
          Term ${term} (${events.length} event${events.length !== 1 ? 's' : ''})
        </div>
        <div class="tl-term-events ${isCollapsed ? 'hidden' : ''}">
          ${events.map((log, idx) => {
            const nextLog = events[idx + 1];
            const duration = nextLog ?
              ` (+${Math.abs(new Date(`2000-01-01 ${log.ts}`) - new Date(`2000-01-01 ${nextLog.ts}`)) / 1000}s)` : '';

            const nodeElements = log.affectedNodes.map(nodeId => {
              const state = log.nodeStates[nodeId]?.state || 'unknown';
              return `<div class="tl-node ${state}">Node ${nodeId}</div>`;
            }).join('');

            return `
              <div class="tl-item ${log.type}">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
                  <span class="tl-badge ${log.type}">
                    ${log.type === 'election' ? '⏱' : log.type === 'success' ? '✓' : 'ℹ'}
                    ${log.type.toUpperCase()}
                  </span>
                </div>
                <div class="tl-ts">
                  <span>${log.ts}</span>
                  ${duration ? `<span class="tl-duration">${duration}</span>` : ''}
                </div>
                <div class="tl-msg">${log.msg}</div>
                ${nodeElements ? `<div class="tl-nodes">${nodeElements}</div>` : ''}
                <div class="tl-diff">
                  <strong>State:</strong>
                  ${Object.keys(log.nodeStates).map(id =>
                    `<div style="margin-top:4px">Node ${id}: Term ${log.nodeStates[id].term} | ${log.nodeStates[id].state.toUpperCase()} ${log.nodeStates[id].votes > 0 ? `(${log.nodeStates[id].votes} votes)` : ''}</div>`
                  ).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('timeline').innerHTML = html || '<div style="padding:16px;color:#8b949e;text-align:center">No events yet</div>';
}

function updateStats() {
  const currentTerm = Math.max(...Object.values(nodes).map(n => n.term));
  document.getElementById('statTerm').textContent = currentTerm;
  document.getElementById('statLeaders').textContent = sim.leaderCount;
  document.getElementById('statElections').textContent = sim.electionCount;
  document.getElementById('statPartitions').textContent = sim.partitionCount;
}

function toggleFilter(filter) {
  if (filter === 'all') {
    const allActive = sim.activeFilters.all;
    Object.keys(sim.activeFilters).forEach(f => sim.activeFilters[f] = !allActive);
  } else {
    sim.activeFilters.all = false;
    sim.activeFilters[filter] = !sim.activeFilters[filter];
    const anyActive = Object.keys(sim.activeFilters).some(f => f !== 'all' && sim.activeFilters[f]);
    if (!anyActive) sim.activeFilters.all = true;
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    const btnFilter = btn.dataset.filter;
    btn.classList.toggle('active', sim.activeFilters[btnFilter]);
  });

  renderTimeline();
}

function setupSearch() {
  const search = document.getElementById('logSearch');
  if (search) {
    search.addEventListener('input', (e) => {
      sim.searchQuery = e.target.value;
      renderTimeline();
    });
  }
}

function toggleTerm(term) {
  const isCollapsed = localStorage.getItem(`term-${term}-collapsed`) === 'true';
  localStorage.setItem(`term-${term}-collapsed`, !isCollapsed);
  renderTimeline();
}

function expandAll() {
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('term-') && key.endsWith('-collapsed')) {
      localStorage.removeItem(key);
    }
  }
  renderTimeline();
}

function collapseAll() {
  const terms = sim.logs.map(log => log.term);
  const uniqueTerms = [...new Set(terms)];
  uniqueTerms.forEach(term => localStorage.setItem(`term-${term}-collapsed`, 'true'));
  renderTimeline();
}

function togglePlayback() {
  sim.playbackActive = !sim.playbackActive;
  const btn = document.getElementById('playbackBtn');
  btn.classList.toggle('playing', sim.playbackActive);

  if (sim.playbackActive) {
    sim.playbackIndex = 0;
    playbackStep();
  }
}

function playbackStep() {
  if (!sim.playbackActive) {
    document.getElementById('playbackBtn').classList.remove('playing');
    return;
  }

  if (sim.playbackIndex < sim.logs.length) {
    sim.playbackIndex++;
    renderTimeline();
    setTimeout(playbackStep, 800);
  } else {
    sim.playbackActive = false;
    document.getElementById('playbackBtn').classList.remove('playing');
  }
}

function zoomCluster(delta) {
  sim.zoomLevel = Math.max(0.5, Math.min(2, sim.zoomLevel + delta));
  applyZoom();
}

function resetZoom() {
  sim.zoomLevel = 1.0;
  applyZoom();
}

function applyZoom() {
  const cluster = document.getElementById('cluster');
  cluster.style.transform = `scale(${sim.zoomLevel})`;
  document.getElementById('zoomLevel').textContent = `${Math.round(sim.zoomLevel * 100)}%`;
}

function toggleFullscreen() {
  sim.isFullscreen = !sim.isFullscreen;
  const cluster = document.getElementById('cluster');
  const overlay = document.getElementById('clusterOverlay');
  const closeBtn = document.getElementById('clusterCloseBtn');
  const container = document.querySelector('.cluster-container');

  if (sim.isFullscreen) {
    cluster.classList.add('fullscreen-mode');
    overlay.classList.add('active');
    closeBtn.style.display = 'block';
    document.body.style.overflow = 'hidden';
  } else {
    cluster.classList.remove('fullscreen-mode');
    overlay.classList.remove('active');
    closeBtn.style.display = 'none';
    document.body.style.overflow = 'auto';
  }
}

renderCluster();
renderTimeline();
updateStats();
setupSearch();
</script>


<script>
// Hash navigation: scroll to element on load + hashchange
(function(){
  function scrollToHash(){
    var h = window.location.hash;
    if(h && h.length > 1){
      var el = document.getElementById(h.substring(1));
      if(el) setTimeout(function(){ el.scrollIntoView({behavior:'smooth', block:'start'}); }, 200);
    }
  }
  window.addEventListener('hashchange', scrollToHash);
  window.addEventListener('load', scrollToHash);
})();
</script>
</body>
</html>
