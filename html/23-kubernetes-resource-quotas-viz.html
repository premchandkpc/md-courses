<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kubernetes Resource Quotas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .quota-meter { background: #334155; padding: 15px; border-radius: 8px; margin: 15px 0; }
    .meter-label { font-size: 12px; color: #cbd5e1; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .meter-bar { background: #1e293b; height: 20px; border-radius: 4px; overflow: hidden; }
    .meter-fill { height: 100%; background: linear-gradient(90deg, #60a5fa, #3b82f6); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Kubernetes Resource Quotas</h1>
    <a href="../data/07-kubernetes/05-kubernetes-storage.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Namespace Quotas</h2>
      <div id="quotas"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.addPod()">Add Pod</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>CPU Used: <strong id="cpu">0/4</strong></div>
        <div>Memory: <strong id="mem">0/8</strong></div>
      </div>
      <div class="info-text">
        <strong>ResourceQuota:</strong> Limits per namespace
      </div>
      <div class="info-text">
        <strong>LimitRange:</strong> Per-pod limits
      </div>
      <div class="info-text">
        <strong>Fair allocation:</strong> Prevent starvation
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { cpu: 0, maxCpu: 4, mem: 0, maxMem: 8 },
      init() { this.render(); },
      addPod() { if(this.state.cpu + 1 <= this.state.maxCpu) { this.state.cpu += 1; this.state.mem += 2; } this.render(); },
      reset() { this.state.cpu = 0; this.state.mem = 0; this.render(); },
      render() {
        const quotasDiv = document.getElementById('quotas');
        const cpuPct = Math.round((this.state.cpu / this.state.maxCpu) * 100);
        const memPct = Math.round((this.state.mem / this.state.maxMem) * 100);
        quotasDiv.innerHTML = `
          <div class="quota-meter">
            <div class="meter-label"><span>CPU</span><span>${this.state.cpu}/${this.state.maxCpu}</span></div>
            <div class="meter-bar"><div class="meter-fill" style="width:${cpuPct}%"></div></div>
          </div>
          <div class="quota-meter">
            <div class="meter-label"><span>Memory (Gi)</span><span>${this.state.mem}/${this.state.maxMem}</span></div>
            <div class="meter-bar"><div class="meter-fill" style="width:${memPct}%"></div></div>
          </div>
        `;
        document.getElementById('cpu').textContent = `${this.state.cpu}/${this.state.maxCpu}`;
        document.getElementById('mem').textContent = `${this.state.mem}/${this.state.maxMem}`;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
