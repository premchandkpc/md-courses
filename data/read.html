<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>📚 Engineering Knowledge Universe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1c2128;
      --border: #30363d;
      --fg: #e6edf3;
      --fg2: #8b949e;
      --fg3: #6e7681;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --accent3: #d29922;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.6;
    }
    .container { display: flex; height: 100vh; }
    .sidebar {
      width: 310px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      flex-shrink: 0;
    }
    .sidebar-search {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-search input {
      width: 100%;
      padding: 6px 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--fg);
      font-size: 12px;
      outline: none;
    }
    .sidebar-search input:focus {
      border-color: var(--accent);
    }
    .sidebar-tree {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .search-results {
      padding: 8px 10px;
      font-size: 11px;
      color: var(--fg3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tree-item {
      display: flex;
      align-items: center;
      padding: 4px 10px;
      cursor: pointer;
      gap: 6px;
      font-size: 13px;
      user-select: none;
    }
    .tree-item:hover { background: var(--bg3); }
    .tree-item.active { background: var(--accent); color: #000; font-weight: 600; }
    .tree-item.folder { font-weight: 500; }
    .tree-item.file { padding-left: 24px; }
    .tree-item.hidden { display: none; }
    .tree-item .match { background: var(--accent3); color: #000; padding: 0 2px; border-radius: 2px; }
    .tree-toggle {
      cursor: pointer;
      color: var(--fg3);
      font-size: 10px;
      width: 12px;
      text-align: center;
      flex-shrink: 0;
    }
    .tree-children { padding-left: 12px; display: none; }
    .tree-children.open { display: block; }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .content-header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .content-header h1 { font-size: 20px; margin-bottom: 4px; }
    .content-header .path { font-size: 11px; color: var(--fg3); }
    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px 40px;
      max-width: 900px;
    }
    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      text-align: center;
    }
    .start-screen h1 { font-size: 28px; }
    .start-screen p { color: var(--fg2); max-width: 480px; }
    .md h1 { font-size: 24px; margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .md h2 { font-size: 18px; margin: 16px 0 8px; }
    .md h3 { font-size: 15px; margin: 14px 0 6px; }
    .md p { margin: 6px 0; }
    .md ul, .md ol { margin: 6px 0; padding-left: 22px; }
    .md li { margin: 3px 0; }
    .md strong { color: var(--fg); }
    .md a { color: var(--accent); text-decoration: none; cursor: pointer; }
    .md a:hover { text-decoration: underline; }
    .md code {
      font-family: var(--mono);
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      color: var(--accent2);
    }
    .md pre {
      background: var(--bg3);
      padding: 14px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 10px 0;
      border: 1px solid var(--border);
    }
    .md pre code {
      background: none;
      padding: 0;
      font-size: 12px;
      line-height: 1.5;
      color: var(--fg);
      font-family: var(--mono);
    }
    .md blockquote {
      border-left: 3px solid var(--accent2);
      padding: 6px 14px;
      margin: 10px 0;
      background: var(--bg3);
    }
    .md blockquote p { color: var(--fg2); }
    .md table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .md th, .md td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; font-size: 12px; }
    .md th { background: var(--bg3); font-weight: 600; }
    .md tr:nth-child(even) td { background: var(--bg2); }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .loading { color: var(--fg3); font-style: italic; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    @media (max-width: 768px) {
      .sidebar { width: 200px; }
      .content-body { padding: 14px 16px 28px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">📚 Explorer</div>
      <div class="sidebar-search">
        <input type="text" id="search" placeholder="Search..." autocomplete="off">
      </div>
      <div class="search-results" id="search-count" style="display: none;"></div>
      <div class="sidebar-tree" id="tree"></div>
    </div>
    <div class="content">
      <div class="start-screen" id="start">
        <div style="font-size: 40px">📚</div>
        <h1>Engineering Knowledge Universe</h1>
        <p>Select a file from the sidebar</p>
      </div>
      <div id="file-view" style="display: none; flex: 1; overflow: hidden; flex-direction: column;">
        <div class="content-header">
          <h1 id="file-title"></h1>
          <div class="path" id="file-path"></div>
        </div>
        <div class="content-body md" id="file-content"></div>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    let tree = [];
    let allFiles = [];
    let searchTimeout;

    async function init() {
      try {
        const res = await fetch(`${API}/tree`);
        const data = await res.json();
        tree = data.tree || [];
        collectFiles(tree);
        renderAndBind();
      } catch (err) {
        document.getElementById('tree').innerHTML = '<div style="padding: 14px; color: var(--fg3)">Failed to load</div>';
      }
    }

    function collectFiles(nodes, prefix = '') {
      for (const node of nodes) {
        const path = prefix ? `${prefix}/${node.name}` : node.name;
        if (node.type === 'dir') {
          collectFiles(node.children || [], path);
        } else {
          allFiles.push({ path, name: node.name });
        }
      }
    }

    function renderAndBind() {
      document.getElementById('tree').innerHTML = renderTree(tree);
      attachListeners();
      setupSearch();
    }

    function setupSearch() {
      const input = document.getElementById('search');
      input.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(search, 100);
      });
    }

    function search() {
      const query = document.getElementById('search').value.toLowerCase().trim();
      const counter = document.getElementById('search-count');

      if (!query) {
        document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('hidden'));
        document.querySelectorAll('.tree-item .match').forEach(el => el.outerHTML = el.textContent);
        counter.style.display = 'none';
        return;
      }

      const matches = [];
      for (const file of allFiles) {
        if (file.path.toLowerCase().includes(query)) {
          matches.push(file.path);
        }
      }

      document.querySelectorAll('.tree-item').forEach(el => {
        const path = el.dataset.path;
        if (path) {
          const isMatch = matches.includes(path);
          el.classList.toggle('hidden', !isMatch);
        } else {
          const hasVisibleChildren = hasAnyVisibleChild(el);
          el.classList.toggle('hidden', !hasVisibleChildren);
        }
      });

      counter.textContent = `${matches.length} result${matches.length !== 1 ? 's' : ''}`;
      counter.style.display = matches.length > 0 ? 'block' : 'none';

      highlightMatches(query);
    }

    function hasAnyVisibleChild(folderEl) {
      const children = folderEl.nextElementSibling;
      if (!children || !children.classList.contains('tree-children')) return false;
      const items = children.querySelectorAll('.tree-item.file:not(.hidden)');
      return items.length > 0;
    }

    function highlightMatches(query) {
      document.querySelectorAll('.tree-item.file:not(.hidden)').forEach(el => {
        const nameSpan = el.querySelector('span:last-child');
        const text = nameSpan.textContent;
        const idx = text.toLowerCase().indexOf(query);
        if (idx !== -1) {
          nameSpan.innerHTML =
            esc(text.substring(0, idx)) +
            `<span class="match">${esc(text.substring(idx, idx + query.length))}</span>` +
            esc(text.substring(idx + query.length));
        }
      });
    }

    function attachListeners() {
      document.querySelectorAll('.tree-toggle').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const children = el.parentElement.nextElementSibling;
          if (children && children.classList.contains('tree-children')) {
            children.classList.toggle('open');
            el.textContent = children.classList.contains('open') ? '▼' : '▶';
          }
        });
      });

      document.querySelectorAll('.tree-item.file').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          loadFile(el.dataset.path);
        });
      });
    }

    function renderTree(nodes, depth = 0) {
      let html = '';
      for (const node of nodes) {
        if (node.type === 'dir') {
          html += `<div class="tree-item folder" style="padding-left: ${depth * 12}px">
            <span class="tree-toggle">▼</span>
            <span>📁 ${esc(node.name)}</span>
          </div>
          <div class="tree-children open">
            ${renderTree(node.children || [], depth + 1)}
          </div>`;
        } else {
          html += `<div class="tree-item file" data-path="${esc(node.path)}" style="padding-left: ${depth * 12}px">
            <span>📄</span>
            <span>${esc(node.name.replace(/\.md$/, ''))}</span>
          </div>`;
        }
      }
      return html;
    }

    async function loadFile(path) {
      document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
      document.querySelector(`[data-path="${path}"]`)?.classList.add('active');

      document.getElementById('start').style.display = 'none';
      document.getElementById('file-view').style.display = 'flex';
      document.getElementById('file-title').textContent = path.split('/').pop().replace(/\.md$/, '');
      document.getElementById('file-path').textContent = path;
      document.getElementById('file-content').innerHTML = '<span class="loading">Loading...</span>';

      try {
        const res = await fetch(`${API}/file?path=${encodeURIComponent(path)}`);
        const data = await res.json();
        if (data.error) {
          document.getElementById('file-content').innerHTML = `<p>Error: ${esc(data.error)}</p>`;
        } else {
          document.getElementById('file-content').innerHTML = md(data.content);
        }
      } catch {
        document.getElementById('file-content').innerHTML = '<p>Failed to load</p>';
      }
    }

    function md(text) {
      if (!text) return '<p>Empty</p>';
      const blocks = [];
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
        blocks.push({ lang, code: code.trim() });
        return `__CODE${blocks.length - 1}__`;
      });
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, label, url) =>
        url.endsWith('.md') ? `<a onclick="loadFile('${url}'); return false">${label}</a>` : `<a href="${url}" target="_blank">${label}</a>`
      );
      text = text.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
      text = text.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
      text = text.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
      text = text.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
      text = text.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
      text = text.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');
      text = text.replace(/^\s*[-*+]\s+(.+)$/gm, '<li>$1</li>');
      text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      text = text.replace(/^\s*\d+\.\s+(.+)$/gm, '<li>$1</li>');
      text = text.replace(/((?:<li>.*<\/li>\n?)+)/g, m => m.includes('<ul>') ? m : '<ol>' + m + '</ol>');
      text = text.replace(/^>\s+(.+)$/gm, '__BQ__$1\n');
      text = text.replace(/((__BQ__[^\n]+\n?)+)/g, m => {
        const lines = m.split('\n').map(x => x.replace('__BQ__', '').trim()).filter(Boolean);
        return '<blockquote>' + lines.map(x => '<p>' + x + '</p>').join('') + '</blockquote>\n';
      });
      text = text.replace(/^---$/gm, '<hr>');
      text = text.replace(/^(?!<[hH]|<ul|<ol|<blockquote|<table|<pre|<hr)(.+)$/gm, '<p>$1</p>');
      text = text.replace(/<p>\s*<\/p>/g, '');
      for (let i = 0; i < blocks.length; i++) {
        const { code } = blocks[i];
        text = text.replace(`__CODE${i}__`, `<pre><code>${esc(code)}</code></pre>`);
      }
      return text;
    }

    function esc(s) {
      const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return s.replace(/[&<>"']/g, x => m[x]);
    }

    init();
  </script>
</body>
</html>
