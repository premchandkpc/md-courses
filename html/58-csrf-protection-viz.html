<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSRF Protection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .flow { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .flow-step { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .flow-step.blocked { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 CSRF Protection</h1>
    <a href="../data/13-security/01-owasp-top-10-authentication-authorization.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Request Flow</h2>
      <div class="flow" id="flow"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Test Request</label>
        <button onclick="app.testUnprotected()">Without Token</button>
        <button onclick="app.testProtected()">With Token</button>
      </div>
      <div class="status">
        <div>Status: <strong id="status">-</strong></div>
        <div>Result: <strong id="result">-</strong></div>
      </div>
      <div class="info-text">
        <strong>SameSite:</strong> Cookie attribute
      </div>
      <div class="info-text">
        <strong>Token:</strong> Per-request verification
      </div>
      <div class="info-text">
        <strong>Origin:</strong> Header validation
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { protected: false },
      init() { this.render(); },
      testUnprotected() { this.state.protected = false; this.render(); },
      testProtected() { this.state.protected = true; this.render(); },
      render() {
        const flowDiv = document.getElementById('flow');
        const steps = this.state.protected
          ? [
              '1. User visit app.com',
              '2. CSRF token generated',
              '3. Token in form',
              '✓ Token validated on POST'
            ]
          : [
              '1. User visit attacker.com',
              '2. Malicious form',
              '3. Auto-submit to app.com',
              '✗ No token, request blocked'
            ];
        flowDiv.innerHTML = steps.map((s, i) => `
          <div class="flow-step ${this.state.protected ? 'blocked' : ''}">
            ${s}
          </div>
        `).join('');
        document.getElementById('status').textContent = this.state.protected ? 'Protected' : 'Vulnerable';
        document.getElementById('result').textContent = this.state.protected ? '✓ Allowed' : '✗ Blocked';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
