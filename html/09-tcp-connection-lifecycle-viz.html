<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCP Connection Lifecycle</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; }
    h1 { font-size: 24px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    svg { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 TCP Connection Lifecycle</h1>
    <a href="../data/15-system-design/01-networking/01-tcp-ip-protocol-stack.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas"><svg></svg></div>
    <div class="controls">
      <div class="control-group">
        <label>Simulation</label>
        <button onclick="app.connect()">Connect</button>
        <button onclick="app.disconnect()">Disconnect</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>State: <strong id="state">CLOSED</strong></div>
        <div>Packets Sent: <strong id="packets">0</strong></div>
      </div>
      <div class="info-text">
        <strong>3-Way Handshake:</strong> SYN, SYN-ACK, ACK to establish
      </div>
      <div class="info-text">
        <strong>Data Transfer:</strong> Reliable delivery with sequence numbers
      </div>
      <div class="info-text">
        <strong>Graceful Close:</strong> FIN, ACK handshake
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { phase: 'closed', packets: 0 },
      phases: ['CLOSED', 'SYN_SENT', 'SYN_RECEIVED', 'ESTABLISHED', 'FIN_WAIT', 'CLOSED'],
      init() { this.svg = d3.select('svg'); this.render(); },
      connect() { if (this.state.phase === 'closed') { this.state.phase = 'syn_sent'; this.state.packets++; } else if (this.state.phase === 'syn_sent') { this.state.phase = 'established'; this.state.packets++; } this.render(); },
      disconnect() { if (this.state.phase === 'established') { this.state.phase = 'fin_wait'; this.state.packets++; } else if (this.state.phase === 'fin_wait') { this.state.phase = 'closed'; this.state.packets++; } this.render(); },
      reset() { this.state = { phase: 'closed', packets: 0 }; this.render(); },
      render() {
        const width = this.svg.node().parentElement.clientWidth;
        const height = this.svg.node().parentElement.clientHeight;
        this.svg.selectAll('*').remove();
        const states = ['CLOSED', 'SYN_SENT', 'ESTABLISHED', 'FIN_WAIT', 'CLOSED'];
        const y = height / 2;
        const spacing = width / 6;

        states.forEach((s, i) => {
          const x = spacing * (i + 1);
          const isActive = this.state.phase === s.toLowerCase().replace(/_/g, '_');
          this.svg.append('circle').attr('cx', x).attr('cy', y).attr('r', 30).attr('fill', isActive ? '#10b981' : '#334155');
          this.svg.append('text').attr('x', x).attr('y', y + 5).attr('text-anchor', 'middle').attr('fill', '#e2e8f0').attr('font-size', '11px').text(s);

          if (i < states.length - 1) {
            this.svg.append('line').attr('x1', x + 30).attr('y1', y).attr('x2', spacing * (i + 2) - 30).attr('y2', y).attr('stroke', '#64748b').attr('stroke-width', 2).attr('marker-end', 'url(#arrowhead)');
          }
        });

        document.getElementById('state').textContent = this.state.phase.replace(/_/g, '_').toUpperCase();
        document.getElementById('packets').textContent = this.state.packets;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
