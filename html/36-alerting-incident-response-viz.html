<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerting & Incident Response</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .incident { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #ef4444; }
    .incident.resolved { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
    .incident-title { font-weight: bold; margin-bottom: 8px; }
    .incident-detail { font-size: 11px; color: #cbd5e1; margin: 4px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Alerting & Incident Response</h1>
    <a href="../data/14-sre-observability/monitoring/02-grafana-slos-alerting-incident-response.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Incident Timeline</h2>
      <div id="timeline"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.trigger()">Trigger Alert</button>
        <button onclick="app.resolve()">Resolve</button>
        <button onclick="app.reset()">Clear</button>
      </div>
      <div class="status">
        <div>Status: <strong id="status">OK</strong></div>
        <div>Incidents: <strong id="count">0</strong></div>
      </div>
      <div class="info-text">
        <strong>Alert Rules:</strong> Threshold conditions
      </div>
      <div class="info-text">
        <strong>Escalation:</strong> Page on-call team
      </div>
      <div class="info-text">
        <strong>Runbook:</strong> Resolution steps
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { alerting: false, resolved: false, count: 0 },
      init() { this.render(); },
      trigger() { this.state.alerting = true; this.state.resolved = false; this.state.count++; this.render(); },
      resolve() { if(this.state.alerting) { this.state.resolved = true; } this.render(); },
      reset() { this.state = { alerting: false, resolved: false, count: 0 }; this.render(); },
      render() {
        const timeline = document.getElementById('timeline');
        if(this.state.alerting) {
          timeline.innerHTML = `
            <div class="incident ${this.state.resolved ? 'resolved' : ''}">
              <div class="incident-title">${this.state.resolved ? '✓ Resolved' : '⚠ CRITICAL'}: High CPU Usage</div>
              <div class="incident-detail">Alert triggered: CPU > 80%</div>
              <div class="incident-detail">Paged: oncall-team</div>
              ${this.state.resolved ? '<div class="incident-detail">Resolved at: 15:45 UTC</div>' : ''}
            </div>
          `;
        } else {
          timeline.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">No active incidents</div>';
        }
        document.getElementById('status').textContent = this.state.alerting ? (this.state.resolved ? 'Resolved' : 'Critical') : 'OK';
        document.getElementById('count').textContent = this.state.count;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
