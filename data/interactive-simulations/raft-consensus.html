<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Raft Consensus — Interactive Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#e6edf3;padding:24px;max-width:900px;margin:0 auto}
h1{font-size:20px;margin-bottom:4px;color:#58a6ff}
.sub{color:#8b949e;font-size:13px;margin-bottom:20px}

/* cluster viz */
.cluster{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0;padding:20px;background:#161b22;border-radius:8px;border:1px solid #30363d}

.node{padding:16px;border-radius:8px;border:2px solid #30363d;background:#0d1117}
.node.follower{border-color:#2d5a7b;background:#1a3a5c}
.node.candidate{border-color:#d29922;background:#3a2a1a}
.node.leader{border-color:#3fb950;background:#1a3a2c}

.node-id{font-size:18px;font-weight:700;margin-bottom:8px}
.node-state{font-size:12px;font-weight:600;padding:4px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
.node-state.follower{background:#2d5a7b;color:#58a6ff}
.node-state.candidate{background:#3a2a1a;color:#d29922}
.node-state.leader{background:#1a3a2c;color:#3fb950}

.node-info{font-size:11px;color:#8b949e;margin:8px 0}
.node-info strong{color:#e6edf3;display:block;margin-top:4px}

/* vote viz */
.votes{margin-top:12px;padding:8px;background:#161b22;border-radius:4px}
.vote-item{font-size:10px;margin:2px 0;color:#8b949e}
.vote-item.granted{color:#3fb950}
.vote-item.denied{color:#f85149}

/* controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.btn{padding:8px 16px;border:1px solid #30363d;border-radius:6px;background:#1c2128;color:#e6edf3;cursor:pointer;font-size:12px;transition:all .15s}
.btn:hover{border-color:#8b949e;background:#21262d}
.btn.primary{background:#58a6ff;color:#000;border-color:#58a6ff;font-weight:600}
.btn.primary:hover{background:#79b8ff}
.btn.danger{background:#f85149;color:#fff;border-color:#f85149}
.btn.danger:hover{background:#da3633}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* timeline */
.timeline{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:16px 0}
.tl-item{padding:12px;margin:8px 0;border-left:3px solid #30363d;background:#0d1117;border-radius:4px;font-size:12px}
.tl-item.election{border-left-color:#d29922}
.tl-item.success{border-left-color:#3fb950}
.tl-item.info{border-left-color:#58a6ff}

.tl-ts{color:#8b949e;font-size:11px}
.tl-msg{color:#e6edf3;margin-top:4px}

/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin:12px 0}
.stat{background:#1c2128;padding:12px;border-radius:6px;border:1px solid #30363d;text-align:center}
.stat .num{font-size:24px;font-weight:700;color:#58a6ff}
.stat .lbl{font-size:10px;color:#8b949e;margin-top:4px}

h2{font-size:14px;margin:16px 0 8px;color:#e6edf3}

@media(max-width:768px){.cluster{grid-template-columns:1fr}.controls{flex-direction:column}}
</style>
</head>
<body>

<h1>Raft Consensus — Leader Election Simulator</h1>
<div class="sub">Watch 3 nodes run Raft leader election. Click buttons to trigger events.</div>

<h2>Cluster State</h2>
<div class="cluster" id="cluster"></div>

<h2>Controls</h2>
<div class="controls">
  <button class="btn primary" onclick="triggerElectionTimeout()">⏱ Election Timeout</button>
  <button class="btn primary" onclick="triggerFollowerVote()">✓ Grant Vote</button>
  <button class="btn danger" onclick="triggerNetworkPartition()">⚠ Network Partition</button>
  <button class="btn" onclick="resetSim()">⟳ Reset</button>
</div>

<h2>Statistics</h2>
<div class="stats">
  <div class="stat"><div class="num" id="statTerm">0</div><div class="lbl">Current Term</div></div>
  <div class="stat"><div class="num" id="statLeaders">0</div><div class="lbl">Leaders Elected</div></div>
  <div class="stat"><div class="num" id="statElections">0</div><div class="lbl">Elections</div></div>
  <div class="stat"><div class="num" id="statPartitions">0</div><div class="lbl">Partitions</div></div>
</div>

<h2>Event Log</h2>
<div class="timeline" id="timeline"></div>

<script>
const nodes = {
  A: { id: 'A', state: 'follower', term: 0, votedFor: null, votes: 0, timeout: randomTimeout() },
  B: { id: 'B', state: 'follower', term: 0, votedFor: null, votes: 0, timeout: randomTimeout() },
  C: { id: 'C', state: 'follower', term: 0, votedFor: null, votes: 0, timeout: randomTimeout() }
};

const sim = {
  electionCount: 0,
  leaderCount: 0,
  partitionCount: 0,
  partitioned: false,
  logs: []
};

function randomTimeout() {
  return 150 + Math.random() * 150;
}

function renderCluster() {
  const html = Object.values(nodes).map(node => `
    <div class="node ${node.state}">
      <div class="node-id">Node ${node.id}</div>
      <div class="node-state ${node.state}">${node.state.toUpperCase()}</div>
      <div class="node-info">
        <strong>Term: ${node.term}</strong>
        <strong>Timeout: ${node.timeout.toFixed(0)}ms</strong>
      </div>
      ${node.votedFor ? `<div class="node-info">Voted for: <strong>${node.votedFor}</strong></div>` : ''}
      ${node.votes > 0 ? `<div class="node-info">Votes received: <strong>${node.votes}/3</strong></div>` : ''}
    </div>
  `).join('');

  document.getElementById('cluster').innerHTML = html;
}

function triggerElectionTimeout() {
  const followerIds = Object.keys(nodes).filter(id => nodes[id].state === 'follower');
  if (followerIds.length === 0) return;

  const candidate = nodes[followerIds[Math.floor(Math.random() * followerIds.length)]];
  candidate.state = 'candidate';
  candidate.term++;
  candidate.votedFor = candidate.id;
  candidate.votes = 1;

  sim.electionCount++;
  log(`info`, `Node ${candidate.id} election timeout → CANDIDATE (term ${candidate.term})`);

  // Simulate vote collection
  let grantedVotes = 1;
  Object.keys(nodes).forEach(id => {
    if (id !== candidate.id) {
      const voter = nodes[id];
      if (voter.term < candidate.term) {
        voter.term = candidate.term;
        voter.votedFor = candidate.id;
        voter.state = 'follower';
        grantedVotes++;
        log(`info`, `Node ${id} grants vote to Node ${candidate.id}`);
      }
    }
  });

  if (grantedVotes >= 2) {
    candidate.state = 'leader';
    candidate.votes = grantedVotes;
    sim.leaderCount++;
    log(`success`, `Node ${candidate.id} elected LEADER (${grantedVotes}/3 votes)`);

    // Reset non-leaders
    Object.keys(nodes).forEach(id => {
      if (id !== candidate.id) {
        nodes[id].state = 'follower';
        nodes[id].votes = 0;
      }
    });
  }

  updateStats();
  renderCluster();
  renderTimeline();
}

function triggerFollowerVote() {
  const candidates = Object.values(nodes).filter(n => n.state === 'candidate');
  if (candidates.length === 0) return;

  const candidate = candidates[0];
  candidate.votes = Math.min(3, candidate.votes + 1);

  log(`info`, `Vote granted to Node ${candidate.id} (${candidate.votes}/3)`);

  if (candidate.votes >= 2) {
    candidate.state = 'leader';
    sim.leaderCount++;
    log(`success`, `Node ${candidate.id} wins election with ${candidate.votes}/3 votes`);
  }

  updateStats();
  renderCluster();
  renderTimeline();
}

function triggerNetworkPartition() {
  sim.partitionCount++;
  sim.partitioned = !sim.partitioned;

  const msg = sim.partitioned ?
    'Network partition detected — Node C isolated' :
    'Network healed — full connectivity restored';

  log(`election`, msg);

  if (sim.partitioned) {
    nodes.C.state = 'follower';
    nodes.C.term++;
  }

  updateStats();
  renderCluster();
  renderTimeline();
}

function resetSim() {
  Object.keys(nodes).forEach(id => {
    nodes[id].state = 'follower';
    nodes[id].term = 0;
    nodes[id].votedFor = null;
    nodes[id].votes = 0;
    nodes[id].timeout = randomTimeout();
  });

  sim.logs = [];
  sim.partitioned = false;
  updateStats();
  renderCluster();
  renderTimeline();
}

function log(type, msg) {
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  sim.logs.unshift({ type, msg, ts });
  if (sim.logs.length > 20) sim.logs.pop();
}

function renderTimeline() {
  const html = sim.logs.map(({ type, msg, ts }) => `
    <div class="tl-item ${type}">
      <div class="tl-ts">${ts}</div>
      <div class="tl-msg">${msg}</div>
    </div>
  `).join('');

  document.getElementById('timeline').innerHTML = html;
}

function updateStats() {
  const currentTerm = Math.max(...Object.values(nodes).map(n => n.term));
  document.getElementById('statTerm').textContent = currentTerm;
  document.getElementById('statLeaders').textContent = sim.leaderCount;
  document.getElementById('statElections').textContent = sim.electionCount;
  document.getElementById('statPartitions').textContent = sim.partitionCount;
}

renderCluster();
renderTimeline();
updateStats();
</script>

</body>
</html>
