<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS Resolution & Caching</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; }
    h1 { font-size: 24px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    .dns-table { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .dns-row { padding: 8px; background: #1e293b; margin: 5px 0; border-radius: 4px; border-left: 4px solid #60a5fa; font-size: 11px; font-family: monospace; }
    .dns-row.cached { border-left-color: #10b981; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 DNS Resolution & Caching</h1>
    <a href="../data/15-system-design/01-networking/02-dns-resolution.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">DNS Cache</h2>
      <div class="dns-table" id="cache"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Simulation</label>
        <button onclick="app.lookup()">Lookup Domain</button>
        <button onclick="app.clearCache()">Clear Cache</button>
      </div>
      <div class="status">
        <div>Cached: <strong id="cached">0</strong></div>
        <div>Cache Hits: <strong id="hits">0</strong></div>
        <div>Lookups: <strong id="lookups">0</strong></div>
      </div>
      <div class="info-text">
        <strong>Browser cache:</strong> ~5 min TTL
      </div>
      <div class="info-text">
        <strong>OS resolver:</strong> ~30 min TTL
      </div>
      <div class="info-text">
        <strong>Recursive resolver:</strong> Variable TTL
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { cache: {}, hits: 0, lookups: 0, domains: ['example.com', 'api.example.com', 'cdn.example.com'] },
      init() { this.render(); },
      lookup() {
        const domain = this.state.domains[Math.floor(Math.random() * this.state.domains.length)];
        this.state.lookups++;
        if (this.state.cache[domain]) {
          this.state.hits++;
        } else {
          this.state.cache[domain] = { ip: '192.168.' + Math.floor(Math.random() * 256) + '.' + Math.floor(Math.random() * 256), ts: Date.now() };
        }
        this.render();
      },
      clearCache() { this.state.cache = {}; this.state.hits = 0; this.state.lookups = 0; this.render(); },
      render() {
        const cacheDiv = document.getElementById('cache');
        if (Object.keys(this.state.cache).length === 0) {
          cacheDiv.innerHTML = '<div style="color: #94a3b8; text-align: center; padding: 20px;">Cache empty</div>';
        } else {
          cacheDiv.innerHTML = Object.entries(this.state.cache).map(([domain, data]) => `
            <div class="dns-row cached">${domain} → ${data.ip}</div>
          `).join('');
        }
        document.getElementById('cached').textContent = Object.keys(this.state.cache).length;
        document.getElementById('hits').textContent = this.state.hits;
        document.getElementById('lookups').textContent = this.state.lookups;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
