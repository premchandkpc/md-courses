<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APM & Performance Monitoring</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
    .metric { background: #334155; padding: 15px; border-radius: 8px; border-left: 3px solid #60a5fa; }
    .metric h3 { margin-bottom: 8px; font-size: 12px; }
    .metric-val { font-size: 18px; font-weight: bold; color: #60a5fa; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 APM & Performance Monitoring</h1>
    <a href="../data/18-performance-engineering/profiling/01-application-profiling.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Performance Metrics</h2>
      <div class="metric-grid" id="metrics"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Update</label>
        <button onclick="app.update()">Refresh Data</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>P95: <strong id="p95">-</strong></div>
        <div>Errors: <strong id="errors">-</strong></div>
      </div>
      <div class="info-text">
        <strong>APM:</strong> Monitor app performance
      </div>
      <div class="info-text">
        <strong>Profiling:</strong> CPU & memory hotspots
      </div>
      <div class="info-text">
        <strong>Bottlenecks:</strong> Slow queries/calls
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { p50: 50, p95: 120, p99: 250, errors: 0 },
      init() { this.render(); },
      update() { this.state.p50 = 45 + Math.random()*20; this.state.p95 = 100 + Math.random()*50; this.state.p99 = 200 + Math.random()*100; this.render(); },
      reset() { this.state = { p50: 50, p95: 120, p99: 250, errors: 0 }; this.render(); },
      render() {
        const metricsDiv = document.getElementById('metrics');
        metricsDiv.innerHTML = `
          <div class="metric">
            <h3>P50 Latency</h3>
            <div class="metric-val">${Math.round(this.state.p50)}ms</div>
          </div>
          <div class="metric">
            <h3>P95 Latency</h3>
            <div class="metric-val">${Math.round(this.state.p95)}ms</div>
          </div>
          <div class="metric">
            <h3>P99 Latency</h3>
            <div class="metric-val">${Math.round(this.state.p99)}ms</div>
          </div>
          <div class="metric">
            <h3>Error Rate</h3>
            <div class="metric-val">${this.state.errors}%</div>
          </div>
        `;
        document.getElementById('p95').textContent = Math.round(this.state.p95) + 'ms';
        document.getElementById('errors').textContent = this.state.errors + '%';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
