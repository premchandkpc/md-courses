<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JWT & OAuth2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .token-box { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .token-part { padding: 8px; background: #1e293b; margin: 5px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; font-family: monospace; word-break: break-all; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 JWT & OAuth2</h1>
    <a href="../data/13-security/01-owasp-top-10-authentication-authorization.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">JWT Token Structure</h2>
      <div class="token-box" id="token"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Flow</label>
        <button onclick="app.generateToken()">Generate JWT</button>
        <button onclick="app.verifyToken()">Verify</button>
      </div>
      <div class="status">
        <div>Status: <strong id="status">-</strong></div>
        <div>Alg: <strong id="alg">HS256</strong></div>
      </div>
      <div class="info-text">
        <strong>JWT:</strong> Stateless token (header.payload.signature)
      </div>
      <div class="info-text">
        <strong>OAuth2:</strong> Auth delegation framework
      </div>
      <div class="info-text">
        <strong>Claims:</strong> User info in payload
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { token: null },
      init() { this.render(); },
      generateToken() {
        const header = btoa(JSON.stringify({alg: 'HS256', typ: 'JWT'}));
        const payload = btoa(JSON.stringify({sub: 'user123', exp: Math.floor(Date.now()/1000)+3600}));
        const sig = btoa('signature');
        this.state.token = header + '.' + payload + '.' + sig;
        this.render();
      },
      verifyToken() { if(this.state.token) this.render(); },
      reset() { this.state = { token: null }; this.render(); },
      render() {
        const tokenDiv = document.getElementById('token');
        if(this.state.token) {
          const parts = this.state.token.split('.');
          tokenDiv.innerHTML = `
            <div class="token-part" style="border-left-color:#60a5fa;">Header: ${parts[0]}</div>
            <div class="token-part" style="border-left-color:#fbbf24;">Payload: ${parts[1]}</div>
            <div class="token-part" style="border-left-color:#10b981;">Signature: ${parts[2]}</div>
          `;
          document.getElementById('status').textContent = '✓ Valid';
        } else {
          tokenDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Click Generate JWT</div>';
          document.getElementById('status').textContent = '-';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
