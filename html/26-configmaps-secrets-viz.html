<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfigMaps & Secrets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
    .config-box { background: #334155; padding: 15px; border-radius: 8px; border-left: 3px solid #60a5fa; }
    .config-box h3 { margin-bottom: 8px; font-size: 12px; }
    .config-item { font-size: 11px; color: #cbd5e1; margin: 4px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 ConfigMaps & Secrets</h1>
    <a href="../data/07-kubernetes/01-kubernetes-basics.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Configuration Management</h2>
      <div class="config-grid" id="configs"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Type</label>
        <button onclick="app.setType('configmap')">ConfigMap</button>
        <button onclick="app.setType('secret')">Secret</button>
      </div>
      <div class="status">
        <div>Type: <strong id="type">ConfigMap</strong></div>
        <div>Encrypted: <strong id="encrypted">No</strong></div>
      </div>
      <div class="info-text">
        <strong>ConfigMap:</strong> Non-sensitive config
      </div>
      <div class="info-text">
        <strong>Secret:</strong> Sensitive data (encrypted)
      </div>
      <div class="info-text">
        <strong>Mount:</strong> Env vars or volumes
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { type: 'configmap' },
      configs: {
        configmap: {
          title: 'ConfigMap',
          items: ['DATABASE_HOST=localhost', 'CACHE_TTL=300s', 'LOG_LEVEL=debug'],
          encrypted: false
        },
        secret: {
          title: 'Secret',
          items: ['DATABASE_PASSWORD=****', 'API_KEY=****', 'JWT_SECRET=****'],
          encrypted: true
        }
      },
      init() { this.render(); },
      setType(t) { this.state.type = t; this.render(); },
      render() {
        const cfg = this.configs[this.state.type];
        const configsDiv = document.getElementById('configs');
        configsDiv.innerHTML = `
          <div class="config-box">
            <h3>${cfg.title}</h3>
            ${cfg.items.map(item => `<div class="config-item">${item}</div>`).join('')}
          </div>
          <div class="config-box">
            <h3>Mount Options</h3>
            <div class="config-item">• Env variables</div>
            <div class="config-item">• Volume mount</div>
            <div class="config-item">• Projected volume</div>
          </div>
        `;
        document.getElementById('type').textContent = cfg.title;
        document.getElementById('encrypted').textContent = cfg.encrypted ? 'Yes' : 'No';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
