<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWASP Top 10</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .vulnerabilities { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 20px 0; }
    .vuln { padding: 12px; background: #1e293b; border-radius: 4px; border-left: 3px solid #ef4444; font-size: 11px; }
    .vuln.critical { border-left-color: #dc2626; background: rgba(220, 38, 38, 0.1); }
    .vuln.high { border-left-color: #ea580c; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 OWASP Top 10</h1>
    <a href="../data/13-security/01-owasp-top-10-authentication-authorization.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Vulnerability List</h2>
      <div class="vulnerabilities" id="vulns"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Filter</label>
        <button onclick="app.filterAll()">All</button>
        <button onclick="app.filterCritical()">Critical</button>
        <button onclick="app.filterHigh()">High</button>
      </div>
      <div class="status">
        <div>Total: <strong id="total">10</strong></div>
        <div>Showing: <strong id="showing">10</strong></div>
      </div>
      <div class="info-text">
        <strong>A01:</strong> Broken access control
      </div>
      <div class="info-text">
        <strong>A02:</strong> Cryptographic failures
      </div>
      <div class="info-text">
        <strong>A03:</strong> Injection attacks
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { filter: 'all' },
      vulnerabilities: [
        {rank: 1, name: 'Broken Access Control', severity: 'critical'},
        {rank: 2, name: 'Cryptographic Failures', severity: 'critical'},
        {rank: 3, name: 'Injection', severity: 'critical'},
        {rank: 4, name: 'Insecure Design', severity: 'high'},
        {rank: 5, name: 'Security Misconfiguration', severity: 'high'},
        {rank: 6, name: 'Vulnerable Components', severity: 'high'},
        {rank: 7, name: 'Authentication Failures', severity: 'critical'},
        {rank: 8, name: 'Data Integrity Failures', severity: 'high'},
        {rank: 9, name: 'Logging/Monitoring Gaps', severity: 'high'},
        {rank: 10, name: 'SSRF', severity: 'high'}
      ],
      init() { this.render(); },
      filterAll() { this.state.filter = 'all'; this.render(); },
      filterCritical() { this.state.filter = 'critical'; this.render(); },
      filterHigh() { this.state.filter = 'high'; this.render(); },
      render() {
        const filtered = this.state.filter === 'all'
          ? this.vulnerabilities
          : this.vulnerabilities.filter(v => v.severity === this.state.filter);
        const vulnsDiv = document.getElementById('vulns');
        vulnsDiv.innerHTML = filtered.map(v => `
          <div class="vuln ${v.severity === 'critical' ? 'critical' : 'high'}">
            A${String(v.rank).padStart(2, '0')}: ${v.name}
          </div>
        `).join('');
        document.getElementById('showing').textContent = filtered.length;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
