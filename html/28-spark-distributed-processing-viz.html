<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark Distributed Processing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .cluster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
    .node { padding: 15px; background: #334155; border-radius: 6px; text-align: center; border: 2px solid #64748b; }
    .node.active { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .node-label { font-size: 11px; margin-top: 8px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Spark Distributed Processing</h1>
    <a href="../data/02-data-engineering/processing/01-apache-spark.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Spark Cluster</h2>
      <div class="cluster-grid" id="cluster"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.start()">Start Job</button>
        <button onclick="app.reset()">Stop</button>
      </div>
      <div class="status">
        <div>Nodes: <strong id="nodes">3</strong></div>
        <div>Active: <strong id="active">0</strong></div>
      </div>
      <div class="info-text">
        <strong>RDD:</strong> Immutable distributed dataset
      </div>
      <div class="info-text">
        <strong>Shuffle:</strong> Redistribute data
      </div>
      <div class="info-text">
        <strong>Parallelism:</strong> Partition data
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { active: 0, maxActive: 3 },
      init() { this.render(); },
      start() { this.state.active = Math.min(this.state.active + 1, this.state.maxActive); this.render(); },
      reset() { this.state.active = 0; this.render(); },
      render() {
        const cluster = document.getElementById('cluster');
        cluster.innerHTML = Array(3).fill(0).map((_, i) => `
          <div class="node ${i < this.state.active ? 'active' : ''}">
            <div>▣</div>
            <div class="node-label">Executor ${i+1}</div>
          </div>
        `).join('');
        document.getElementById('active').textContent = this.state.active;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
