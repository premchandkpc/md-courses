<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Pattern</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .history { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .cmd { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .cmd.executed { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Command Pattern</h1>
    <a href="../data/15-design-patterns/02-behavioral-patterns.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Command History</h2>
      <div class="history" id="history"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Execute</label>
        <button onclick="app.execute('Save')">Save</button>
        <button onclick="app.execute('Delete')">Delete</button>
        <button onclick="app.undo()">Undo</button>
      </div>
      <div class="status">
        <div>Commands: <strong id="count">0</strong></div>
        <div>Can Undo: <strong id="canundo">No</strong></div>
      </div>
      <div class="info-text">
        <strong>Behavioral:</strong> Encapsulate request
      </div>
      <div class="info-text">
        <strong>Undo/Redo:</strong> Command history
      </div>
      <div class="info-text">
        <strong>Use case:</strong> Transactions
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { commands: [] },
      init() { this.render(); },
      execute(cmd) {
        this.state.commands.push({name: cmd, executed: true});
        this.render();
      },
      undo() {
        if(this.state.commands.length > 0) {
          this.state.commands.pop();
          this.render();
        }
      },
      render() {
        const histDiv = document.getElementById('history');
        if(this.state.commands.length) {
          histDiv.innerHTML = this.state.commands.map((c, i) => `
            <div class="cmd executed">
              ✓ ${c.name} [${i + 1}]
            </div>
          `).join('');
          document.getElementById('count').textContent = this.state.commands.length;
          document.getElementById('canundo').textContent = 'Yes';
        } else {
          histDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">No commands</div>';
          document.getElementById('count').textContent = '0';
          document.getElementById('canundo').textContent = 'No';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
