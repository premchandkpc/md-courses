<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFA & Multi-factor Authentication</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .factors { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .factor { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .factor.verified { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 MFA & Multi-factor Authentication</h1>
    <a href="../data/13-security/01-owasp-top-10-authentication-authorization.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Authentication Factors</h2>
      <div class="factors" id="factors"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Verify</label>
        <button onclick="app.verify('password')">Password</button>
        <button onclick="app.verify('totp')">TOTP/2FA</button>
        <button onclick="app.verify('biometric')">Biometric</button>
      </div>
      <div class="status">
        <div>Verified: <strong id="verified">0/3</strong></div>
        <div>Access: <strong id="access">Denied</strong></div>
      </div>
      <div class="info-text">
        <strong>Knowledge:</strong> Password, secret question
      </div>
      <div class="info-text">
        <strong>Possession:</strong> Phone, security key
      </div>
      <div class="info-text">
        <strong>Inherence:</strong> Fingerprint, face recognition
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { verified: {} },
      factors: ['password', 'totp', 'biometric'],
      init() { this.render(); },
      verify(f) { this.state.verified[f] = true; this.render(); },
      reset() { this.state.verified = {}; this.render(); },
      render() {
        const factorsDiv = document.getElementById('factors');
        const count = Object.keys(this.state.verified).length;
        factorsDiv.innerHTML = this.factors.map(f => `
          <div class="factor ${this.state.verified[f] ? 'verified' : ''}">
            ${this.state.verified[f] ? '✓' : '○'} ${f.toUpperCase()}
          </div>
        `).join('');
        document.getElementById('verified').textContent = `${count}/3`;
        document.getElementById('access').textContent = count >= 2 ? '✓ Granted' : 'Denied';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
