<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encryption & TLS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .encryption { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .step { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Encryption & TLS</h1>
    <a href="../data/13-security/02-cryptography-tls-secrets-management.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">TLS Handshake</h2>
      <div class="encryption" id="handshake"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.startHandshake()">Start Handshake</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Status: <strong id="status">-</strong></div>
        <div>Secure: <strong id="secure">-</strong></div>
      </div>
      <div class="info-text">
        <strong>TLS 1.3:</strong> Modern encryption standard
      </div>
      <div class="info-text">
        <strong>Asymmetric:</strong> Public/private key pair
      </div>
      <div class="info-text">
        <strong>Certificate:</strong> Identity verification
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { stage: 0 },
      stages: ['Client Hello', 'Server Hello', 'Key Exchange', 'Handshake Done', '🔒 Secure'],
      init() { this.render(); },
      startHandshake() { if(this.state.stage < 4) this.state.stage++; this.render(); },
      reset() { this.state.stage = 0; this.render(); },
      render() {
        const handshakeDiv = document.getElementById('handshake');
        handshakeDiv.innerHTML = this.stages.map((s, i) => `
          <div class="step" style="border-left-color:${i < this.state.stage ? '#10b981' : '#60a5fa'}">
            ${i < this.state.stage ? '✓ ' : '→ '} ${s}
          </div>
        `).join('');
        document.getElementById('status').textContent = this.stages[this.state.stage] || '-';
        document.getElementById('secure').textContent = this.state.stage === 4 ? '✓ Yes' : 'No';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
