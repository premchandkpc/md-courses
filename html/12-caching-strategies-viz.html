<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caching Strategies</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; transition: all 0.2s; }
    button:hover { background: #2563eb; }
    button.active { background: #10b981; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
    .metric-card { padding: 15px; background: #334155; border-radius: 8px; }
    .metric-label { font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
    .metric-value { font-size: 20px; font-weight: bold; color: #60a5fa; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Caching Strategies</h1>
    <a href="../data/09-distributed-systems/03-distributed-caching.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Cache Performance</h2>
      <div class="metric-grid" id="metrics"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Cache Type</label>
        <button id="lru" onclick="app.setType('lru')" class="active">LRU</button>
        <button id="ttl" onclick="app.setType('ttl')">TTL</button>
        <button id="wt" onclick="app.setType('wt')">Write-Through</button>
      </div>
      <div class="status">
        <div>Type: <strong id="type">LRU</strong></div>
        <div>Size: <strong id="size">0/10</strong></div>
        <div>Hit Rate: <strong id="hitrate">0%</strong></div>
      </div>
      <div class="control-group">
        <button onclick="app.access()">Access Data</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="info-text">
        <strong>LRU:</strong> Evict least recently used when full.
      </div>
      <div class="info-text">
        <strong>TTL:</strong> Expire entries after time window.
      </div>
      <div class="info-text">
        <strong>Write-Through:</strong> Write to cache and DB synchronously.
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { type: 'lru', cache: {}, hits: 0, misses: 0, maxSize: 10 },
      init() { this.render(); },
      setType(t) { this.state.type = t; this.state.cache = {}; this.state.hits = 0; this.state.misses = 0; document.querySelectorAll('.control-group:first-child button').forEach(b => b.classList.remove('active')); document.getElementById(t).classList.add('active'); this.render(); },
      access() {
        const key = 'key_' + Math.floor(Math.random() * 5);
        if (this.state.cache[key]) {
          this.state.hits++;
          this.state.cache[key].hits++;
        } else {
          this.state.misses++;
          this.state.cache[key] = { hits: 0, ts: Date.now() };
          if (Object.keys(this.state.cache).length > this.state.maxSize) {
            let lru = Object.keys(this.state.cache)[0];
            delete this.state.cache[lru];
          }
        }
        this.render();
      },
      reset() { this.state.cache = {}; this.state.hits = 0; this.state.misses = 0; this.render(); },
      render() {
        const metricsDiv = document.getElementById('metrics');
        const hitRate = this.state.hits + this.state.misses > 0 ? Math.round(this.state.hits / (this.state.hits + this.state.misses) * 100) : 0;
        metricsDiv.innerHTML = `
          <div class="metric-card">
            <div class="metric-label">Cache Hits</div>
            <div class="metric-value" style="color: #10b981;">${this.state.hits}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Cache Misses</div>
            <div class="metric-value" style="color: #ef4444;">${this.state.misses}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Hit Rate</div>
            <div class="metric-value">${hitRate}%</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Memory Used</div>
            <div class="metric-value">${Object.keys(this.state.cache).length}/${this.state.maxSize}</div>
          </div>
        `;
        document.getElementById('type').textContent = this.state.type === 'lru' ? 'LRU' : (this.state.type === 'ttl' ? 'TTL' : 'Write-Through');
        document.getElementById('size').textContent = Object.keys(this.state.cache).length + '/' + this.state.maxSize;
        document.getElementById('hitrate').textContent = hitRate + '%';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
