<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning from Incidents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .lessons { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .lesson { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .lesson.learned { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Learning from Incidents</h1>
    <a href="../data/16-production-incidents/01-incident-postmortems-case-studies.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Lessons Learned</h2>
      <div class="lessons" id="lessons"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Review Lessons</label>
        <button onclick="app.load()">Load Lessons</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Lessons: <strong id="count">0</strong></div>
        <div>Status: <strong id="status">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Document:</strong> Write postmortem
      </div>
      <div class="info-text">
        <strong>Share:</strong> Team learning
      </div>
      <div class="info-text">
        <strong>Improve:</strong> Prevent recurrence
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { loaded: false },
      lessons: [
        'Need real-time monitoring dashboards',
        'Automated failover for critical systems',
        'Improve runbook documentation',
        'Add circuit breaker patterns'
      ],
      init() { this.render(); },
      load() { this.state.loaded = true; this.render(); },
      reset() { this.state.loaded = false; this.render(); },
      render() {
        const lessonsDiv = document.getElementById('lessons');
        if(this.state.loaded) {
          lessonsDiv.innerHTML = this.lessons.map(l => `
            <div class="lesson learned">
              ✓ ${l}
            </div>
          `).join('');
          document.getElementById('count').textContent = this.lessons.length;
          document.getElementById('status').textContent = 'Documented';
        } else {
          lessonsDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Click "Load Lessons"</div>';
          document.getElementById('count').textContent = '0';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
