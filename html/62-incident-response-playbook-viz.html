<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident Response Playbook</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .playbook { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .action { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .action.complete { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Incident Response Playbook</h1>
    <a href="../data/13-security/03-zero-trust-penetration-testing-security-culture.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Response Actions</h2>
      <div class="playbook" id="playbook"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Incident Type</label>
        <button onclick="app.startDataBreach()">Data Breach</button>
        <button onclick="app.startDDoS()">DDoS Attack</button>
        <button onclick="app.startMalware()">Malware</button>
      </div>
      <div class="status">
        <div>Incident: <strong id="incident">-</strong></div>
        <div>Progress: <strong id="progress">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Detect:</strong> Identify incident
      </div>
      <div class="info-text">
        <strong>Contain:</strong> Limit damage
      </div>
      <div class="info-text">
        <strong>Remediate:</strong> Fix root cause
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { incident: '', step: 0 },
      playbooks: {
        'Data Breach': [
          '1. Detect anomaly in logs',
          '2. Isolate affected systems',
          '3. Notify security team',
          '4. Preserve forensic evidence',
          '5. Legal notification (72h)'
        ],
        'DDoS Attack': [
          '1. Monitor traffic spike',
          '2. Activate rate limiting',
          '3. Enable WAF rules',
          '4. Contact ISP',
          '5. Route to CDN'
        ],
        'Malware': [
          '1. Quarantine host',
          '2. Kill malicious process',
          '3. Scan filesystem',
          '4. Restore from backup',
          '5. Post-incident review'
        ]
      },
      init() { this.render(); },
      startDataBreach() { this.state.incident = 'Data Breach'; this.state.step = 0; this.render(); },
      startDDoS() { this.state.incident = 'DDoS Attack'; this.state.step = 0; this.render(); },
      startMalware() { this.state.incident = 'Malware'; this.state.step = 0; this.render(); },
      render() {
        const playbookDiv = document.getElementById('playbook');
        if(this.state.incident && this.playbooks[this.state.incident]) {
          const steps = this.playbooks[this.state.incident];
          playbookDiv.innerHTML = steps.map((s, i) => `
            <div class="action ${i < this.state.step ? 'complete' : ''}">
              ${i < this.state.step ? '✓' : '→'} ${s}
            </div>
          `).join('');
          if(this.state.step < steps.length) this.state.step++;
          document.getElementById('incident').textContent = this.state.incident;
          document.getElementById('progress').textContent = `${Math.min(this.state.step, steps.length)}/${steps.length}`;
        } else {
          playbookDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Select incident type</div>';
          document.getElementById('incident').textContent = '-';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
