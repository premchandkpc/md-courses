<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .timeline { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .cert-event { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .cert-event.valid { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .cert-event.expired { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Certificate Management</h1>
    <a href="../data/13-security/02-cryptography-tls-secrets-management.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Certificate Lifecycle</h2>
      <div class="timeline" id="timeline"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.issueCert()">Issue Certificate</button>
        <button onclick="app.renewCert()">Renew</button>
        <button onclick="app.revokeCert()">Revoke</button>
      </div>
      <div class="status">
        <div>State: <strong id="state">Unissued</strong></div>
        <div>Days Left: <strong id="days">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Let's Encrypt:</strong> Free automation
      </div>
      <div class="info-text">
        <strong>ACME:</strong> Protocol standard
      </div>
      <div class="info-text">
        <strong>CRL:</strong> Revocation list
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { lifecycle: [] },
      init() { this.render(); },
      issueCert() {
        this.state.lifecycle = ['Certificate issued', 'Valid for 90 days', 'Days remaining: 90'];
        this.render();
      },
      renewCert() {
        this.state.lifecycle = ['Certificate renewed', 'Extended validity', 'Days remaining: 90'];
        this.render();
      },
      revokeCert() {
        this.state.lifecycle = ['Certificate revoked', 'No longer valid', 'Days remaining: 0'];
        this.render();
      },
      render() {
        const tlDiv = document.getElementById('timeline');
        if(this.state.lifecycle.length) {
          tlDiv.innerHTML = this.state.lifecycle.map((e, i) => {
            const isExpired = e.includes('revoked');
            return `<div class="cert-event ${isExpired ? 'expired' : 'valid'}">${e}</div>`;
          }).join('');
          document.getElementById('state').textContent = this.state.lifecycle[0];
          const match = this.state.lifecycle[2].match(/\d+/);
          document.getElementById('days').textContent = match ? match[0] : '-';
        } else {
          tlDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Issue certificate</div>';
          document.getElementById('state').textContent = 'Unissued';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
