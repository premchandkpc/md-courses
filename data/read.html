<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      overflow-y: auto;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
    }

    .folder-group {
      margin-bottom: 20px;
    }

    .folder-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .file-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 4px;
      border: none;
      background: transparent;
      color: #c0c0c0;
      text-align: left;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: background 0.2s, color 0.2s;
    }

    .file-btn:hover {
      background: #2a2a2a;
      color: #fff;
    }

    .file-btn.active {
      background: #0066cc;
      color: #fff;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background: #0f0f0f;
    }

    .content h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #fff;
    }

    .content pre {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.6;
      border: 1px solid #333;
    }

    .loading {
      color: #888;
      font-size: 14px;
    }

    .error {
      color: #ff6b6b;
      font-size: 14px;
    }

    .placeholder {
      color: #666;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
      }
      .content {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2>Content</h2>
      <div id="sidebar-content">
        <div class="loading">Loading folders...</div>
      </div>
    </div>
    <div class="content">
      <div id="main-content">
        <div class="placeholder">Select a file from the sidebar to view</div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "dev-key-123";

    // Get API base from query param or auto-detect
    const urlParams = new URLSearchParams(window.location.search);
    const API_BASE = urlParams.get("api") ||
      (window.location.protocol === "file:"
        ? "http://localhost:3000"
        : window.location.origin);

    async function loadFolders() {
      try {
        const res = await fetch(`${API_BASE}/api/content/folders`, {
          headers: { "x-api-key": API_KEY },
        });
        if (!res.ok) throw new Error(`API ${res.status}`);
        const data = await res.json();
        renderFolders(data.folders || []);
      } catch (err) {
        document.getElementById("sidebar-content").innerHTML =
          `<div class="error">Error: ${err.message}</div>`;
      }
    }

    function renderFolders(folders) {
      const html = folders
        .map(
          (folder) => `
        <div class="folder-group">
          <div class="folder-title">${folder.name}</div>
          ${folder.files
            .map(
              (file) => `
            <button class="file-btn" data-path="${escapeHtml(file.path)}">
              ${file.name.replace(/\.md$/, "")}
            </button>
          `,
            )
            .join("")}
        </div>
      `,
        )
        .join("");
      const sidebarContent = document.getElementById("sidebar-content");
      sidebarContent.innerHTML = html;

      // Add event delegation for file buttons
      sidebarContent.addEventListener("click", (e) => {
        if (e.target.classList.contains("file-btn")) {
          const filePath = e.target.dataset.path;
          loadFile(filePath, e.target);
        }
      });
    }

    async function loadFile(filePath, button) {
      const mainContent = document.getElementById("main-content");
      mainContent.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(
          `${API_BASE}/api/content/file?path=${encodeURIComponent(filePath)}`,
          {
            headers: { "x-api-key": API_KEY },
          },
        );
        if (!res.ok) throw new Error(`API ${res.status}`);
        const data = await res.json();

        // Update active button
        document.querySelectorAll(".file-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        if (button) button.classList.add("active");

        // Render content
        mainContent.innerHTML = `
          <h1>${filePath.replace(/\.md$/, "")}</h1>
          <pre>${escapeHtml(data.content || "")}</pre>
        `;
      } catch (err) {
        mainContent.innerHTML = `<div class="error">Error: ${err.message}</div>`;
      }
    }

    function escapeHtml(text) {
      const map = {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      };
      return text.replace(/[&<>"']/g, (m) => map[m]);
    }

    // Load folders on page load
    loadFolders();
  </script>
</body>
</html>
