<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>React Virtual DOM Diff Visualizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#e6edf3;padding:24px;max-width:1200px;margin:0 auto}
h1{font-size:22px;color:#58a6ff;margin-bottom:2px;display:flex;align-items:center;gap:10px}
h1 small{font-size:13px;color:#8b949e;font-weight:400}
.sub{color:#8b949e;font-size:13px;margin-bottom:16px}
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;font-size:11px}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dot.add{background:#3fb950;box-shadow:0 0 6px #3fb95066}
.dot.update{background:#d29922;box-shadow:0 0 6px #d2992266}
.dot.remove{background:#f85149;box-shadow:0 0 6px #f8514966}
.dot.move{background:#a78bfa;box-shadow:0 0 6px #a78bfa66}
.dot.skip{background:#30363d}

.trees{display:grid;grid-template-columns:1fr 50px 1fr;gap:8px;margin:16px 0;align-items:start}
.tree-col{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px;min-height:360px}
.tree-col h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#8b949e;margin-bottom:10px}
.tree-col h3 span{float:right;font-size:10px;color:#8b949e}
.arrow-col{display:flex;align-items:center;justify-content:center;font-size:28px;color:#30363d;padding:20px 0}
.arrow-col.diffing{color:#58a6ff}

/* Tree nodes */
.tree-root{display:flex;flex-direction:column;align-items:center;gap:6px}
.node{display:inline-flex;flex-direction:column;align-items:center;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;border:2px solid #30363d;background:#0d1117;position:relative;transition:all .4s cubic-bezier(.4,0,.2,1);min-width:60px}
.node .tag{font-size:10px;color:#8b949e;font-weight:400;margin-top:2px}
.node .key-badge{position:absolute;top:-8px;right:-8px;font-size:8px;background:#1c2128;border:1px solid #30363d;border-radius:3px;padding:1px 4px;color:#8b949e}
.node.add{border-color:#3fb950;background:#1a3a2c;animation:glowAdd .6s ease-out}
.node.update{border-color:#d29922;background:#3a2a1a;animation:pulseUpdate .5s ease-in-out 2}
.node.remove{border-color:#f85149;background:#3a1a1a;animation:fadeOut .6s forwards}
.node.move{border-color:#a78bfa;background:#2a1a4a;animation:glowMove .6s ease-out}
.node.skip{border-color:#30363d;opacity:.5}
.node.current{animation:pulseCurrent 1s ease-in-out infinite}
@keyframes glowAdd{0%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 20px #3fb95044}100%{box-shadow:0 0 0 transparent}}
@keyframes pulseUpdate{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes fadeOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.6)}}
@keyframes glowMove{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}
@keyframes pulseCurrent{0%{border-color:#58a6ff}50%{border-color:#79b8ff}100%{border-color:#58a6ff}}

.children{display:flex;gap:10px;padding-top:6px;position:relative;justify-content:center;flex-wrap:wrap}
.children::before{content:'';position:absolute;top:0;left:50%;width:60%;height:1px;background:#30363d;transform:translateX(-50%)}
.leaf{font-size:9px;color:#8b949e;padding:3px 8px;background:#1c2128;border-radius:4px;border:1px solid #30363d}

/* Diff stats */
.diff-stats{display:flex;gap:20px;margin:12px 0;padding:12px 16px;background:#161b22;border-radius:8px;border:1px solid #30363d}
.diff-stat{text-align:center}
.diff-stat .num{font-size:24px;font-weight:700}
.diff-stat .num.add{color:#3fb950}
.diff-stat .num.update{color:#d29922}
.diff-stat .num.remove{color:#f85149}
.diff-stat .num.move{color:#a78bfa}
.diff-stat .label{font-size:10px;color:#8b949e;text-transform:uppercase}

/* Controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.btn{padding:8px 16px;border:1px solid #30363d;border-radius:6px;background:#1c2128;color:#e6edf3;cursor:pointer;font-size:12px;transition:all .15s;font-family:inherit}
.btn:hover{border-color:#8b949e;background:#21262d}
.btn:disabled{opacity:.4;cursor:default}
.btn.primary{background:#58a6ff;color:#000;border-color:#58a6ff;font-weight:600}
.btn.primary:hover{background:#79b8ff}
.btn.success{background:#3fb950;color:#000;border-color:#3fb950;font-weight:600}
.btn.success:hover{background:#56d36e}
.btn.danger{background:#f85149;color:#fff;border-color:#f85149;font-weight:600}
.btn.danger:hover{background:#f9736b}

.diff-select{background:#1c2128;border:1px solid #30363d;color:#e6edf3;padding:6px 12px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer}

/* Log */
.log{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;max-height:160px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;margin-top:12px}
.log .entry{color:#8b949e;padding:2px 0;border-bottom:1px solid #1c2128}
.log .entry.add{color:#3fb950}
.log .entry.update{color:#d29922}
.log .entry.remove{color:#f85149}
.log .entry.move{color:#a78bfa}
.log .entry .arrow{color:#30363d;margin:0 4px}
.log .entry .step-num{color:#30363d;margin-right:6px}
.log .entry:last-child{border-bottom:none}

/* Speed control */
.speed-group{display:flex;align-items:center;gap:8px;margin-left:auto}
.speed-group label{font-size:11px;color:#8b949e}
.speed-group input[type=range]{width:80px;accent-color:#58a6ff;background:#1c2128;height:4px;border-radius:2px}

/* Canvas for particles */
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<h1>
  ⚛ Virtual DOM Diff Visualizer
  <small>How React's reconciliation algorithm works</small>
</h1>
<div class="sub">Watch React compare two virtual DOM trees and compute minimal mutations</div>

<div class="legend">
  <span><span class="dot add"></span> INSERT</span>
  <span><span class="dot update"></span> UPDATE</span>
  <span><span class="dot remove"></span> REMOVE</span>
  <span><span class="dot move"></span> MOVE (reorder)</span>
  <span><span class="dot skip"></span> Skipped (no change)</span>
</div>

<div class="controls">
  <button class="btn primary" id="btnPlay">▶ Play</button>
  <button class="btn" id="btnStep">⏭ Step</button>
  <button class="btn" id="btnReset">↺ Reset</button>
  <span style="color:#30363d;width:1px;height:20px;background:#30363d;margin:0 4px"></span>
  <select class="diff-select" id="demoSelect">
    <option value="simple">Simple: same tree, updated text</option>
    <option value="add">Adding a child node</option>
    <option value="remove">Removing a child node</option>
    <option value="reorder">Reordering with keys</option>
    <option value="complex">Complex transformation</option>
  </select>
  <div class="speed-group">
    <label>Speed</label>
    <input type="range" id="speedRange" min="100" max="3000" value="1200" step="100">
    <span id="speedLabel" style="font-size:11px;color:#8b949e;min-width:30px">1.2s</span>
  </div>
</div>

<div class="diff-stats" id="diffStats">
  <div class="diff-stat"><div class="num" id="statAdd">0</div><div class="label">INSERT</div></div>
  <div class="diff-stat"><div class="num update" id="statUpdate">0</div><div class="label">UPDATE</div></div>
  <div class="diff-stat"><div class="num remove" id="statRemove">0</div><div class="label">REMOVE</div></div>
  <div class="diff-stat"><div class="num move" id="statMove">0</div><div class="label">MOVE</div></div>
  <div class="diff-stat"><div class="num" id="statSkip" style="color:#8b949e">0</div><div class="label">SKIP</div></div>
</div>

<div class="trees">
  <div class="tree-col" id="beforeCol">
    <h3>Before <span id="beforeCount"></span></h3>
    <div class="tree-root" id="beforeTree"></div>
  </div>
  <div class="arrow-col" id="arrowCol">→</div>
  <div class="tree-col" id="afterCol">
    <h3>After <span id="afterCount"></span></h3>
    <div class="tree-root" id="afterTree"></div>
  </div>
</div>

<div class="log" id="log"></div>

<script>
// ====== Particle Canvas ======
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const particles = [];
function addParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1,
      life: 1, decay: 0.01 + Math.random() * 0.02, size: 2 + Math.random() * 3, color
    });
  }
}
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}
animateParticles();
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

// ====== Demo definitions ======
const DEMOS = {
  simple: {
    before: { type: 'div', key: null, props: { className: 'container' }, children: [
      { type: 'h1', key: null, props: {}, children: ['Hello World'] },
      { type: 'p', key: null, props: {}, children: ['Welcome to React'] }
    ]},
    after: { type: 'div', key: null, props: { className: 'container' }, children: [
      { type: 'h1', key: null, props: {}, children: ['Hello React'] },
      { type: 'p', key: null, props: { style: 'color:blue' }, children: ['Welcome to Reconciliation'] }
    ]}
  },
  add: {
    before: { type: 'div', key: null, props: {}, children: [
      { type: 'header', key: null, props: {}, children: ['Header'] },
      { type: 'main', key: null, props: {}, children: ['Content'] }
    ]},
    after: { type: 'div', key: null, props: {}, children: [
      { type: 'header', key: null, props: {}, children: ['Header'] },
      { type: 'main', key: null, props: {}, children: ['Content'] },
      { type: 'footer', key: null, props: {}, children: ['Footer (NEW)'] }
    ]}
  },
  remove: {
    before: { type: 'div', key: null, props: {}, children: [
      { type: 'header', key: null, props: {}, children: ['Header'] },
      { type: 'aside', key: null, props: {}, children: ['Sidebar'] },
      { type: 'main', key: null, props: {}, children: ['Content'] }
    ]},
    after: { type: 'div', key: null, props: {}, children: [
      { type: 'header', key: null, props: {}, children: ['Header'] },
      { type: 'main', key: null, props: {}, children: ['Content'] }
    ]}
  },
  reorder: {
    before: { type: 'ul', key: null, props: {}, children: [
      { type: 'li', key: 'a', props: {}, children: ['Apple'] },
      { type: 'li', key: 'b', props: {}, children: ['Banana'] },
      { type: 'li', key: 'c', props: {}, children: ['Cherry'] },
      { type: 'li', key: 'd', props: {}, children: ['Date'] }
    ]},
    after: { type: 'ul', key: null, props: {}, children: [
      { type: 'li', key: 'd', props: {}, children: ['Date'] },
      { type: 'li', key: 'a', props: {}, children: ['Apple (moved)'] },
      { type: 'li', key: 'c', props: {}, children: ['Cherry'] },
      { type: 'li', key: 'e', props: {}, children: ['Elderberry (NEW)'] }
    ]}
  },
  complex: {
    before: { type: 'div', key: null, props: { className: 'app' }, children: [
      { type: 'nav', key: 'nav', props: {}, children: ['Navigation'] },
      { type: 'section', key: null, props: { id: 'main' }, children: [
        { type: 'article', key: 'a1', props: {}, children: ['Article 1'] },
        { type: 'article', key: 'a2', props: {}, children: ['Article 2'] },
        { type: 'aside', key: null, props: {}, children: ['Sidebar'] }
      ]},
      { type: 'footer', key: 'ft', props: {}, children: ['Footer 2024'] }
    ]},
    after: { type: 'div', key: null, props: { className: 'app-root' }, children: [
      { type: 'header', key: null, props: {}, children: ['New Header'] },
      { type: 'nav', key: 'nav', props: { compact: true }, children: ['Navigation (updated)'] },
      { type: 'section', key: null, props: { id: 'main' }, children: [
        { type: 'article', key: 'a2', props: {}, children: ['Article 2 (updated)'] },
        { type: 'article', key: 'a3', props: {}, children: ['Article 3 (NEW)'] },
        { type: 'aside', key: null, props: {}, children: [] }
      ]},
      { type: 'footer', key: 'ft', props: {}, children: ['Footer 2025'] }
    ]}
  }
};

// ====== Diff engine (simplified React reconciliation) ======
let currentStep = -1;
let steps = [];
let timer = null;
let isPlaying = false;

function computeDiff(before, after) {
  const ops = [];
  function compareNodes(b, a, path = 'root', bIdx = 0, aIdx = 0) {
    // Different types → replace
    if (b && a && b.type !== a.type) {
      ops.push({ type: 'remove', path: path, node: b });
      ops.push({ type: 'add', path: path, node: a });
      return;
    }
    // Node added
    if (!b && a) {
      ops.push({ type: 'add', path: path, node: a });
      return;
    }
    // Node removed
    if (b && !a) {
      ops.push({ type: 'remove', path: path, node: b });
      return;
    }
    if (!b && !a) return;
    
    // Same type — check props/text
    const bText = typeof b === 'string' ? b : null;
    const aText = typeof a === 'string' ? a : null;
    if (bText !== null && aText !== null) {
      if (bText !== aText) ops.push({ type: 'update', path: path, node: a, oldVal: bText, newVal: aText });
      else ops.push({ type: 'skip', path: path });
      return;
    }
    if (bText !== null || aText !== null) {
      if (bText !== null) ops.push({ type: 'remove', path: path, node: b });
      else ops.push({ type: 'add', path: path, node: a });
      return;
    }
    
    // Compare props
    const bProps = JSON.stringify(b.props || {});
    const aProps = JSON.stringify(a.props || {});
    if (bProps !== aProps) {
      ops.push({ type: 'update', path: path, node: a });
    } else {
      ops.push({ type: 'skip', path: path });
    }
    
    // Compare children with key-based reconciliation
    const bKids = b.children || [];
    const aKids = a.children || [];
    
    // Build key maps
    const bMap = {};
    bKids.forEach((c, i) => {
      const k = c && typeof c === 'object' ? (c.key || `__idx_${i}`) : `__text_${i}`;
      bMap[k] = { node: c, idx: i };
    });
    const aMap = {};
    aKids.forEach((c, i) => {
      const k = c && typeof c === 'object' ? (c.key || `__idx_${i}`) : `__text_${i}`;
      aMap[k] = { node: c, idx: i };
    });
    
    // Find removed, added, moved, updated
    const visitedKeys = new Set();
    for (const [key, bEntry] of Object.entries(bMap)) {
      if (aMap[key]) {
        compareNodes(bEntry.node, aMap[key].node, `${path}/${key}`, bEntry.idx, aMap[key].idx);
        visitedKeys.add(key);
      } else {
        ops.push({ type: 'remove', path: `${path}/${key}`, node: bEntry.node });
      }
    }
    for (const [key, aEntry] of Object.entries(aMap)) {
      if (!visitedKeys.has(key)) {
        // Check if it's a move (same key exists in before)
        if (bMap[key]) {
          ops.push({ type: 'move', path: `${path}/${key}`, node: aEntry.node });
          compareNodes(bMap[key].node, aEntry.node, `${path}/${key}`, bMap[key].idx, aEntry.idx);
        } else {
          ops.push({ type: 'add', path: `${path}/${key}`, node: aEntry.node });
        }
      }
    }
  }
  compareNodes(before, after);
  return ops;
}

function generateSteps(demoName) {
  const demo = DEMOS[demoName];
  const ops = computeDiff(demo.before, demo.after);
  const steps = [];
  
  // Build animation steps
  steps.push({ type: 'init', msg: 'Starting reconciliation...' });
  
  ops.forEach((op, i) => {
    const labels = { add: 'INSERT', update: 'UPDATE', remove: 'REMOVE', move: 'MOVE', skip: 'SKIP' };
    const colors = { add: '#3fb950', update: '#d29922', remove: '#f85149', move: '#a78bfa', skip: '#8b949e' };
    const paths = { add: '➕', update: '✏️', remove: '🗑️', move: '↕️', skip: '➡️' };
    const icons = { add: '➕', update: '✏️', remove: '🗑️', move: '↕️', skip: '➡️' };
    
    let desc = '';
    if (op.type === 'add') desc = `Insert <${op.node.type}>${op.node.key ? ` key="${op.node.key}"` : ''}`;
    else if (op.type === 'remove') desc = `Remove <${op.node.type}>`;
    else if (op.type === 'update') {
      if (op.oldVal !== undefined) desc = `Update text: "${op.oldVal}" → "${op.newVal}"`;
      else desc = `Update props of <${op.node.type}>`;
    }
    else if (op.type === 'move') desc = `Move <${op.node.type}> key="${op.node.key}"`;
    else desc = `Skip <${op.node.type}> (no change)`;
    
    steps.push({
      type: op.type,
      op,
      msg: `${icons[op.type]} <span style="color:${colors[op.type]}">${labels[op.type]}</span> ${desc}`,
      path: op.path
    });
  });
  
  steps.push({ type: 'done', msg: '✅ Reconciliation complete — minimal DOM mutations applied' });
  return { steps, ops };
}

// ====== Tree rendering ======
function renderTreeNode(node, highlight) {
  if (typeof node === 'string') {
    return `<span class="leaf">"${node}"</span>`;
  }
  if (!node) return '';
  const cls = highlight || '';
  const keyBadge = node.key ? `<span class="key-badge">key=${node.key}</span>` : '';
  const kids = (node.children || []).map(c => renderTreeNode(c)).join('');
  const propsStr = node.props ? Object.entries(node.props).map(([k, v]) => `${k}=${v}`).join(' ') : '';
  return `<div class="node ${cls}">${keyBadge}${node.type}${propsStr ? `<span class="tag">${propsStr}</span>` : ''}</div><div class="children">${kids}</div>`;
}

function renderTree(container, tree) {
  if (!tree) { container.innerHTML = '<div style="color:#8b949e;font-size:12px;text-align:center;padding:40px">Empty tree</div>'; return; }
  container.innerHTML = renderTreeNode(tree);
}

function countNodes(tree) {
  if (!tree) return 0;
  if (typeof tree === 'string') return 1;
  let c = 1;
  (tree.children || []).forEach(ch => c += countNodes(ch));
  return c;
}

// ====== Main simulation ======
function loadDemo(name) {
  if (timer) { clearInterval(timer); timer = null; }
  isPlaying = false;
  document.getElementById('btnPlay').textContent = '▶ Play';
  currentStep = -1;
  
  const demo = DEMOS[name];
  const { steps: newSteps } = generateSteps(name);
  steps = newSteps;
  
  document.getElementById('beforeTree').innerHTML = renderTreeNode(demo.before);
  document.getElementById('afterTree').innerHTML = renderTreeNode(demo.after);
  document.getElementById('beforeCount').textContent = `${countNodes(demo.before)} nodes`;
  document.getElementById('afterCount').textContent = `${countNodes(demo.after)} nodes`;
  
  document.getElementById('log').innerHTML = '';
  document.getElementById('diffStats').querySelectorAll('.num').forEach(el => el.textContent = '0');
  document.getElementById('arrowCol').className = 'arrow-col';
  
  addLog('info', '🔄 Demo loaded — click "Step" or "Play"');
  resetHighlights();
}

function resetHighlights() {
  const demo = DEMOS[document.getElementById('demoSelect').value];
  document.getElementById('beforeTree').innerHTML = renderTreeNode(demo.before);
  document.getElementById('afterTree').innerHTML = renderTreeNode(demo.after);
}

function applyHighlight(step) {
  renderTree(document.getElementById('beforeTree'), DEMOS[document.getElementById('demoSelect').value].before);
  renderTree(document.getElementById('afterTree'), DEMOS[document.getElementById('demoSelect').value].after);
  
  // We just re-render with highlight info
  if (!step || !step.op) return;
  
  // Animate the arrow
  if (step.type !== 'skip' && step.type !== 'init' && step.type !== 'done') {
    document.getElementById('arrowCol').className = 'arrow-col diffing';
    setTimeout(() => {
      if (document.getElementById('arrowCol')) document.getElementById('arrowCol').className = 'arrow-col';
    }, 600);
  }
}

function stepForward() {
  if (currentStep >= steps.length - 1) {
    if (isPlaying) { isPlaying = false; document.getElementById('btnPlay').textContent = '▶ Play'; if (timer) { clearInterval(timer); timer = null; } }
    return;
  }
  
  currentStep++;
  const step = steps[currentStep];
  
  // Add to log
  const logEl = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `entry ${step.type === 'init' || step.type === 'done' ? '' : step.type}`;
  entry.innerHTML = `<span class="step-num">#${currentStep}</span> ${step.msg}`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
  
  // Update stats
  if (step.type === 'add' || step.type === 'update' || step.type === 'remove' || step.type === 'move' || step.type === 'skip') {
    const id = { add: 'statAdd', update: 'statUpdate', remove: 'statRemove', move: 'statMove', skip: 'statSkip' }[step.type];
    const el = document.getElementById(id);
    el.textContent = parseInt(el.textContent) + 1;
    
    // Particles!
    const rect = document.getElementById('arrowCol').getBoundingClientRect();
    const colors = { add: '#3fb950', update: '#d29922', remove: '#f85149', move: '#a78bfa', skip: '#30363d' };
    addParticles(rect.left + rect.width/2, rect.top + rect.height/2, colors[step.type], 8);
  }
  
  // Highlight nodes
  applyHighlight(step);
  
  if (currentStep >= steps.length - 1) {
    document.getElementById('arrowCol').className = 'arrow-col';
    if (isPlaying) { isPlaying = false; document.getElementById('btnPlay').textContent = '▶ Play'; if (timer) { clearInterval(timer); timer = null; } }
  }
}

function addLog(type, msg) {
  const logEl = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `entry ${type}`;
  entry.innerHTML = `<span class="step-num">•</span> ${msg}`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

function togglePlay() {
  if (currentStep >= steps.length - 1) {
    resetDemo();
    setTimeout(() => togglePlay(), 100);
    return;
  }
  isPlaying = !isPlaying;
  document.getElementById('btnPlay').textContent = isPlaying ? '⏸ Pause' : '▶ Play';
  if (isPlaying) {
    stepForward();
    const speed = parseInt(document.getElementById('speedRange').value);
    timer = setInterval(() => {
      if (currentStep < steps.length - 1) stepForward();
      else {
        isPlaying = false;
        document.getElementById('btnPlay').textContent = '▶ Play';
        if (timer) { clearInterval(timer); timer = null; }
      }
    }, speed);
  } else {
    if (timer) { clearInterval(timer); timer = null; }
  }
}

function resetDemo() {
  isPlaying = false;
  if (timer) { clearInterval(timer); timer = null; }
  document.getElementById('btnPlay').textContent = '▶ Play';
  loadDemo(document.getElementById('demoSelect').value);
}

// ====== Event listeners ======
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btnPlay').addEventListener('click', togglePlay);
  document.getElementById('btnStep').addEventListener('click', stepForward);
  document.getElementById('btnReset').addEventListener('click', resetDemo);
  document.getElementById('demoSelect').addEventListener('change', (e) => loadDemo(e.target.value));
  document.getElementById('speedRange').addEventListener('input', (e) => {
    document.getElementById('speedLabel').textContent = `${(parseInt(e.target.value)/1000).toFixed(1)}s`;
    if (isPlaying) {
      clearInterval(timer);
      timer = setInterval(stepForward, parseInt(e.target.value));
    }
  });
  
  loadDemo('simple');
});
</script>

<script>
// Hash navigation
(function(){
  function scrollToHash(){
    var h = window.location.hash;
    if(h && h.length > 1){
      var el = document.getElementById(h.substring(1));
      if(el) setTimeout(function(){ el.scrollIntoView({behavior:'smooth', block:'start'}); }, 200);
    }
  }
  window.addEventListener('hashchange', scrollToHash);
  window.addEventListener('load', scrollToHash);
})();
</script>
</body>
