<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident Trends</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    canvas { width: 100%; border: 1px solid #334155; border-radius: 6px; background: #1e293b; margin: 20px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Incident Trends</h1>
    <a href="../data/16-production-incidents/01-incident-postmortems-case-studies.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Trend Chart</h2>
      <canvas id="chart" width="400" height="150"></canvas>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>View</label>
        <button onclick="app.drawChart()">Show Trends</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Period: <strong id="period">-</strong></div>
        <div>Trend: <strong id="trend">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Track:</strong> Over time
      </div>
      <div class="info-text">
        <strong>Reduce:</strong> Incident count
      </div>
      <div class="info-text">
        <strong>Improve:</strong> Mean metrics
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { drawn: false },
      init() { this.reset(); },
      drawChart() {
        this.state.drawn = true;
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const data = [8, 6, 5, 4, 3, 2, 2];
        ctx.strokeStyle = '#10b981';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const step = canvas.width / (data.length - 1);
        data.forEach((v, i) => {
          const x = i * step;
          const y = canvas.height - (v / 10) * canvas.height;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
        document.getElementById('period').textContent = 'Last 7 months';
        document.getElementById('trend').textContent = 'Decreasing ↓';
      },
      reset() {
        this.state.drawn = false;
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#94a3b8';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Click "Show Trends"', canvas.width/2, canvas.height/2);
        document.getElementById('period').textContent = '-';
        document.getElementById('trend').textContent = '-';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
