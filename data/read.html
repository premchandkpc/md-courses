<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📚 Engineering Knowledge Universe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;--border:#30363d;--fg:#e6edf3;--fg2:#8b949e;--fg3:#6e7681;--accent:#58a6ff;--accent2:#3fb950;--accent3:#d29922;--accent4:#f85149;--hover:#1f6feb;--radius:6px;--font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;font-size:14px;line-height:1.6}
.container{display:flex;height:100vh}

/* ─── SIDEBAR ─── */
.sidebar{width:320px;min-width:320px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sidebar-header h2{font-size:15px;font-weight:600;color:var(--fg);flex:1}
.sidebar-header .badge{font-size:10px;color:var(--fg3);background:var(--bg3);padding:2px 8px;border-radius:10px}
.sidebar-search{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-search input{width:100%;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg);font-size:13px;outline:none}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-tree{flex:1;overflow-y:auto;padding:8px 0}

.tree-item{display:flex;align-items:center;padding:4px 12px 4px 16px;cursor:pointer;border-radius:0;transition:none;white-space:nowrap;gap:4px}
.tree-item:hover{background:var(--bg3)}
.tree-item.active{background:var(--hover);color:#fff}
.tree-item .icon{flex-shrink:0;width:16px;text-align:center;font-size:12px;color:var(--fg3)}
.tree-item.folder>.icon{color:var(--accent3)}
.tree-item.file>.icon{color:var(--fg2)}
.tree-item .name{overflow:hidden;text-overflow:ellipsis;font-size:13px}
.tree-item .match{background:var(--accent3);color:#000;padding:0 2px;border-radius:2px}
.tree-children{padding-left:16px}
.tree-toggle{cursor:pointer;user-select:none;color:var(--fg3);font-size:10px;width:16px;text-align:center;flex-shrink:0}
.tree-toggle:hover{color:var(--fg)}

/* ─── MAIN CONTENT ─── */
.content{flex:1;overflow-y:auto;padding:0;display:flex;flex-direction:column}
.content-header{padding:20px 32px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.content-header h1{font-size:24px;font-weight:600;color:var(--fg);margin-bottom:4px}
.content-header .path{font-size:12px;color:var(--fg3);margin-bottom:12px;word-break:break-all}
.content-body{padding:24px 32px 48px;flex:1;max-width:960px}
.content-body h1{font-size:26px;margin:24px 0 12px;color:var(--fg);border-bottom:1px solid var(--border);padding-bottom:8px}
.content-body h2{font-size:20px;margin:20px 0 10px;color:var(--fg)}
.content-body h3{font-size:16px;margin:16px 0 8px;color:var(--fg)}
.content-body h4{font-size:14px;margin:12px 0 6px;color:var(--fg)}
.content-body p{margin:8px 0;color:var(--fg)}
.content-body ul,.content-body ol{margin:8px 0;padding-left:24px}
.content-body li{margin:4px 0}
.content-body strong{color:var(--fg);font-weight:600}
.content-body a{color:var(--accent);text-decoration:none}
.content-body a:hover{text-decoration:underline}
.content-body blockquote{border-left:3px solid var(--accent2);padding:8px 16px;margin:12px 0;background:var(--bg3);border-radius:0 var(--radius) var(--radius) 0}
.content-body blockquote p{color:var(--fg2)}
.content-body code{font-family:var(--mono);background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:13px;color:var(--accent2)}
.content-body pre{background:var(--bg3);padding:16px;border-radius:var(--radius);overflow-x:auto;margin:12px 0;border:1px solid var(--border);position:relative}
.content-body pre code{background:none;padding:0;font-size:13px;line-height:1.5;color:var(--fg)}
.content-body table{border-collapse:collapse;width:100%;margin:12px 0}
.content-body th,.content-body td{padding:8px 12px;border:1px solid var(--border);text-align:left;font-size:13px}
.content-body th{background:var(--bg3);font-weight:600;color:var(--fg)}
.content-body td{color:var(--fg)}
.content-body tr:nth-child(even) td{background:var(--bg2)}
.content-body hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.content-body img{max-width:100%;border-radius:var(--radius)}
.content-body .emoji{font-size:1.2em}

/* Syntax highlighting */
.hl-keyword{color:#ff7b72}.hl-string{color:#a5d6ff}.hl-number{color:#79c0ff}.hl-comment{color:#8b949e;font-style:italic}
.hl-function{color:#d2a8ff}.hl-type{color:#ffa657}.hl-operator{color:#ff7b72}.hl-attr{color:#79c0ff}
.hl-builtin{color:#ffa657}.hl-variable{color:#ffa657}.hl-title{color:#d2a8ff}

/* Stats bar */
.stats-bar{display:flex;gap:16px;padding:12px 32px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;color:var(--fg3);flex-wrap:wrap;flex-shrink:0}
.stats-bar span{display:flex;align-items:center;gap:4px}

/* Start screen */
.start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:40px;text-align:center}
.start-screen h1{font-size:32px;color:var(--fg);margin-bottom:8px}
.start-screen p{color:var(--fg2);max-width:480px;line-height:1.6}
.start-screen .btn{padding:12px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;cursor:pointer;font-weight:500;transition:background 0.2s}
.start-screen .btn:hover{background:var(--hover)}
.start-screen .btn-secondary{padding:8px 20px;background:var(--bg3);color:var(--fg);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;cursor:pointer;margin-top:8px}
.start-screen .btn-secondary:hover{background:var(--bg4)}
.start-screen .note{font-size:12px;color:var(--fg3);max-width:400px}

/* Search results */
.search-results{padding:4px 0}.search-result{padding:8px 12px;cursor:pointer;border-radius:0;display:flex;gap:8px;align-items:baseline}
.search-result:hover{background:var(--bg3)}.search-result .file-path{font-size:11px;color:var(--fg3)}.search-result .match-line{font-size:12px;color:var(--fg2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Scrollbar */
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--fg3)}

/* Loading */
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:768px){.sidebar{width:240px;min-width:240px}.content-body{padding:16px 20px 32px}.content-header{padding:16px 20px 0}}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>📚 Explorer</h2>
      <span class="badge" id="fileCount"></span>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search files..." autocomplete="off">
    </div>
    <div class="sidebar-tree" id="treeContainer">
      <div class="spinner"></div>
    </div>
  </div>
  <div class="content" id="contentArea">
    <div class="start-screen" id="startScreen">
      <div style="font-size:48px;margin-bottom:8px">📚</div>
      <h1>Engineering Knowledge Universe</h1>
      <p>Browse 200+ deep-dive files across 25 engineering domains — AI/ML, distributed systems, databases, networking, OS, cloud, DevOps, and more.</p>
      <div id="loadButtons">
        <button class="btn" onclick="pickDirectory()">📂 Open data/ Folder</button>
        <p class="note" style="margin-top:12px">Uses your browser's File System Access API (Chrome/Edge).<br>No files are uploaded — everything stays local.</p>
      </div>
    </div>
    <div id="fileContent" style="display:none">
      <div class="stats-bar" id="statsBar"></div>
      <div class="content-header" id="contentHeader">
        <h1 id="contentTitle"></h1>
        <div class="path" id="contentPath"></div>
      </div>
      <div class="content-body" id="contentBody"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let fileTree = [];
let fileMap = {};        // path -> {content, fullPath}
let flatList = [];       // [{path, name, dir}]
let selectedPath = null;
let directoryHandle = null;
const SAVED_KEY = 'eku_dir_handle';

// ═══════════════════════════════════════════════════════════════
// FILE SYSTEM ACCESS API
// ═══════════════════════════════════════════════════════════════
async function pickDirectory() {
  try {
    // Check if File System Access API is available
    if (!('showDirectoryPicker' in window)) {
      document.getElementById('loadButtons').innerHTML = `
        <p style="color:var(--accent4)">File System Access API not supported in this browser.</p>
        <p class="note">Use Chrome 86+, Edge 86+, or run a local server.</p>
      `;
      return;
    }
    directoryHandle = await window.showDirectoryPicker({mode:'read'});
    // Verify this is the data/ directory by checking for known subdirs
    await scanDirectory(directoryHandle, '', fileTree, fileMap);
    directoryHandle.requestPermission?.({mode:'read'});
    buildFlatList();
    renderTree(fileTree);
    updateFileCount();
    showStartScreen(false);
    // Save handle for later (non-persistent across sessions in most browsers)
  } catch(err) {
    if (err.name !== 'AbortError' && err.name !== 'SecurityError') {
      console.error(err);
      alert('Error opening directory: ' + err.message);
    }
  }
}

async function scanDirectory(handle, path, treeNode, fileMap) {
  // Handle both FileSystemDirectoryHandle and vscode uri type structures
  const entries = [];
  try {
    for await (const entry of handle.values()) {
      entries.push(entry);
    }
    entries.sort((a,b) => {
      if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
  } catch(e) {
    console.warn('Cannot scan directory:', path, e);
    return;
  }

  for (const entry of entries) {
    const fullPath = path ? `${path}/${entry.name}` : entry.name;
    // Skip hidden and non-md files
    if (entry.name.startsWith('.') || entry.name === 'read.html' || entry.name === 'node_modules') continue;

    if (entry.kind === 'directory') {
      const dirNode = {name: entry.name, path: fullPath, type:'dir', children:[], open:true};
      treeNode.push(dirNode);
      await scanDirectory(entry, fullPath, dirNode.children, fileMap);
    } else if (entry.name.endsWith('.md') || entry.name.endsWith('.html') || entry.name.endsWith('.yaml') || entry.name.endsWith('.yml') || entry.name.endsWith('.json')) {
      try {
        const fileData = await entry.getFile();
        const content = await fileData.text();
        const fileNode = {name: entry.name, path: fullPath, type:'file', size:fileData.size};
        treeNode.push(fileNode);
        fileMap[fullPath] = {content, size: fileData.size, lastModified: fileData.lastModified};
      } catch(e) {
        console.warn('Cannot read file:', fullPath, e);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// FLAT LIST FOR SEARCH
// ═══════════════════════════════════════════════════════════════
function buildFlatList() {
  flatList = [];
  function walk(nodes, parentDir) {
    for (const node of nodes) {
      if (node.type === 'file') {
        const dir = parentDir || '';
        flatList.push({path: node.path, name: node.name.replace(/\.md$/,''), dir, content: fileMap[node.path]?.content || ''});
      } else if (node.type === 'dir' && node.children) {
        walk(node.children, node.path);
      }
    }
  }
  walk(fileTree, '');
  flatList.sort((a,b) => a.path.localeCompare(b.path));
}

function updateFileCount() {
  const mdCount = flatList.filter(f => f.path.endsWith('.md')).length;
  document.getElementById('fileCount').textContent = `${mdCount} files`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER TREE
// ═══════════════════════════════════════════════════════════════
function renderTree(nodes, container) {
  container = container || document.getElementById('treeContainer');
  container.innerHTML = renderTreeNodes(nodes);
  container.querySelectorAll('.tree-toggle').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const children = el.parentElement.nextElementSibling;
      if (children) {
        children.style.display = children.style.display === 'none' ? '' : 'none';
        el.textContent = children.style.display === 'none' ? '▶' : '▼';
      }
    });
  });
  container.querySelectorAll('.tree-item.file').forEach(el => {
    el.addEventListener('click', () => {
      const path = el.dataset.path;
      if (path) loadFile(path, el);
    });
  });
}

function renderTreeNodes(nodes, depth=0) {
  if (!nodes || nodes.length === 0) return '<div style="padding:12px;color:var(--fg3);font-size:13px">No files found</div>';
  let html = '';
  for (const node of nodes) {
    if (node.type === 'dir') {
      const hasContent = node.children && node.children.length > 0;
      html += `<div class="tree-item folder" style="padding-left:${12+depth*16}px">
        <span class="tree-toggle">${node.open !== false ? '▼' : '▶'}</span>
        <span class="icon">📁</span>
        <span class="name">${escapeHtml(node.name)}</span>
      </div>`;
      html += `<div class="tree-children" style="display:${node.open !== false ? '' : 'none'}">`;
      if (hasContent) {
        html += renderTreeNodes(node.children, depth+1);
      }
      html += `</div>`;
    } else {
      const icon = node.name.endsWith('.md') ? '📄' : node.name.endsWith('.html') ? '🌐' : '📎';
      const isActive = node.path === selectedPath;
      html += `<div class="tree-item file${isActive?' active':''}" data-path="${escapeHtml(node.path)}" style="padding-left:${12+depth*16}px">
        <span class="tree-toggle" style="visibility:hidden">▶</span>
        <span class="icon">${icon}</span>
        <span class="name">${escapeHtml(node.name.replace(/\.md$/,''))}</span>
      </div>`;
    }
  }
  return html;
}

// ═══════════════════════════════════════════════════════════════
// LOAD & RENDER FILE
// ═══════════════════════════════════════════════════════════════
function loadFile(path, el) {
  selectedPath = path;
  const data = fileMap[path];
  if (!data) return;

  // Update active state
  document.querySelectorAll('.tree-item.active').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');

  // Show content area
  showStartScreen(false);
  document.getElementById('fileContent').style.display = 'flex';
  document.getElementById('fileContent').style.flexDirection = 'column';

  // Header
  const title = path.replace(/\.md$/,'').split('/').pop();
  document.getElementById('contentTitle').textContent = title;
  document.getElementById('contentPath').textContent = `data/${path}`;

  // Stats
  const lines = (data.content.match(/\n/g)||[]).length + 1;
  const codeBlocks = (data.content.match(/```/g)||[]).length / 2;
  const headingCount = (data.content.match(/^#{1,4}\s/gm)||[]).length;
  document.getElementById('statsBar').innerHTML = `
    <span>📄 ${(data.size/1024).toFixed(0)} KB</span>
    <span>📏 ${lines} lines</span>
    <span>🔢 ${headingCount} headings</span>
    <span>💻 ${codeBlocks} code blocks</span>
  `;

  // Render markdown
  const html = renderMarkdown(data.content, path);
  document.getElementById('contentBody').innerHTML = html;

  // Scroll to top
  document.getElementById('contentArea').scrollTop = 0;
}

// ═══════════════════════════════════════════════════════════════
// MARKDOWN RENDERER
// ═══════════════════════════════════════════════════════════════
function renderMarkdown(text, filePath) {
  if (!text) return '<p style="color:var(--fg3)">Empty file</p>';

  // Process code blocks first
  let blocks = [];
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
    const id = `__CODE_${blocks.length}__`;
    blocks.push({lang, code: code.replace(/\n+$/,'')});
    return id;
  });

  // Process inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Process bold/italic
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  // Process strikethrough
  text = text.replace(/~~([^~]+)~~/g, '<del>$1</del>');

  // Process links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, name, url) => {
    if (url.startsWith('http')) return `<a href="${url}" target="_blank">${name}</a>`;
    // Internal links — try to resolve to a file
    const resolved = resolveInternalLink(url, filePath);
    return `<a href="#" onclick="loadFile('${resolved.path}',null);return false" title="${url}">${name}</a>`;
  });

  // Process images
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');

  // Process headings
  text = text.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
  text = text.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
  text = text.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

  // Process blockquotes
  text = text.replace(/^>\s+(.+)$/gm, (m, c) => `__BLOCKQUOTE_START__${c}__BLOCKQUOTE_END__`);
  text = text.replace(/(?:__BLOCKQUOTE_START__(.+?)__BLOCKQUOTE_END__\n?)+/gs, (m) => {
    const lines = m.split('__BLOCKQUOTE_END__').map(l => l.replace('__BLOCKQUOTE_START__','').trim()).filter(Boolean);
    return `<blockquote>${lines.map(l => `<p>${l}</p>`).join('')}</blockquote>\n`;
  });

  // Process horizontal rules
  text = text.replace(/^---$/gm, '<hr>');
  text = text.replace(/^\*\*\*$/gm, '<hr>');

  // Process tables
  text = text.replace(/^(\|.+\|)\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (match, header, body) => {
    const headers = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>\n`;
  });

  // Process unordered lists
  text = text.replace(/^(\s*)[-*+]\s+(.+)$/gm, '$1<li>$2</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Process ordered lists
  text = text.replace(/^\s*\d+\.\s+(.+)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> in <ol>
  text = text.replace(/((?:<li>.*<\/li>\n?)+)/g, (match) => {
    if (match.includes('<ul>')) return match;
    return `<ol>${match}</ol>`;
  });

  // Process paragraphs (catch remaining lines)
  text = text.replace(/^(?!<[hHlLtTdDiIuUoObBpPeEhHrRnN]|__|\s*$)(.+)$/gm, '<p>$1</p>');

  // Restore code blocks
  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    const lang = b.lang || '';
    const highlighted = highlightCode(b.code, lang);
    text = text.replace(`__CODE_${i}__`, `<pre><code class="lang-${lang}">${highlighted}</code></pre>`);
  }

  // Clean up empty paragraphs
  text = text.replace(/<p>\s*<\/p>/g, '');

  // Fix nested list/paragraph issues
  text = text.replace(/<\/ul>\s*<ul>/g, '');

  return text;
}

// ═══════════════════════════════════════════════════════════════
// SIMPLE SYNTAX HIGHLIGHTER
// ═══════════════════════════════════════════════════════════════
function highlightCode(code, lang) {
  let html = escapeHtml(code);
  if (lang === 'text' || lang === '') return html;

  // Language-specific highlighting
  const keywords = ['if','else','for','while','do','switch','case','break','continue','return','function','class','new','this','super','extends','implements','import','export','from','const','let','var','async','await','yield','throw','try','catch','finally','def','lambda','with','as','pass','in','is','not','and','or','True','False','None','nil','null','undefined','true','false','package','type','struct','interface','enum','defer','go','select','range','chan','map','make','append','len','cap'];

  // Highlight strings
  html = html.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g, '<span class="hl-string">$1</span>');

  // Highlight numbers
  html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="hl-number">$1</span>');

  // Highlight comments
  html = html.replace(/(\/\/.*$|#.*$|--.*$)/gm, '<span class="hl-comment">$1</span>');

  // Highlight keywords
  for (const kw of keywords) {
    html = html.replace(new RegExp(`\\b${kw}\\b`,'g'), `<span class="hl-keyword">${kw}</span>`);
  }

  // Highlight function calls
  html = html.replace(/\b([a-zA-Z_]\w*)\s*\(/g, '<span class="hl-function">$1</span>(');

  // Highlight types (capitalized words)
  html = html.replace(/\b([A-Z]\w+)\b/g, '<span class="hl-type">$1</span>');

  return html;
}

function escapeHtml(text) {
  const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
  return text.replace(/[&<>"']/g, m => map[m]);
}

// ═══════════════════════════════════════════════════════════════
// INTERNAL LINK RESOLVER
// ═══════════════════════════════════════════════════════════════
function resolveInternalLink(url, fromPath) {
  // Handle relative paths
  let targetPath;
  if (url.startsWith('./')) {
    const dir = fromPath.substring(0, fromPath.lastIndexOf('/')+1);
    targetPath = dir + url.substring(2);
  } else if (url.startsWith('../')) {
    let parts = fromPath.split('/');
    let up = 0;
    let remaining = url;
    while (remaining.startsWith('../')) {
      up++;
      remaining = remaining.substring(3);
    }
    parts.splice(-up-1, up, remaining);
    targetPath = parts.filter(Boolean).join('/');
  } else {
    targetPath = url;
  }

  // Try exact match
  if (fileMap[targetPath]) return {path: targetPath};
  if (fileMap[targetPath + '.md']) return {path: targetPath + '.md'};

  // Try fuzzy match
  const name = targetPath.replace(/\.md$/,'').split('/').pop();
  const found = flatList.find(f => f.name === name || f.path.endsWith(`/${name}.md`) || f.path.endsWith(`/${name}`));
  if (found) return {path: found.path};

  return {path: targetPath};
}

// ═══════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════
let searchTimeout = null;

document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 200);
});

function doSearch() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!query || flatList.length === 0) {
    renderTree(fileTree);
    return;
  }

  const results = [];
  for (const file of flatList) {
    const nameMatch = file.name.toLowerCase().includes(query);
    let contentMatches = [];
    if (file.content) {
      const lines = file.content.split('\n');
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].toLowerCase().includes(query)) {
          contentMatches.push({line: i+1, text: lines[i].trim().substring(0,120)});
          if (contentMatches.length >= 3) break;
        }
      }
    }
    if (nameMatch || contentMatches.length > 0) {
      results.push({...file, matches: contentMatches, nameMatch});
    }
    if (results.length >= 50) break;
  }

  // Render search results
  const container = document.getElementById('treeContainer');
  if (results.length === 0) {
    container.innerHTML = '<div style="padding:16px;color:var(--fg3);text-align:center">No results found</div>';
    return;
  }

  let html = `<div style="padding:8px 12px;font-size:11px;color:var(--fg3)">${results.length} results for "${query}"</div>`;
  for (const r of results) {
    html += `<div class="tree-item file" data-path="${escapeHtml(r.path)}" style="padding-left:16px">
      <span class="icon">📄</span>
      <span class="name">${highlightMatch(r.name, query)}</span>
    </div>`;
    if (r.matches.length > 0) {
      for (const m of r.matches) {
        html += `<div class="search-result" data-path="${escapeHtml(r.path)}"><span class="file-path">L${m.line}:</span><span class="match-line">${highlightMatch(m.text, query)}</span></div>`;
      }
    }
  }

  container.innerHTML = html;
  container.querySelectorAll('.tree-item.file, .search-result').forEach(el => {
    el.addEventListener('click', () => loadFile(el.dataset.path, el));
  });
}

function highlightMatch(text, query) {
  const idx = text.toLowerCase().indexOf(query);
  if (idx === -1) return escapeHtml(text);
  return escapeHtml(text.substring(0,idx)) +
    `<span class="match">${escapeHtml(text.substring(idx, idx+query.length))}</span>` +
    escapeHtml(text.substring(idx+query.length));
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
function showStartScreen(show) {
  document.getElementById('startScreen').style.display = show ? 'flex' : 'none';
  if (show) document.getElementById('fileContent').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════
// KEYBOARD NAVIGATION
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('searchInput').blur();
    document.getElementById('searchInput').value = '';
    renderTree(fileTree);
  }
});

// ═══════════════════════════════════════════════════════════════
// DRAG & DROP SUPPORT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  const items = e.dataTransfer.items;
  if (items.length > 0 && items[0].kind === 'file') {
    const entry = items[0].webkitGetAsEntry?.();
    if (entry && entry.isDirectory) {
      // Chrome supports getAsEntry for directories
      try {
        const handle = await importFileSystemFromEntry(entry);
        if (handle) {
          directoryHandle = handle;
          fileTree = [];
          fileMap = {};
          await scanDirectory(handle, '', fileTree, fileMap);
          buildFlatList();
          renderTree(fileTree);
          updateFileCount();
          showStartScreen(false);
        }
      } catch(err) {
        console.error(err);
      }
    }
  }
});
