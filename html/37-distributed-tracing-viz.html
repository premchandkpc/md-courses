<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distributed Tracing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .trace { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .span { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; display: flex; justify-content: space-between; }
    .span.critical { border-left-color: #ef4444; }
    .span-time { font-family: monospace; color: #94a3b8; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Distributed Tracing</h1>
    <a href="../data/14-sre-observability/monitoring/03-opentelemetry-tracing-observability-debugging.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Request Trace</h2>
      <div class="trace" id="trace"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>View</label>
        <button onclick="app.trace()">Show Trace</button>
        <button onclick="app.reset()">Clear</button>
      </div>
      <div class="status">
        <div>Total Latency: <strong id="latency">-</strong></div>
        <div>Spans: <strong id="spans">0</strong></div>
      </div>
      <div class="info-text">
        <strong>Jaeger:</strong> Distributed tracing backend
      </div>
      <div class="info-text">
        <strong>Spans:</strong> Timestamped events
      </div>
      <div class="info-text">
        <strong>Correlation:</strong> Link requests across services
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { showing: false },
      init() { this.render(); },
      trace() { this.state.showing = true; this.render(); },
      reset() { this.state = { showing: false }; this.render(); },
      render() {
        const traceDiv = document.getElementById('trace');
        if(this.state.showing) {
          traceDiv.innerHTML = `
            <div class="span">
              <span>→ API Gateway</span>
              <span class="span-time">50ms</span>
            </div>
            <div class="span">
              <span>→ User Service</span>
              <span class="span-time">120ms</span>
            </div>
            <div class="span critical">
              <span>→ Database Query</span>
              <span class="span-time">300ms ⚠</span>
            </div>
            <div class="span">
              <span>→ Cache Lookup</span>
              <span class="span-time">5ms</span>
            </div>
          `;
          document.getElementById('latency').textContent = '475ms';
          document.getElementById('spans').textContent = '4';
        } else {
          traceDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Click Show Trace</div>';
          document.getElementById('latency').textContent = '-';
          document.getElementById('spans').textContent = '0';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
