<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root Cause Analysis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .analysis { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .cause { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .cause.root { border-left-color: #dc2626; background: rgba(220, 38, 38, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Root Cause Analysis</h1>
    <a href="../data/16-production-incidents/01-incident-postmortems-case-studies.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">5 Whys Analysis</h2>
      <div class="analysis" id="analysis"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Analyze</label>
        <button onclick="app.analyze()">Show Analysis</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Depth: <strong id="depth">0/5</strong></div>
        <div>Found RCA: <strong id="found">No</strong></div>
      </div>
      <div class="info-text">
        <strong>5 Whys:</strong> Iterative questioning
      </div>
      <div class="info-text">
        <strong>Root Cause:</strong> Core issue
      </div>
      <div class="info-text">
        <strong>Preventive:</strong> Fix mechanism
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { analyzed: false },
      whys: [
        {level: 1, q: 'Why did service crash?', a: 'Memory leak in code'},
        {level: 2, q: 'Why memory leak?', a: 'Not releasing cache'},
        {level: 3, q: 'Why not releasing?', a: 'No TTL mechanism'},
        {level: 4, q: 'Why no TTL?', a: 'Design oversight'},
        {level: 5, q: 'Why oversight?', a: 'Insufficient code review'}
      ],
      init() { this.render(); },
      analyze() { this.state.analyzed = true; this.render(); },
      reset() { this.state.analyzed = false; this.render(); },
      render() {
        const anaDiv = document.getElementById('analysis');
        if(this.state.analyzed) {
          anaDiv.innerHTML = this.whys.map((w, i) => {
            const isRoot = i === this.whys.length - 1;
            return `<div class="cause ${isRoot ? 'root' : ''}">
              Q${w.level}: ${w.q} → ${w.a}
            </div>`;
          }).join('');
          document.getElementById('depth').textContent = `${this.whys.length}/5`;
          document.getElementById('found').textContent = 'Yes';
        } else {
          anaDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Click "Show Analysis"</div>';
          document.getElementById('depth').textContent = '0/5';
          document.getElementById('found').textContent = 'No';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
