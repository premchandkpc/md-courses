<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCP Packet Journey - Network Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
      color: #e3eaf0;
      font-family: 'Monaco', 'Menlo', monospace;
      overflow: hidden;
      height: 100vh;
    }
    .container {
      display: flex;
      height: 100vh;
      padding: 16px;
      gap: 16px;
    }
    .canvas-area {
      flex: 1;
      background: #0b0e14;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
    }
    .control-panel {
      width: 300px;
      background: #0b0e14;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h1, h3 {
      color: #00d4ff;
      letter-spacing: 1px;
    }
    h1 { font-size: 18px; margin-bottom: 12px; }
    h3 { font-size: 12px; text-transform: uppercase; margin-bottom: 8px; color: #a3aab8; }
    .control-group { display: flex; flex-direction: column; gap: 8px; }
    button {
      padding: 8px 12px;
      background: #1e3a5f;
      border: 1px solid #00d4ff;
      color: #00d4ff;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      transition: all 0.2s;
    }
    button:hover { background: #2a5a8f; box-shadow: 0 0 8px #00d4ff; }
    .slider-container { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 11px; color: #a3aab8; }
    input[type="range"] {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #1e3a5f;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00d4ff;
      cursor: pointer;
      box-shadow: 0 0 6px #00d4ff;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00d4ff;
      cursor: pointer;
      box-shadow: 0 0 6px #00d4ff;
      border: none;
    }
    .metric {
      background: #1a2332;
      border: 1px solid #1e3a5f;
      border-radius: 4px;
      padding: 8px;
      font-size: 11px;
    }
    .metric-value {
      color: #34d399;
      font-weight: bold;
      font-size: 14px;
    }
    .metric-label {
      color: #a3aab8;
      font-size: 10px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .title-bar {
      background: #1a2332;
      border-bottom: 1px solid #1e3a5f;
      padding: 12px 16px;
    }
    .title-bar h1 { margin: 0; }
  </style>
</head>
<body>
  <div class="title-bar">
    <h1>TCP Packet Journey - 3-Way Handshake</h1>
  </div>

  <div class="container">
    <div class="canvas-area">
      <canvas id="canvas"></canvas>
    </div>

    <div class="control-panel">
      <div>
        <h3>Connection Control</h3>
        <div class="control-group">
          <button id="startHandshake">Start Handshake</button>
          <button id="sendData">Send Data Packet</button>
          <button id="closeConnection">Close Connection</button>
        </div>
      </div>

      <div>
        <h3>Network Conditions</h3>
        <div class="slider-container">
          <label>Latency (ms)</label>
          <input type="range" id="latency" min="1" max="500" value="50">
          <span style="font-size: 10px; color: #34d399;" id="latencyValue">50ms</span>
        </div>
        <div class="slider-container">
          <label>Packet Loss (%)</label>
          <input type="range" id="packetLoss" min="0" max="50" value="0">
          <span style="font-size: 10px; color: #34d399;" id="lossValue">0%</span>
        </div>
      </div>

      <div>
        <h3>Failure Injection</h3>
        <div class="control-group">
          <button id="dropPacket" style="background: #ef4444; border-color: #ef4444; color: #0b0e14;">Drop Next Packet</button>
          <button id="delayPacket">Delay Packet</button>
        </div>
      </div>

      <div>
        <h3>Metrics</h3>
        <div class="metric">
          <div class="metric-label">Connection State</div>
          <div class="metric-value" id="connState">CLOSED</div>
        </div>
        <div class="metric">
          <div class="metric-label">Packets Sent</div>
          <div class="metric-value" id="packetsSent">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Packets Received</div>
          <div class="metric-value" id="packetsReceived">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">RTT (ms)</div>
          <div class="metric-value" id="rtt">0</div>
        </div>
      </div>

      <div>
        <h3>Simulation</h3>
        <div class="control-group">
          <button id="resetSim">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const sim = {
      clientX: 100,
      clientY: canvas.height / 2,
      serverX: canvas.width - 100,
      serverY: canvas.height / 2,
      packets: [],
      state: 'CLOSED',
      latency: 50,
      packetLoss: 0,
      packetsSent: 0,
      packetsReceived: 0,
      rtt: 0,
      clientSeq: 0,
      serverSeq: 0,
      handshakePhase: 0 // 0: none, 1: SYN, 2: SYN-ACK, 3: ACK
    };

    function startHandshake() {
      if (sim.state === 'CLOSED') {
        sim.state = 'SYN_SENT';
        sim.handshakePhase = 1;
        addPacket('SYN', sim.clientX, sim.clientY, sim.serverX, sim.serverY, '#34d399');
        sim.clientSeq++;
        sim.packetsSent++;
      }
    }

    function addPacket(type, fromX, fromY, toX, toY, color) {
      if (Math.random() * 100 > sim.packetLoss) {
        sim.packets.push({
          type: type,
          x: fromX,
          y: fromY,
          targetX: toX,
          targetY: toY,
          progress: 0,
          color: color,
          delay: Math.random() * 20,
          delayRemaining: sim.latency + Math.random() * 20
        });
      }
    }

    function sendData() {
      if (sim.state === 'ESTABLISHED') {
        addPacket('DATA', sim.clientX, sim.clientY, sim.serverX, sim.serverY, '#60a5fa');
        sim.packetsSent++;
      }
    }

    function update() {
      for (let i = sim.packets.length - 1; i >= 0; i--) {
        const pkt = sim.packets[i];
        pkt.delayRemaining--;

        if (pkt.delayRemaining <= 0) {
          pkt.progress += 0.02;
          pkt.x += (pkt.targetX - pkt.x) * 0.05;
          pkt.y += (pkt.targetY - pkt.y) * 0.05;

          // Check if arrived
          const dist = Math.hypot(pkt.targetX - pkt.x, pkt.targetY - pkt.y);
          if (dist < 20) {
            sim.packetsReceived++;

            // Handle handshake
            if (pkt.type === 'SYN' && sim.handshakePhase === 1) {
              sim.handshakePhase = 2;
              sim.state = 'SYN_RECEIVED';
              addPacket('SYN-ACK', sim.serverX, sim.serverY, sim.clientX, sim.clientY, '#fbbf24');
              sim.serverSeq++;
              sim.packetsSent++;
            } else if (pkt.type === 'SYN-ACK' && sim.handshakePhase === 2) {
              sim.handshakePhase = 3;
              sim.state = 'ESTABLISHED';
              addPacket('ACK', sim.clientX, sim.clientY, sim.serverX, sim.serverY, '#34d399');
              sim.clientSeq++;
              sim.packetsSent++;
            } else if (pkt.type === 'ACK' && sim.handshakePhase === 3) {
              sim.handshakePhase = 0;
              sim.state = 'ESTABLISHED';
            }

            sim.packets.splice(i, 1);
          }
        }
      }
    }

    function draw() {
      ctx.fillStyle = '#0b0e14';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw timeline
      ctx.strokeStyle = '#1e3a5f';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sim.clientX, sim.clientY);
      ctx.lineTo(sim.serverX, sim.serverY);
      ctx.stroke();

      // Draw client
      ctx.fillStyle = '#34d399';
      ctx.beginPath();
      ctx.arc(sim.clientX, sim.clientY, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0b0e14';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Client', sim.clientX, sim.clientY);

      // Draw server
      ctx.fillStyle = '#00d4ff';
      ctx.beginPath();
      ctx.arc(sim.serverX, sim.serverY, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0b0e14';
      ctx.fillText('Server', sim.serverX, sim.serverY);

      // Draw packets
      sim.packets.forEach(pkt => {
        ctx.fillStyle = pkt.color;
        ctx.beginPath();
        ctx.arc(pkt.x, pkt.y, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#e3eaf0';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pkt.type.substring(0, 3), pkt.x, pkt.y - 12);
      });

      // Info
      ctx.fillStyle = '#e3eaf0';
      ctx.font = '12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Connection: ${sim.state}`, 20, 30);
      ctx.fillText(`Client Seq: ${sim.clientSeq} | Server Seq: ${sim.serverSeq}`, 20, 50);

      // Handshake visualization
      const handshakeY = canvas.height - 80;
      const handshakeX = 50;
      ctx.fillStyle = '#1e3a5f';
      ctx.fillRect(handshakeX, handshakeY, canvas.width - 100, 60);

      ctx.fillStyle = sim.handshakePhase >= 1 ? '#34d399' : '#666';
      ctx.fillRect(handshakeX + 10, handshakeY + 15, 60, 30);
      ctx.fillStyle = '#0b0e14';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('1. SYN', handshakeX + 40, handshakeY + 30);

      ctx.fillStyle = sim.handshakePhase >= 2 ? '#fbbf24' : '#666';
      ctx.fillRect(handshakeX + 90, handshakeY + 15, 80, 30);
      ctx.fillStyle = '#0b0e14';
      ctx.fillText('2. SYN-ACK', handshakeX + 130, handshakeY + 30);

      ctx.fillStyle = sim.handshakePhase >= 3 ? '#34d399' : '#666';
      ctx.fillRect(handshakeX + 190, handshakeY + 15, 60, 30);
      ctx.fillStyle = '#0b0e14';
      ctx.fillText('3. ACK', handshakeX + 220, handshakeY + 30);
    }

    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    animate();

    // Event listeners
    document.getElementById('startHandshake').addEventListener('click', startHandshake);
    document.getElementById('sendData').addEventListener('click', sendData);
    document.getElementById('closeConnection').addEventListener('click', () => {
      sim.state = 'FIN_WAIT';
      sim.handshakePhase = 0;
      addPacket('FIN', sim.clientX, sim.clientY, sim.serverX, sim.serverY, '#ef4444');
    });

    document.getElementById('latency').addEventListener('input', (e) => {
      sim.latency = parseInt(e.target.value);
      document.getElementById('latencyValue').textContent = sim.latency + 'ms';
    });

    document.getElementById('packetLoss').addEventListener('input', (e) => {
      sim.packetLoss = parseInt(e.target.value);
      document.getElementById('lossValue').textContent = sim.packetLoss + '%';
    });

    document.getElementById('dropPacket').addEventListener('click', () => {
      if (sim.packets.length > 0) {
        sim.packets.shift();
      }
    });

    document.getElementById('delayPacket').addEventListener('click', () => {
      if (sim.packets.length > 0) {
        sim.packets[0].delayRemaining += 200;
      }
    });

    document.getElementById('resetSim').addEventListener('click', () => {
      sim.packets = [];
      sim.state = 'CLOSED';
      sim.clientSeq = 0;
      sim.serverSeq = 0;
      sim.handshakePhase = 0;
      sim.packetsSent = 0;
      sim.packetsReceived = 0;
    });

    // Update metrics
    setInterval(() => {
      document.getElementById('connState').textContent = sim.state;
      document.getElementById('packetsSent').textContent = sim.packetsSent;
      document.getElementById('packetsReceived').textContent = sim.packetsReceived;
      document.getElementById('rtt').textContent = Math.floor(sim.latency * 2);
    }, 100);
  </script>
</body>
</html>
