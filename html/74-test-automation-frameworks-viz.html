<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Automation Frameworks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .frameworks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
    .framework { background: #334155; padding: 15px; border-radius: 8px; border-left: 3px solid #60a5fa; }
    .framework h3 { font-size: 12px; margin-bottom: 8px; }
    .feature { font-size: 11px; color: #cbd5e1; margin: 4px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Test Automation Frameworks</h1>
    <a href="../data/14-testing/03-performance-security-regression-testing.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Framework Comparison</h2>
      <div class="frameworks" id="frameworks"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Load Frameworks</label>
        <button onclick="app.loadFrameworks()">Show All</button>
        <button onclick="app.reset()">Clear</button>
      </div>
      <div class="status">
        <div>Frameworks: <strong id="count">0</strong></div>
        <div>Loaded: <strong id="loaded">False</strong></div>
      </div>
      <div class="info-text">
        <strong>Jest:</strong> JS testing
      </div>
      <div class="info-text">
        <strong>Selenium:</strong> Browser automation
      </div>
      <div class="info-text">
        <strong>Playwright:</strong> Multi-browser
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { loaded: false },
      frameworks: [
        {name: 'Jest', type: 'Unit', lang: 'JavaScript'},
        {name: 'Pytest', type: 'Unit', lang: 'Python'},
        {name: 'Selenium', type: 'E2E', lang: 'Multi-language'},
        {name: 'Playwright', type: 'E2E', lang: 'JavaScript/Python'}
      ],
      init() { this.render(); },
      loadFrameworks() { this.state.loaded = true; this.render(); },
      reset() { this.state.loaded = false; this.render(); },
      render() {
        const fwDiv = document.getElementById('frameworks');
        if(this.state.loaded) {
          fwDiv.innerHTML = this.frameworks.map(f => `
            <div class="framework">
              <h3>${f.name}</h3>
              <div class="feature">Type: ${f.type}</div>
              <div class="feature">Language: ${f.lang}</div>
            </div>
          `).join('');
          document.getElementById('count').textContent = this.frameworks.length;
          document.getElementById('loaded').textContent = 'True';
        } else {
          fwDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;grid-column:1/3;">Click "Show All"</div>';
          document.getElementById('count').textContent = '0';
          document.getElementById('loaded').textContent = 'False';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
