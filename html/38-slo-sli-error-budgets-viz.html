<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLO/SLI & Error Budgets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .slo-meter { background: #334155; padding: 15px; border-radius: 8px; margin: 15px 0; }
    .meter-label { font-size: 12px; margin-bottom: 8px; }
    .meter-bar { background: #1e293b; height: 20px; border-radius: 4px; overflow: hidden; }
    .meter-fill { height: 100%; background: linear-gradient(90deg, #10b981, #84cc16); }
    .meter-fill.warning { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .meter-fill.critical { background: linear-gradient(90deg, #ef4444, #dc2626); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 SLO/SLI & Error Budgets</h1>
    <a href="../data/14-sre-observability/monitoring/02-grafana-slos-alerting-incident-response.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Monthly SLO Status</h2>
      <div id="slos"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Scenario</label>
        <button onclick="app.setHealth('good')">Healthy</button>
        <button onclick="app.setHealth('warning')">Warning</button>
        <button onclick="app.setHealth('critical')">Critical</button>
      </div>
      <div class="status">
        <div>Availability: <strong id="avail">99.95%</strong></div>
        <div>Budget Left: <strong id="budget">95%</strong></div>
      </div>
      <div class="info-text">
        <strong>SLO:</strong> Service level objective (goal)
      </div>
      <div class="info-text">
        <strong>SLI:</strong> Service level indicator (measure)
      </div>
      <div class="info-text">
        <strong>Error Budget:</strong> Allowed downtime
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { health: 'good', avail: 99.95 },
      init() { this.render(); },
      setHealth(h) { this.state.health = h; this.state.avail = h === 'good' ? 99.95 : h === 'warning' ? 99.5 : 99.0; this.render(); },
      render() {
        const slosDiv = document.getElementById('slos');
        const fillClass = this.state.health === 'good' ? '' : this.state.health === 'warning' ? 'warning' : 'critical';
        const pct = this.state.health === 'good' ? 95 : this.state.health === 'warning' ? 50 : 10;
        slosDiv.innerHTML = `
          <div class="slo-meter">
            <div class="meter-label">API Availability (99.95% SLO)</div>
            <div class="meter-bar"><div class="meter-fill ${fillClass}" style="width:${pct}%"></div></div>
            <div style="font-size:11px;color:#cbd5e1;margin-top:5px;">${pct}% of error budget remaining</div>
          </div>
          <div class="slo-meter">
            <div class="meter-label">Response Time (<100ms)</div>
            <div class="meter-bar"><div class="meter-fill" style="width:88%"></div></div>
            <div style="font-size:11px;color:#cbd5e1;margin-top:5px;">88% within SLO</div>
          </div>
        `;
        document.getElementById('avail').textContent = this.state.avail.toFixed(2) + '%';
        document.getElementById('budget').textContent = pct + '%';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
