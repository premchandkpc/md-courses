<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adapter Pattern</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .adaption { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .box { padding: 12px; background: #1e293b; border-radius: 4px; margin: 8px 0; border-left: 3px solid #60a5fa; font-size: 11px; }
    .compatible { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .adapter { padding: 8px; background: #0f172a; border-left: 3px solid #fbbf24; margin: 5px 0; text-align: center; font-size: 10px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Adapter Pattern</h1>
    <a href="../data/15-design-patterns/03-structural-patterns.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Interface Adaptation</h2>
      <div class="adaption" id="adaption"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.withoutAdapter()">Without Adapter</button>
        <button onclick="app.withAdapter()">With Adapter</button>
      </div>
      <div class="status">
        <div>Compatible: <strong id="compatible">No</strong></div>
        <div>Status: <strong id="status">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Structural:</strong> Interface conversion
      </div>
      <div class="info-text">
        <strong>Bridge:</strong> Incompatible APIs
      </div>
      <div class="info-text">
        <strong>Use case:</strong> Legacy integration
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { adapted: false },
      init() { this.render(); },
      withoutAdapter() { this.state.adapted = false; this.render(); },
      withAdapter() { this.state.adapted = true; this.render(); },
      render() {
        const adapDiv = document.getElementById('adaption');
        if(this.state.adapted) {
          adapDiv.innerHTML = `
            <div class="box">Old Interface (Incompatible)</div>
            <div class="adapter">⚡ Adapter converts</div>
            <div class="box compatible">New Interface (Compatible)</div>
          `;
          document.getElementById('compatible').textContent = 'Yes';
          document.getElementById('status').textContent = '✓ Works';
        } else {
          adapDiv.innerHTML = `
            <div class="box">Old Interface (Incompatible)</div>
            <div class="box">New Interface (Incompatible)</div>
          `;
          document.getElementById('compatible').textContent = 'No';
          document.getElementById('status').textContent = '✗ Error';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
