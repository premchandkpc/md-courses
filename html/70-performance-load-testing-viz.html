<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance & Load Testing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    canvas { width: 100%; border: 1px solid #334155; border-radius: 6px; background: #1e293b; margin: 20px 0; }
    .metric { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Performance & Load Testing</h1>
    <a href="../data/14-testing/03-performance-security-regression-testing.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Response Time Graph</h2>
      <canvas id="graph" width="400" height="150"></canvas>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Load Simulation</label>
        <button onclick="app.startTest()">Start Test</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="metric">
        <div>Avg Response: <strong id="avg">-</strong></div>
        <div>P95 Latency: <strong id="p95">-</strong></div>
        <div>Throughput: <strong id="throughput">-</strong></div>
      </div>
      <div class="info-text">
        <strong>JMeter:</strong> Load testing tool
      </div>
      <div class="info-text">
        <strong>Target:</strong> Sub-200ms response
      </div>
      <div class="info-text">
        <strong>Concurrent:</strong> Virtual users
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { data: [] },
      init() { this.drawChart(); },
      startTest() {
        this.state.data = [];
        for(let i = 0; i < 20; i++) {
          this.state.data.push(Math.floor(Math.random() * 200 + 50));
        }
        const avg = Math.floor(this.state.data.reduce((a,b)=>a+b)/this.state.data.length);
        const sorted = [...this.state.data].sort((a,b)=>a-b);
        const p95 = sorted[Math.floor(sorted.length * 0.95)];
        const throughput = Math.floor(1000 / avg);
        document.getElementById('avg').textContent = avg + 'ms';
        document.getElementById('p95').textContent = p95 + 'ms';
        document.getElementById('throughput').textContent = throughput + ' req/s';
        this.drawChart();
      },
      reset() { this.state.data = []; this.drawChart(); },
      drawChart() {
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if(this.state.data.length === 0) {
          ctx.fillStyle = '#94a3b8';
          ctx.font = '12px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('Click "Start Test"', canvas.width/2, canvas.height/2);
          return;
        }
        ctx.strokeStyle = '#10b981';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const step = canvas.width / (this.state.data.length - 1);
        this.state.data.forEach((v, i) => {
          const x = i * step;
          const y = canvas.height - (v / 250) * canvas.height;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
