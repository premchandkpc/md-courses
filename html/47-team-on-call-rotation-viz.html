<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team On-Call Rotation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .schedule { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .oncall { padding: 12px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; }
    .oncall.active { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    .person { font-weight: bold; }
    .time { font-size: 11px; color: #cbd5e1; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Team On-Call Rotation</h1>
    <a href="../data/14-sre-observability/monitoring/02-grafana-slos-alerting-incident-response.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Weekly Schedule</h2>
      <div class="schedule" id="schedule"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.nextWeek()">Next Week</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>On-call: <strong id="oncall">Alice</strong></div>
        <div>Incidents: <strong id="incidents">0</strong></div>
      </div>
      <div class="info-text">
        <strong>Rotation:</strong> Fair distribution of shifts
      </div>
      <div class="info-text">
        <strong>Primary/Secondary:</strong> Escalation path
      </div>
      <div class="info-text">
        <strong>Handoff:</strong> Context transfer
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { week: 0, team: ['Alice', 'Bob', 'Carol', 'David'] },
      init() { this.render(); },
      nextWeek() { this.state.week++; this.render(); },
      reset() { this.state.week = 0; this.render(); },
      render() {
        const scheduleDiv = document.getElementById('schedule');
        const current = this.state.team[this.state.week % this.state.team.length];
        scheduleDiv.innerHTML = this.state.team.map((p, i) => `
          <div class="oncall ${p === current ? 'active' : ''}">
            <div class="person">${p}</div>
            <div class="time">Week ${(this.state.week + i) % 4 + 1}</div>
          </div>
        `).join('');
        document.getElementById('oncall').textContent = current;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
