<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cost Optimization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .cost-item { background: #334155; padding: 12px; border-radius: 6px; margin: 8px 0; display: flex; justify-content: space-between; font-size: 12px; }
    .cost-item.saving { background: rgba(16, 185, 129, 0.1); border-left: 3px solid #10b981; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Cost Optimization</h1>
    <a href="../data/05-cloud/aws/README.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Monthly Costs</h2>
      <div id="costs"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.optimize()">Optimize</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Baseline: <strong id="baseline">$5000</strong></div>
        <div>After: <strong id="after">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Reserved Instances:</strong> 40% discount
      </div>
      <div class="info-text">
        <strong>Spot Instances:</strong> 70% discount
      </div>
      <div class="info-text">
        <strong>Right-sizing:</strong> Match capacity
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { optimized: false },
      costs: [
        {name: 'Compute (On-demand)', cost: 2000},
        {name: 'Storage', cost: 1000},
        {name: 'Network', cost: 800},
        {name: 'Database', cost: 1200}
      ],
      init() { this.render(); },
      optimize() { this.state.optimized = true; this.render(); },
      reset() { this.state = { optimized: false }; this.render(); },
      render() {
        const costsDiv = document.getElementById('costs');
        const total = this.costs.reduce((a,b) => a + b.cost, 0);
        costsDiv.innerHTML = this.costs.map(c => {
          const optimized = this.state.optimized ? Math.round(c.cost * 0.7) : c.cost;
          return `
            <div class="cost-item ${this.state.optimized ? 'saving' : ''}">
              <span>${c.name}</span>
              <span>$${optimized}</span>
            </div>
          `;
        }).join('');
        const afterCost = this.state.optimized ? Math.round(total * 0.7) : total;
        document.getElementById('after').textContent = this.state.optimized ? '$' + afterCost + ' (-30%)' : '-';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
