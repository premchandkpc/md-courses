<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Lineage Tracking</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    svg { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Data Lineage Tracking</h1>
    <a href="../data/02-data-engineering/data-quality-governance/01-data-governance.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas"><svg></svg></div>
    <div class="controls">
      <div class="control-group">
        <label>View</label>
        <button onclick="app.setView('forward')">Forward Flow</button>
        <button onclick="app.setView('backward')">Backward Trace</button>
      </div>
      <div class="status">
        <div>Tracking: <strong id="tracking">Enabled</strong></div>
        <div>Sources: <strong id="sources">3</strong></div>
      </div>
      <div class="info-text">
        <strong>Data Lineage:</strong> Track data origin & transformations
      </div>
      <div class="info-text">
        <strong>Metadata:</strong> What data, when, how
      </div>
      <div class="info-text">
        <strong>Compliance:</strong> GDPR, data audit trails
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { view: 'forward' },
      init() { this.svg = d3.select('svg'); this.render(); },
      setView(v) { this.state.view = v; this.render(); },
      render() {
        const width = this.svg.node().parentElement.clientWidth;
        const height = this.svg.node().parentElement.clientHeight;
        this.svg.selectAll('*').remove();

        const nodes = [
          {x: 80, y: height/2, name: 'Source', color: '#60a5fa'},
          {x: width/2, y: height/2, name: 'Transform', color: '#fbbf24'},
          {x: width-80, y: height/2, name: 'Output', color: '#10b981'}
        ];

        nodes.forEach(n => {
          this.svg.append('circle').attr('cx', n.x).attr('cy', n.y).attr('r', 25).attr('fill', n.color);
          this.svg.append('text').attr('x', n.x).attr('y', n.y+3).attr('text-anchor', 'middle').attr('fill', '#e2e8f0').attr('font-size', '11px').text(n.name);
        });

        this.svg.append('line').attr('x1', 110).attr('y1', height/2).attr('x2', width/2-30).attr('y2', height/2).attr('stroke', '#64748b').attr('stroke-width', 2).attr('marker-end', 'url(#arrowhead)');
        this.svg.append('line').attr('x1', width/2+30).attr('y1', height/2).attr('x2', width-110).attr('y2', height/2).attr('stroke', '#64748b').attr('stroke-width', 2).attr('marker-end', 'url(#arrowhead)');

        document.getElementById('sources').textContent = '3 sources → 2 transforms → 1 output';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
