<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Testing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .workflow { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .action { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .action.done { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 End-to-End Testing</h1>
    <a href="../data/14-testing/01-unit-integration-e2e-testing.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">User Workflow</h2>
      <div class="workflow" id="workflow"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Simulate</label>
        <button onclick="app.startWorkflow()">Login Flow</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Progress: <strong id="progress">0/4</strong></div>
        <div>Status: <strong id="status">Idle</strong></div>
      </div>
      <div class="info-text">
        <strong>Cypress:</strong> Browser automation
      </div>
      <div class="info-text">
        <strong>Playwright:</strong> Cross-browser testing
      </div>
      <div class="info-text">
        <strong>Real env:</strong> Production-like setup
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { step: 0 },
      actions: ['Visit login page', 'Enter credentials', 'Click submit', '✓ Dashboard loaded'],
      init() { this.render(); },
      startWorkflow() { this.state.step = Math.min(this.state.step + 1, 4); this.render(); },
      reset() { this.state.step = 0; this.render(); },
      render() {
        const wfDiv = document.getElementById('workflow');
        wfDiv.innerHTML = this.actions.slice(0, 3).map((a, i) => `
          <div class="action ${i < this.state.step ? 'done' : ''}">
            ${i < this.state.step ? '✓' : '→'} ${a}
          </div>
        `).join('');
        document.getElementById('progress').textContent = `${this.state.step}/4`;
        document.getElementById('status').textContent = this.state.step === 0 ? 'Idle' : this.state.step === 3 ? '✓ Passed' : 'Running';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
