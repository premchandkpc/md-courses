<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Injection Prevention</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .query-box { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .query { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #ef4444; font-size: 11px; font-family: monospace; word-break: break-all; }
    .query.safe { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 SQL Injection Prevention</h1>
    <a href="../data/13-security/01-owasp-top-10-authentication-authorization.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Query Security</h2>
      <div class="query-box" id="queries"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Show Query Type</label>
        <button onclick="app.showVulnerable()">Vulnerable</button>
        <button onclick="app.showSafe()">Protected</button>
      </div>
      <div class="status">
        <div>Status: <strong id="status">-</strong></div>
        <div>Protection: <strong id="protection">None</strong></div>
      </div>
      <div class="info-text">
        <strong>Prepared:</strong> Parameterized queries
      </div>
      <div class="info-text">
        <strong>ORM:</strong> Object-relational mapping
      </div>
      <div class="info-text">
        <strong>Escaping:</strong> Input validation/sanitization
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { type: '' },
      queries: {
        vulnerable: "SELECT * FROM users WHERE id = '" + "1' OR '1'='1" + "'",
        safe: "SELECT * FROM users WHERE id = ?"
      },
      init() { this.render(); },
      showVulnerable() { this.state.type = 'vulnerable'; this.render(); },
      showSafe() { this.state.type = 'safe'; this.render(); },
      render() {
        const queriesDiv = document.getElementById('queries');
        if(this.state.type) {
          const query = this.queries[this.state.type];
          const isSafe = this.state.type === 'safe';
          queriesDiv.innerHTML = `
            <div class="query ${isSafe ? 'safe' : ''}">
              ${query}
            </div>
          `;
          document.getElementById('status').textContent = isSafe ? '✓ Safe' : '✗ Vulnerable';
          document.getElementById('protection').textContent = isSafe ? 'Parameterized' : 'None';
        } else {
          queriesDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Select query type</div>';
          document.getElementById('status').textContent = '-';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
