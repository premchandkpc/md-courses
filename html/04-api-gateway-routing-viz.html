<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Gateway & Request Routing</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .back-link:hover { background: #334155; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; transition: all 0.2s; }
    button:hover { background: #2563eb; }
    button.active { background: #10b981; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    svg { display: block; width: 100%; height: 100%; }
    .gateway-box { stroke-width: 2; rx: 4; }
    .gateway-text { fill: #e2e8f0; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 API Gateway & Request Routing</h1>
    <a href="../data/16-microservices/04-api-gateway.md" class="back-link">← Back to Docs</a>
  </header>
  <div class="container">
    <div id="canvas"><svg></svg></div>
    <div class="controls">
      <div class="control-group">
        <label>Gateway Feature</label>
        <button id="routing" onclick="app.setFeature('routing')" class="active">Routing</button>
        <button id="ratelimit" onclick="app.setFeature('ratelimit')">Rate Limiting</button>
        <button id="auth" onclick="app.setFeature('auth')">Authentication</button>
      </div>
      <div class="status">
        <div>Feature: <strong id="feature">Routing</strong></div>
        <div>Requests: <strong id="requests">0</strong></div>
        <div>Status: <strong id="gw-status">Idle</strong></div>
      </div>
      <div class="control-group">
        <label>Simulate</label>
        <button onclick="app.sendRequest()">Send Request</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="info-text">
        <strong>Routing:</strong> Path-based routing to services (/api/users → User Service).
      </div>
      <div class="info-text">
        <strong>Rate Limiting:</strong> Token bucket algorithm, reject excess requests.
      </div>
      <div class="info-text">
        <strong>Authentication:</strong> Validate JWT tokens before routing.
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background: #60a5fa;"></div>
          <span>Gateway</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #10b981;"></div>
          <span>Allowed</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #ef4444;"></div>
          <span>Rejected</span>
        </div>
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { feature: 'routing', requests: 0, rejected: 0 },
      init() { this.svg = d3.select('svg'); this.render(); },
      setFeature(f) { this.state.feature = f; this.state.requests = 0; this.state.rejected = 0; document.querySelectorAll('.control-group:first-child button').forEach(b => b.classList.remove('active')); document.getElementById(f).classList.add('active'); this.render(); },
      sendRequest() {
        this.state.requests++;
        if (this.state.feature === 'ratelimit') {
          if (this.state.requests > 10) this.state.rejected++;
        } else if (this.state.feature === 'auth') {
          if (Math.random() > 0.7) this.state.rejected++;
        }
        this.render();
      },
      reset() { this.state.requests = 0; this.state.rejected = 0; this.render(); },
      render() {
        const width = this.svg.node().parentElement.clientWidth;
        const height = this.svg.node().parentElement.clientHeight;
        this.svg.selectAll('*').remove();
        const centerX = width / 2;

        // Clients
        const clients = [{ x: 100, y: height / 2 - 80 }, { x: 100, y: height / 2 }, { x: 100, y: height / 2 + 80 }];
        clients.forEach((c, i) => {
          this.svg.append('circle').attr('cx', c.x).attr('cy', c.y).attr('r', 20).attr('fill', '#60a5fa');
          this.svg.append('text').attr('x', c.x).attr('y', c.y + 5).attr('text-anchor', 'middle').attr('font-size', '10px').text(`C${i + 1}`);
        });

        // API Gateway
        this.svg.append('rect').attr('class', 'gateway-box').attr('x', centerX - 60).attr('y', height / 2 - 50).attr('width', 120).attr('height', 100).attr('fill', '#60a5fa');
        this.svg.append('text').attr('class', 'gateway-text').attr('x', centerX).attr('y', height / 2 - 15).text('API Gateway');
        this.svg.append('text').attr('text-anchor', 'middle').attr('x', centerX).attr('y', height / 2 + 20).attr('fill', '#1e293b').attr('font-size', '11px').text(this.state.feature);

        // Requests to gateway
        clients.forEach((c) => {
          this.svg.append('line').attr('x1', c.x + 20).attr('y1', c.y).attr('x2', centerX - 60).attr('y2', height / 2).attr('stroke', '#60a5fa').attr('stroke-width', 1.5).attr('marker-end', 'url(#arrowhead)');
        });

        // Backend services
        const services = [
          { x: width - 150, y: height / 2 - 80, label: 'Users Service' },
          { x: width - 150, y: height / 2, label: 'Orders Service' },
          { x: width - 150, y: height / 2 + 80, label: 'Payments Service' }
        ];

        services.forEach((s, i) => {
          this.svg.append('rect').attr('class', 'gateway-box').attr('x', s.x - 50).attr('y', s.y - 30).attr('width', 100).attr('height', 60).attr('fill', '#10b981').attr('opacity', this.state.requests > 0 && i === 0 ? 1 : 0.5);
          this.svg.append('text').attr('class', 'gateway-text').attr('x', s.x).attr('y', s.y).text(s.label);

          if (this.state.requests > 0 && i === 0) {
            this.svg.append('line').attr('x1', centerX + 60).attr('y1', height / 2).attr('x2', s.x - 50).attr('y2', s.y).attr('stroke', '#10b981').attr('stroke-width', 2).attr('marker-end', 'url(#arrowhead)');
          }
        });

        if (this.state.rejected > 0) {
          this.svg.append('text').attr('x', centerX).attr('y', height - 100).attr('text-anchor', 'middle').attr('fill', '#ef4444').attr('font-size', '12px').text(`⚠ ${this.state.rejected} requests rejected`);
        }

        document.getElementById('feature').textContent = this.state.feature.charAt(0).toUpperCase() + this.state.feature.slice(1);
        document.getElementById('requests').textContent = this.state.requests;
        document.getElementById('gw-status').textContent = this.state.requests === 0 ? 'Idle' : (this.state.rejected > 0 ? 'Some Rejected' : 'Routing');
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
