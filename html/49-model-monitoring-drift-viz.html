<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Monitoring & Drift Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .metrics { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .metric { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 12px; }
    .metric.alert { border-left-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Model Monitoring & Drift Detection</h1>
    <a href="../data/01-ai-ml/mlops/01-mlops.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Model Health</h2>
      <div class="metrics" id="metrics"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Monitor</label>
        <button onclick="app.checkDrift()">Check Drift</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Accuracy: <strong id="accuracy">-</strong></div>
        <div>Data Drift: <strong id="drift">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Model Drift:</strong> Performance degradation
      </div>
      <div class="info-text">
        <strong>Data Drift:</strong> Input distribution change
      </div>
      <div class="info-text">
        <strong>Retraining:</strong> Update on drift detection
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { checked: false, accuracy: 92, drift: false },
      init() { this.render(); },
      checkDrift() { this.state.checked = true; this.state.accuracy = 88 + Math.random()*10; this.state.drift = Math.random() < 0.3; this.render(); },
      reset() { this.state = { checked: false, accuracy: 92, drift: false }; this.render(); },
      render() {
        const metricsDiv = document.getElementById('metrics');
        if(this.state.checked) {
          metricsDiv.innerHTML = `
            <div class="metric">
              <span>Model Accuracy</span> <span>${Math.round(this.state.accuracy)}%</span>
            </div>
            <div class="metric ${this.state.drift ? 'alert' : ''}">
              <span>Data Drift</span> <span>${this.state.drift ? '⚠ Detected' : '✓ Normal'}</span>
            </div>
            <div class="metric">
              <span>Feature Skew</span> <span>Low</span>
            </div>
            <div class="metric">
              <span>Prediction Count</span> <span>1.2M</span>
            </div>
          `;
        } else {
          metricsDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Click Check Drift</div>';
        }
        document.getElementById('accuracy').textContent = this.state.checked ? Math.round(this.state.accuracy) + '%' : '-';
        document.getElementById('drift').textContent = this.state.checked ? (this.state.drift ? '⚠ Detected' : '✓ Normal') : '-';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
