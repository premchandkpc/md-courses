<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatefulSets vs Deployments</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
    .type-box { background: #334155; padding: 15px; border-radius: 8px; border-left: 4px solid #60a5fa; }
    .type-box.stateful { border-left-color: #fbbf24; }
    .type-box h3 { margin-bottom: 10px; }
    .stat { font-size: 11px; color: #cbd5e1; margin: 5px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 StatefulSets vs Deployments</h1>
    <a href="../data/07-kubernetes/01-kubernetes-basics.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Comparison</h2>
      <div class="comparison" id="comparison"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Type</label>
        <button onclick="app.setType('deployment')">Deployments</button>
        <button onclick="app.setType('statefulset')">StatefulSets</button>
      </div>
      <div class="status">
        <div>Selected: <strong id="type">Deployment</strong></div>
        <div>Ordering: <strong id="ordering">Unordered</strong></div>
      </div>
      <div class="info-text">
        <strong>Deployments:</strong> Stateless, replicas interchangeable
      </div>
      <div class="info-text">
        <strong>StatefulSets:</strong> Stateful, stable identity, ordered
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { type: 'deployment' },
      specs: {
        deployment: { id: 'Unique ReplicaSet', storage: 'Ephemeral', ordering: 'Unordered', use: 'Web services' },
        statefulset: { id: 'Stable Pod Name', storage: 'PersistentVolume', ordering: 'Ordered', use: 'Databases' }
      },
      init() { this.render(); },
      setType(t) { this.state.type = t; this.render(); },
      render() {
        const spec = this.specs[this.state.type];
        const canvas = document.getElementById('comparison');
        canvas.innerHTML = `
          <div class="type-box">
            <h3>Deployment</h3>
            <div class="stat">Pod Identity: Unique ReplicaSet</div>
            <div class="stat">Storage: Ephemeral</div>
            <div class="stat">Ordering: Unordered</div>
            <div class="stat">Use: Web services</div>
          </div>
          <div class="type-box stateful">
            <h3>StatefulSet</h3>
            <div class="stat">Pod Identity: Stable Pod Name</div>
            <div class="stat">Storage: PersistentVolume</div>
            <div class="stat">Ordering: Ordered start/stop</div>
            <div class="stat">Use: Databases, queues</div>
          </div>
        `;
        document.getElementById('type').textContent = this.state.type === 'deployment' ? 'Deployment' : 'StatefulSet';
        document.getElementById('ordering').textContent = spec.ordering;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
