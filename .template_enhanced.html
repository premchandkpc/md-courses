<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    header {
      background: #1e293b;
      padding: 20px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 { font-size: 24px; font-weight: 600; }
    h2 { font-size: 18px; margin: 20px 0 15px 0; color: #cbd5e1; font-weight: 500; }

    .back-link {
      color: #60a5fa;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 12px;
      border: 1px solid #334155;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .back-link:hover {
      background: #334155;
      border-color: #60a5fa;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    #canvas {
      flex: 1;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      overflow-y: auto;
      padding: 20px;
    }

    .controls {
      width: 320px;
      background: #1e293b;
      border-left: 1px solid #334155;
      padding: 20px;
      overflow-y: auto;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      margin-bottom: 8px;
      transition: all 0.2s;
      font-weight: 500;
    }
    button:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }
    button:active {
      transform: scale(0.98);
    }

    .status {
      background: #334155;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      margin: 10px 0;
      border-left: 3px solid #60a5fa;
    }
    .status > div {
      margin: 4px 0;
    }

    .info-text {
      font-size: 12px;
      color: #cbd5e1;
      line-height: 1.6;
      margin: 12px 0;
    }

    /* Content cards */
    .content-box {
      background: #334155;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      padding: 12px;
      background: #1e293b;
      border-left: 3px solid #60a5fa;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.5;
      cursor: pointer;
      transition: all 0.2s;
    }

    .item:hover {
      background: #334155;
      border-left-color: #3b82f6;
    }

    .item.active {
      border-left-color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }

    .item-title {
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 4px;
    }

    .item-desc {
      font-size: 12px;
      color: #cbd5e1;
    }

    /* Grid layout */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-card {
      background: #334155;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #475569;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #60a5fa;
      margin: 8px 0;
    }

    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
    }

    /* Canvas */
    canvas {
      width: 100%;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      margin: 15px 0;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #334155;
      border-radius: 4px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #3b82f6);
      transition: width 0.3s ease;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding: 20px 0;
    }

    .timeline-item {
      padding: 15px;
      margin-bottom: 10px;
      background: #334155;
      border-left: 3px solid #60a5fa;
      border-radius: 4px;
    }

    .timeline-item.completed {
      border-left-color: #10b981;
      background: rgba(16, 185, 129, 0.05);
    }

    .timeline-item .number {
      display: inline-block;
      background: #60a5fa;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      text-align: center;
      line-height: 24px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 10px;
    }

    .timeline-item.completed .number {
      background: #10b981;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎨 {{TITLE}}</h1>
    <a href="{{BACK_LINK}}" class="back-link">← Back to Notes</a>
  </header>

  <div class="container">
    <div id="canvas">
      <h2>{{SUBTITLE}}</h2>
      <div id="content-main"></div>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>Controls</label>
        <button id="btn-primary" onclick="app.primaryAction()">Load Content</button>
        <button id="btn-secondary" onclick="app.secondaryAction()">Interact</button>
        <button onclick="app.reset()">Reset</button>
      </div>

      <div class="status">
        <div>Status: <strong id="status">Ready</strong></div>
        <div>Progress: <strong id="progress">0%</strong></div>
      </div>

      <div class="control-group">
        <label>Info</label>
        <div class="info-text" id="info-main">
          {{INFO_TEXT}}
        </div>
      </div>
    </div>
  </div>

  <script>
    const app = {
      state: {
        loaded: false,
        progress: 0,
        step: 0
      },

      init() {
        this.render();
      },

      primaryAction() {
        this.state.loaded = !this.state.loaded;
        this.state.progress = this.state.loaded ? 100 : 0;
        this.render();
      },

      secondaryAction() {
        this.state.step = (this.state.step + 1) % 3;
        this.render();
      },

      reset() {
        this.state = { loaded: false, progress: 0, step: 0 };
        this.render();
      },

      render() {
        const container = document.getElementById('content-main');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');

        if (this.state.loaded) {
          container.innerHTML = this.getContent();
          status.textContent = '✓ Active';
          progress.textContent = `${this.state.progress}%`;
        } else {
          container.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:40px;font-size:14px;">Click "Load Content" to begin</div>';
          status.textContent = 'Ready';
          progress.textContent = '0%';
        }
      },

      getContent() {
        return `<div class="content-box">
          <div class="item-list">
            <div class="item active">
              <div class="item-title">✓ {{TITLE}}</div>
              <div class="item-desc">Interactive learning visualization</div>
            </div>
          </div>
        </div>`;
      }
    };

    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
