<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaos Engineering</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; background: #dc2626; }
    button:hover { background: #b91c1c; }
    .test { background: #334155; padding: 15px; border-radius: 8px; margin: 10px 0; }
    .test-title { font-weight: bold; margin-bottom: 8px; }
    .test-detail { font-size: 11px; color: #cbd5e1; margin: 4px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Chaos Engineering</h1>
    <a href="../data/14-sre-observability/monitoring/02-grafana-slos-alerting-incident-response.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Chaos Experiments</h2>
      <div id="tests"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>⚠️ Experiments</label>
        <button onclick="app.failPod()">Kill Pod</button>
        <button onclick="app.networkLatency()">Network Latency</button>
        <button onclick="app.cpuStress()">CPU Stress</button>
      </div>
      <div class="status">
        <div>Last: <strong id="last">-</strong></div>
        <div>Findings: <strong id="findings">0</strong></div>
      </div>
      <div class="info-text">
        <strong>Chaos:</strong> Inject failures proactively
      </div>
      <div class="info-text">
        <strong>Resilience:</strong> Verify recovery
      </div>
      <div class="info-text">
        <strong>Blast Radius:</strong> Controlled failure scope
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { experiments: [], findings: 0 },
      init() { this.render(); },
      failPod() { this.state.experiments.push('Pod killed: recovered in 5s'); this.state.findings++; this.render(); },
      networkLatency() { this.state.experiments.push('Network latency +500ms: handled'); this.state.findings++; this.render(); },
      cpuStress() { this.state.experiments.push('CPU 90%: autoscale triggered'); this.state.findings++; this.render(); },
      render() {
        const testsDiv = document.getElementById('tests');
        testsDiv.innerHTML = this.state.experiments.slice(-3).map(e => `
          <div class="test">
            <div class="test-title">✓ ${e.split(':')[0]}</div>
            <div class="test-detail">${e.split(':')[1]}</div>
          </div>
        `).join('') || '<div style="color:#94a3b8;text-align:center;padding:20px;">Run experiments</div>';
        document.getElementById('last').textContent = this.state.experiments[this.state.experiments.length-1]?.split(':')[0] || '-';
        document.getElementById('findings').textContent = this.state.findings;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
