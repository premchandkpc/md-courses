<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📚 Engineering Knowledge Universe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;--border:#30363d;--fg:#e6edf3;--fg2:#8b949e;--fg3:#6e7681;--accent:#58a6ff;--accent2:#3fb950;--accent3:#d29922;--accent4:#f85149;--hover:#1f6feb;--radius:6px;--font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;font-size:14px;line-height:1.6}
.container{display:flex;height:100vh}

.sidebar{width:320px;min-width:320px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sidebar-header h2{font-size:15px;font-weight:600;color:var(--fg);flex:1}
.sidebar-header .badge{font-size:10px;color:var(--fg3);background:var(--bg3);padding:2px 8px;border-radius:10px}
.sidebar-search{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-search input{width:100%;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg);font-size:13px;outline:none}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-tree{flex:1;overflow-y:auto;padding:8px 0;-webkit-overflow-scrolling:touch}

.tree-item{display:flex;align-items:center;padding:4px 12px 4px 16px;cursor:pointer;border-radius:0;white-space:nowrap;gap:4px}
.tree-item:hover{background:var(--bg3)}
.tree-item.active{background:var(--hover);color:#fff}
.tree-item .icon{flex-shrink:0;width:16px;text-align:center;font-size:12px;color:var(--fg3)}
.tree-item.folder>.icon{color:var(--accent3)}
.tree-item.file>.icon{color:var(--fg2)}
.tree-item .name{overflow:hidden;text-overflow:ellipsis;font-size:13px}
.tree-item .match{background:var(--accent3);color:#000;padding:0 2px;border-radius:2px}
.tree-children{padding-left:16px;display:none}
.tree-children.open{display:block}
.tree-toggle{cursor:pointer;user-select:none;color:var(--fg3);font-size:10px;width:16px;text-align:center;flex-shrink:0}
.tree-toggle:hover{color:var(--fg)}

.content{flex:1;overflow-y:auto;padding:0;display:flex;flex-direction:column}
.content-header{padding:20px 32px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.content-header h1{font-size:24px;font-weight:600;color:var(--fg);margin-bottom:4px}
.content-header .path{font-size:12px;color:var(--fg3);margin-bottom:12px;word-break:break-all}
.content-body{padding:24px 32px 48px;flex:1;max-width:960px}
.content-body h1{font-size:26px;margin:24px 0 12px;color:var(--fg);border-bottom:1px solid var(--border);padding-bottom:8px}
.content-body h2{font-size:20px;margin:20px 0 10px;color:var(--fg)}
.content-body h3{font-size:16px;margin:16px 0 8px;color:var(--fg)}
.content-body h4{font-size:14px;margin:12px 0 6px;color:var(--fg)}
.content-body p{margin:8px 0;color:var(--fg)}
.content-body ul,.content-body ol{margin:8px 0;padding-left:24px}
.content-body li{margin:4px 0}
.content-body strong{color:var(--fg);font-weight:600}
.content-body a{color:var(--accent);text-decoration:none}
.content-body a:hover{text-decoration:underline}
.content-body blockquote{border-left:3px solid var(--accent2);padding:8px 16px;margin:12px 0;background:var(--bg3);border-radius:0 var(--radius) var(--radius) 0}
.content-body blockquote p{color:var(--fg2)}
.content-body code{font-family:var(--mono);background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:13px;color:var(--accent2)}
.content-body pre{background:var(--bg3);padding:16px;border-radius:var(--radius);overflow-x:auto;margin:12px 0;border:1px solid var(--border);position:relative}
.content-body pre code{background:none;padding:0;font-size:13px;line-height:1.5;color:var(--fg)}
.content-body table{border-collapse:collapse;width:100%;margin:12px 0}
.content-body th,.content-body td{padding:8px 12px;border:1px solid var(--border);text-align:left;font-size:13px}
.content-body th{background:var(--bg3);font-weight:600;color:var(--fg)}
.content-body td{color:var(--fg)}
.content-body tr:nth-child(even) td{background:var(--bg2)}
.content-body hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.content-body img{max-width:100%;border-radius:var(--radius)}

.hl-keyword{color:#ff7b72}.hl-string{color:#a5d6ff}.hl-number{color:#79c0ff}.hl-comment{color:#8b949e;font-style:italic}
.hl-function{color:#d2a8ff}.hl-type{color:#ffa657}.hl-operator{color:#ff7b72}.hl-attr{color:#79c0ff}
.hl-builtin{color:#ffa657}.hl-variable{color:#ffa657}

.stats-bar{display:flex;gap:16px;padding:12px 32px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;color:var(--fg3);flex-wrap:wrap;flex-shrink:0}
.stats-bar span{display:flex;align-items:center;gap:4px}

.start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:40px;text-align:center}
.start-screen h1{font-size:32px;color:var(--fg);margin-bottom:8px}
.start-screen p{color:var(--fg2);max-width:500px;line-height:1.6}
.start-screen .error-detail{color:var(--accent4);font-size:13px;background:var(--bg3);padding:12px 20px;border-radius:var(--radius);border:1px solid var(--border);max-width:500px}
.start-screen .note{font-size:12px;color:var(--fg3);margin-top:4px}

.search-results{padding:4px 0}.search-result{padding:8px 12px;cursor:pointer;border-radius:0;display:flex;gap:8px;align-items:baseline}
.search-result:hover{background:var(--bg3)}.search-result .file-path{font-size:11px;color:var(--fg3);flex-shrink:0}.search-result .match-line{font-size:12px;color:var(--fg2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--fg3)}

.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){.sidebar{width:240px;min-width:240px}.content-body{padding:16px 20px 32px}.content-header{padding:16px 20px 0}}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>📚 Explorer</h2>
      <span class="badge" id="fileCount"></span>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search files..." autocomplete="off">
    </div>
    <div class="sidebar-tree" id="treeContainer"><div class="spinner"></div></div>
  </div>
  <div class="content" id="contentArea">
    <div class="start-screen" id="startScreen">
      <div style="font-size:48px;margin-bottom:8px">📚</div>
      <h1>Engineering Knowledge Universe</h1>
      <p id="startMessage">Loading files...</p>
      <div class="spinner" id="startSpinner"></div>
    </div>
    <div id="fileContent" style="display:none">
      <div class="stats-bar" id="statsBar"></div>
      <div class="content-header" id="contentHeader">
        <h1 id="contentTitle"></h1>
        <div class="path" id="contentPath"></div>
      </div>
      <div class="content-body" id="contentBody"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let fileTree = [];
let filePaths = [];       // [{path, name, dir}]
let fileContent = {};     // path -> content string (lazy loaded)
let selectedPath = null;
let allLoaded = false;

// ═══════════════════════════════════════════════════════════════
// API — talks to server.js
// ═══════════════════════════════════════════════════════════════
async function api(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

// ═══════════════════════════════════════════════════════════════
// INIT — auto-load everything
// ═══════════════════════════════════════════════════════════════
async function init() {
  try {
    // Try loading tree and stats in parallel
    const [treeData, statsData] = await Promise.all([
      api('/api/tree'),
      api('/api/stats'),
    ]);

    fileTree = treeData.tree || [];

    // Build flat list
    filePaths = [];
    function walk(nodes, parentDir) {
      for (const n of nodes) {
        if (n.type === 'file') {
          filePaths.push({path:n.path, name:n.name.replace(/\.md$/,''), dir:parentDir||''});
        } else if (n.type === 'dir' && n.children) {
          walk(n.children, n.path);
        }
      }
    }
    walk(fileTree, '');
    filePaths.sort((a,b) => a.path.localeCompare(b.path));
    allLoaded = true;

    // Update UI
    document.getElementById('fileCount').textContent = `${statsData.mdFiles || filePaths.length} files`;
    renderTree(fileTree);

    // Hide spinner, show post-load state
    const startMsg = document.getElementById('startMessage');
    startMsg.textContent = `Select a file from the sidebar to view`;
    document.getElementById('startSpinner').style.display = 'none';

    // Auto-open first dir in tree
    const firstDir = document.querySelector('.tree-children');
    if (firstDir) firstDir.classList.add('open');

  } catch (err) {
    document.getElementById('startMessage').innerHTML = 'Could not connect to server.';
    document.getElementById('startSpinner').style.display = 'none';
    document.getElementById('startScreen').innerHTML += `
      <div class="error-detail">${err.message}</div>
      <p class="note">Run: <code style="background:var(--bg3);padding:2px 8px;border-radius:4px">node data/server.js</code> then open <code style="background:var(--bg3);padding:2px 8px;border-radius:4px">http://localhost:3000</code></p>
    `;
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER TREE
// ═══════════════════════════════════════════════════════════════
function renderTree(nodes) {
  const container = document.getElementById('treeContainer');
  container.innerHTML = renderTreeNodes(nodes);

  container.addEventListener('click', (e) => {
    const toggle = e.target.closest('.tree-toggle');
    if (toggle) {
      e.stopPropagation();
      const parent = toggle.parentElement;
      const children = parent.nextElementSibling;
      if (children) {
        children.classList.toggle('open');
        toggle.textContent = children.classList.contains('open') ? '▼' : '▶';
      }
      return;
    }
    const item = e.target.closest('.tree-item.file');
    if (item) {
      const path = item.dataset.path;
      if (path) loadFile(path, item);
    }
  });
}

function renderTreeNodes(nodes, depth=0) {
  if (!nodes || nodes.length === 0) return '<div style="padding:16px;color:var(--fg3);font-size:13px;text-align:center">No files found</div>';
  let html = '';
  for (const node of nodes) {
    if (node.type === 'dir') {
      const hasChildren = node.children && node.children.length > 0;
      html += `<div class="tree-item folder" style="padding-left:${12+depth*16}px">
        <span class="tree-toggle">${hasChildren?'▼':'▶'}</span>
        <span class="icon">📁</span>
        <span class="name">${esc(node.name)}</span>
      </div>
      <div class="tree-children${depth===0?' open':''}">`;
      if (hasChildren) html += renderTreeNodes(node.children, depth+1);
      html += `</div>`;
    } else {
      const icon = node.name.endsWith('.md') ? '📄' : '📎';
      html += `<div class="tree-item file" data-path="${esc(node.path)}" style="padding-left:${12+depth*16}px">
        <span class="tree-toggle" style="visibility:hidden">▶</span>
        <span class="icon">${icon}</span>
        <span class="name">${esc(node.name.replace(/\.md$/,''))}</span>
      </div>`;
    }
  }
  return html;
}

// ═══════════════════════════════════════════════════════════════
// LOAD & RENDER FILE
// ═══════════════════════════════════════════════════════════════
async function loadFile(path, el) {
  selectedPath = path;

  document.querySelectorAll('.tree-item.active').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');

  // Show loading state
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('fileContent').style.display = 'flex';
  document.getElementById('fileContent').style.flexDirection = 'column';
  document.getElementById('contentBody').innerHTML = '<div class="spinner"></div>';

  const title = path.replace(/\.md$/,'').split('/').pop();
  document.getElementById('contentTitle').textContent = title;
  document.getElementById('contentPath').textContent = `data/${path}`;

  try {
    const data = await api(`/api/file?path=${encodeURIComponent(path)}`);
    const content = data.content || '';

    const lines = (content.match(/\n/g)||[]).length+1;
    const codeBlocks = ((content.match(/```/g)||[]).length)/2;
    const headings = (content.match(/^#{1,4}\s/gm)||[]).length;
    document.getElementById('statsBar').innerHTML = `
      <span>📄 ${((data.size||0)/1024).toFixed(0)} KB</span>
      <span>📏 ${lines} lines</span>
      <span>🔢 ${headings} headings</span>
      <span>💻 ${codeBlocks} code blocks</span>
    `;

    document.getElementById('contentBody').innerHTML = renderMarkdown(content, path);
    document.getElementById('contentArea').scrollTop = 0;
  } catch(err) {
    document.getElementById('contentBody').innerHTML = `<p style="color:var(--accent4)">Error: ${err.message}</p>`;
  }
}

// ═══════════════════════════════════════════════════════════════
// MARKDOWN RENDERER
// ═══════════════════════════════════════════════════════════════
function renderMarkdown(text, filePath) {
  if (!text) return '<p style="color:var(--fg3)">Empty file</p>';

  let blocks = [];
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    const id = `__CB${blocks.length}__`;
    blocks.push({lang, code: code.replace(/\n+$/,'')});
    return id;
  });

  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  text = text.replace(/~~([^~]+)~~/g, '<del>$1</del>');
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, name, url) => {
    if (url.startsWith('http')) return `<a href="${url}" target="_blank">${esc(name)}</a>`;
    return `<a href="#" onclick="loadFile('${esc(url)}',null);return false">${esc(name)}</a>`;
  });
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');

  text = text.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
  text = text.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
  text = text.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

  text = text.replace(/^>\s+(.+)$/gm, (m,c) => `__BQS__${c}__BQE__`);
  text = text.replace(/(?:__BQS__(.+?)__BQE__\n?)+/gs, m => {
    const lines = m.split('__BQE__').map(l => l.replace('__BQS__','').trim()).filter(Boolean);
    return `<blockquote>${lines.map(l => `<p>${l}</p>`).join('')}</blockquote>\n`;
  });

  text = text.replace(/^---$/gm, '<hr>');
  text = text.replace(/^\*\*\*$/gm, '<hr>');

  text = text.replace(/^(\|.+\|)\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (m, header, body) => {
    const headers = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      return `<tr>${row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('')}</tr>`;
    }).join('');
    return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>\n`;
  });

  text = text.replace(/^(\s*)[-*+]\s+(.+)$/gm, '$1<li>$2</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  text = text.replace(/^\s*\d+\.\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/((?:<li>.*<\/li>\n?)+)/g, m => m.includes('<ul>') ? m : `<ol>${m}</ol>`);

  text = text.replace(/^(?!<[hHlLtTdDiIuUoObBpPeEhHrRnN]|__|\s*$)(.+)$/gm, '<p>$1</p>');
  text = text.replace(/<p>\s*<\/p>/g, '');
  text = text.replace(/<\/ul>\s*<ul>/g, '');

  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    text = text.replace(`__CB${i}__`, `<pre><code class="lang-${b.lang}">${highlight(b.code, b.lang)}</code></pre>`);
  }

  return text;
}

// ═══════════════════════════════════════════════════════════════
// SYNTAX HIGHLIGHT
// ═══════════════════════════════════════════════════════════════
function highlight(code, lang) {
  let html = esc(code);
  if (!lang || lang === 'text') return html;

  html = html.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g, '<span class="hl-string">$1</span>');
  html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="hl-number">$1</span>');
  html = html.replace(/(\/\/.*$|#.*$)/gm, '<span class="hl-comment">$1</span>');

  const kw = /\b(if|else|for|while|do|switch|case|break|continue|return|function|class|new|this|super|extends|implements|import|export|from|const|let|var|async|await|yield|throw|try|catch|finally|def|lambda|with|as|pass|in|is|not|and|or|True|False|None|nil|null|undefined|true|false|package|type|struct|interface|enum|defer|go|select|range|chan|map|make|append|len|cap|def|end)\b/g;
  html = html.replace(kw, '<span class="hl-keyword">$1</span>');
  html = html.replace(/\b([A-Z]\w+)\b/g, '<span class="hl-type">$1</span>');
  html = html.replace(/\b([a-zA-Z_]\w*)\s*\(/g, '<span class="hl-function">$1</span>(');

  return html;
}

function esc(t) {
  const m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
  return t.replace(/[&<>"']/g, x => m[x]);
}

// ═══════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════
let searchTimeout = null;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 200);
});

async function doSearch() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!query || !allLoaded) { renderTree(fileTree); return; }

  try {
    const data = await api(`/api/search?q=${encodeURIComponent(query)}`);
    const results = data.results || [];
    const container = document.getElementById('treeContainer');

    if (results.length === 0) {
      container.innerHTML = '<div style="padding:16px;color:var(--fg3);text-align:center">No results found</div>';
      return;
    }

    let html = `<div style="padding:8px 12px;font-size:11px;color:var(--fg3)">${results.length} results for "${query}"</div>`;
    for (const r of results) {
      html += `<div class="tree-item file" data-path="${esc(r.path)}" style="padding-left:16px">
        <span class="icon">📄</span>
        <span class="name">${highlightMatch(r.name, query)}</span>
      </div>`;
      if (r.matches) {
        for (const m of r.matches.slice(0,2)) {
          html += `<div class="search-result" data-path="${esc(r.path)}">
            <span class="file-path">L${m.line}:</span>
            <span class="match-line">${highlightMatch(m.text.substring(0,120), query)}</span>
          </div>`;
        }
      }
    }
    container.innerHTML = html;
    container.querySelectorAll('.tree-item.file, .search-result').forEach(el => {
      el.addEventListener('click', () => loadFile(el.dataset.path, el));
    });
  } catch {
    // fallback to tree
    renderTree(fileTree);
  }
}

function highlightMatch(text, query) {
  const idx = text.toLowerCase().indexOf(query);
  if (idx === -1) return esc(text);
  return esc(text.substring(0,idx)) + `<span class="match">${esc(text.substring(idx, idx+query.length))}</span>` + esc(text.substring(idx+query.length));
}

// ═══════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === '/' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchInput').blur();
    if (allLoaded) renderTree(fileTree);
  }
});

// ═══════════════════════════════════════════════════════════════
// GO
// ═══════════════════════════════════════════════════════════════
init();
</script>
</body>
</html>
