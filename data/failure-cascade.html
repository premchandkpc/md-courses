<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Failure Cascade - Outage Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
      color: #e3eaf0;
      font-family: 'Monaco', 'Menlo', monospace;
      overflow: hidden;
      height: 100vh;
    }
    .container {
      display: flex;
      height: 100vh;
      padding: 16px;
      gap: 16px;
    }
    .canvas-area {
      flex: 1;
      background: #0b0e14;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
    }
    .control-panel {
      width: 300px;
      background: #0b0e14;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h1, h3 {
      color: #00d4ff;
      letter-spacing: 1px;
    }
    h1 { font-size: 18px; margin-bottom: 12px; }
    h3 { font-size: 12px; text-transform: uppercase; margin-bottom: 8px; color: #a3aab8; }
    .control-group { display: flex; flex-direction: column; gap: 8px; }
    button {
      padding: 8px 12px;
      background: #1e3a5f;
      border: 1px solid #00d4ff;
      color: #00d4ff;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      transition: all 0.2s;
    }
    button:hover { background: #2a5a8f; box-shadow: 0 0 8px #00d4ff; }
    button.failure { background: #ef4444; border-color: #ef4444; color: #0b0e14; }
    .metric {
      background: #1a2332;
      border: 1px solid #1e3a5f;
      border-radius: 4px;
      padding: 8px;
      font-size: 11px;
    }
    .metric-value {
      color: #34d399;
      font-weight: bold;
      font-size: 14px;
    }
    .metric-label {
      color: #a3aab8;
      font-size: 10px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .title-bar {
      background: #1a2332;
      border-bottom: 1px solid #1e3a5f;
      padding: 12px 16px;
    }
    .title-bar h1 { margin: 0; }
  </style>
</head>
<body>
  <div class="title-bar">
    <h1>Failure Cascade Simulator</h1>
  </div>

  <div class="container">
    <div class="canvas-area">
      <canvas id="canvas"></canvas>
    </div>

    <div class="control-panel">
      <div>
        <h3>Failure Scenarios</h3>
        <div class="control-group">
          <button id="failDatabase" class="failure">Fail Primary DB</button>
          <button id="failCache" class="failure">Fail Cache Layer</button>
          <button id="failLoadBalancer" class="failure">Fail Load Balancer</button>
          <button id="failRegion" class="failure">Fail Entire Region</button>
        </div>
      </div>

      <div>
        <h3>Recovery Options</h3>
        <div class="control-group">
          <button id="startRecovery">Start Recovery</button>
          <button id="resetCascade">Reset</button>
        </div>
      </div>

      <div>
        <h3>System State</h3>
        <div class="metric">
          <div class="metric-label">Health Score</div>
          <div class="metric-value" id="healthScore">100%</div>
        </div>
        <div class="metric">
          <div class="metric-label">Failed Components</div>
          <div class="metric-value" id="failedCount">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Error Rate</div>
          <div class="metric-value" id="errorRate">0%</div>
        </div>
        <div class="metric">
          <div class="metric-label">Recovery Progress</div>
          <div class="metric-value" id="recoveryProgress">0%</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const sim = {
      components: [
        { name: 'Load Balancer', x: 100, y: 100, healthy: true, cascadeDelay: 0 },
        { name: 'API Server 1', x: 200, y: 200, healthy: true, cascadeDelay: 0 },
        { name: 'API Server 2', x: 350, y: 200, healthy: true, cascadeDelay: 0 },
        { name: 'Cache Layer', x: 275, y: 300, healthy: true, cascadeDelay: 0 },
        { name: 'Primary DB', x: 100, y: 350, healthy: true, cascadeDelay: 0 },
        { name: 'Replica DB', x: 350, y: 350, healthy: true, cascadeDelay: 0 },
        { name: 'Queue System', x: 200, y: 400, healthy: true, cascadeDelay: 0 }
      ],
      recovering: false,
      recoveryTime: 0,
      failureTime: 0,
      cascadeActive: false
    };

    function failComponent(name) {
      const component = sim.components.find(c => c.name === name);
      if (component && component.healthy) {
        component.healthy = false;
        component.cascadeDelay = 0;
        sim.failureTime = Date.now();
        sim.cascadeActive = true;

        // Trigger cascade
        cascadeFailure(component);
      }
    }

    function cascadeFailure(failedComponent) {
      // Determine which components are affected
      if (failedComponent.name === 'Primary DB') {
        // Fail replica after a delay
        setTimeout(() => {
          const replica = sim.components.find(c => c.name === 'Replica DB');
          if (replica && replica.healthy) {
            replica.healthy = false;
          }
        }, 2000);

        // Degrade API servers
        sim.components.filter(c => c.name.includes('API')).forEach(api => {
          api.cascadeDelay = 1000;
        });

        // Affect cache
        const cache = sim.components.find(c => c.name === 'Cache Layer');
        if (cache) cache.cascadeDelay = 1500;
      } else if (failedComponent.name === 'Cache Layer') {
        // Cascade to API servers
        sim.components.filter(c => c.name.includes('API')).forEach(api => {
          api.cascadeDelay = 1000;
        });
      } else if (failedComponent.name === 'Load Balancer') {
        // All services degraded
        sim.components.forEach(c => {
          if (!c.healthy && c.name !== 'Load Balancer') {
            c.cascadeDelay = 500;
          }
        });
      }
    }

    function startRecovery() {
      if (sim.components.some(c => !c.healthy)) {
        sim.recovering = true;
        sim.recoveryTime = 0;

        // Recover all components
        setTimeout(() => {
          sim.components.forEach(c => c.healthy = true);
          sim.recovering = false;
        }, 5000);
      }
    }

    function draw() {
      ctx.fillStyle = '#0b0e14';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw connections
      const connections = [
        [0, 1], [0, 2], [1, 3], [2, 3], [3, 4], [3, 5], [1, 6]
      ];

      connections.forEach(([from, to]) => {
        const c1 = sim.components[from];
        const c2 = sim.components[to];
        ctx.strokeStyle = c1.healthy && c2.healthy ? '#1e3a5f' : '#ef4444';
        ctx.lineWidth = c1.healthy && c2.healthy ? 1 : 3;
        ctx.beginPath();
        ctx.moveTo(c1.x, c1.y);
        ctx.lineTo(c2.x, c2.y);
        ctx.stroke();
      });

      // Draw components
      sim.components.forEach(comp => {
        const colors = {
          healthy: '#34d399',
          failing: '#fbbf24',
          failed: '#ef4444'
        };

        let state = 'healthy';
        if (!comp.healthy) state = 'failed';
        else if (comp.cascadeDelay > 0) state = 'failing';

        ctx.fillStyle = colors[state];
        ctx.globalAlpha = comp.cascadeDelay > 0 ? 0.7 : 1;
        ctx.beginPath();
        ctx.arc(comp.x, comp.y, 25, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        ctx.fillStyle = '#0b0e14';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const shortName = comp.name.replace(/\s/g, '\n').substring(0, 4);
        ctx.fillText(shortName, comp.x, comp.y);

        // Component label
        ctx.fillStyle = '#a3aab8';
        ctx.font = '9px monospace';
        ctx.fillText(comp.name, comp.x, comp.y + 40);
      });

      // Draw cascade indicators
      if (sim.cascadeActive) {
        ctx.fillStyle = '#ef4444';
        ctx.globalAlpha = 0.3;
        sim.components.filter(c => !c.healthy).forEach(comp => {
          ctx.beginPath();
          ctx.arc(comp.x, comp.y, 35, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      // Status info
      ctx.fillStyle = '#e3eaf0';
      ctx.font = '12px monospace';
      ctx.textAlign = 'left';
      const failedCount = sim.components.filter(c => !c.healthy).length;
      const healthScore = Math.max(0, 100 - failedCount * 15);
      ctx.fillText(`Failed Components: ${failedCount}`, 20, 30);
      ctx.fillText(`System Health: ${healthScore}%`, 20, 50);
      ctx.fillText(`Recovery: ${sim.recovering ? 'In Progress' : 'Idle'}`, 20, 70);
    }

    function animate() {
      draw();
      if (sim.recovering) {
        sim.recoveryTime += 16;
      }
      requestAnimationFrame(animate);
    }
    animate();

    // Event listeners
    document.getElementById('failDatabase').addEventListener('click', () => failComponent('Primary DB'));
    document.getElementById('failCache').addEventListener('click', () => failComponent('Cache Layer'));
    document.getElementById('failLoadBalancer').addEventListener('click', () => failComponent('Load Balancer'));
    document.getElementById('failRegion').addEventListener('click', () => {
      sim.components.forEach(c => {
        if (Math.random() > 0.3) c.healthy = false;
      });
      sim.cascadeActive = true;
    });

    document.getElementById('startRecovery').addEventListener('click', startRecovery);
    document.getElementById('resetCascade').addEventListener('click', () => {
      sim.components.forEach(c => c.healthy = true);
      sim.cascadeActive = false;
      sim.recovering = false;
      sim.recoveryTime = 0;
    });

    // Update metrics
    setInterval(() => {
      const failedCount = sim.components.filter(c => !c.healthy).length;
      const healthScore = Math.max(0, 100 - failedCount * 15);
      const errorRate = (failedCount / sim.components.length) * 100;
      const recoveryProgress = sim.recovering ? Math.min(100, (sim.recoveryTime / 5000) * 100) : 0;

      document.getElementById('healthScore').textContent = healthScore + '%';
      document.getElementById('failedCount').textContent = failedCount;
      document.getElementById('errorRate').textContent = errorRate.toFixed(0) + '%';
      document.getElementById('recoveryProgress').textContent = Math.floor(recoveryProgress) + '%';
    }, 100);
  </script>
</body>
</html>
