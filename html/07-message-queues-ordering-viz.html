<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Queues & Event Ordering</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; transition: all 0.2s; }
    button:hover { background: #2563eb; }
    button.active { background: #10b981; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    .queue-view { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; max-height: 300px; overflow-y: auto; }
    .message { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 4px solid #60a5fa; font-size: 12px; }
    .message.processed { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Message Queues & Event Ordering</h1>
    <a href="../data/10-messaging/README.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Message Queue</h2>
      <div class="queue-view" id="queue"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Queue Type</label>
        <button id="fifo" onclick="app.setType('fifo')" class="active">FIFO</button>
        <button id="priority" onclick="app.setType('priority')">Priority</button>
      </div>
      <div class="status">
        <div>Type: <strong id="type">FIFO</strong></div>
        <div>Queue Length: <strong id="length">0</strong></div>
        <div>Processed: <strong id="processed">0</strong></div>
      </div>
      <div class="control-group">
        <button onclick="app.addMessage()">Add Message</button>
        <button onclick="app.processMessage()">Process</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="info-text">
        <strong>FIFO:</strong> First-in-first-out ordering, guaranteed order.
      </div>
      <div class="info-text">
        <strong>Priority:</strong> Process high-priority messages first.
      </div>
      <div class="info-text">
        <strong>At-least-once:</strong> Retry until processed, may duplicate.
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { type: 'fifo', queue: [], processed: 0, msgId: 0 },
      init() { this.render(); },
      setType(t) { this.state.type = t; this.state.queue = []; this.state.processed = 0; document.querySelectorAll('.control-group:first-child button').forEach(b => b.classList.remove('active')); document.getElementById(t).classList.add('active'); this.render(); },
      addMessage() {
        const priority = this.state.type === 'priority' ? Math.floor(Math.random() * 3) : 0;
        this.state.queue.push({ id: this.state.msgId++, priority, processed: false });
        if (this.state.type === 'priority') {
          this.state.queue.sort((a, b) => b.priority - a.priority);
        }
        this.render();
      },
      processMessage() {
        if (this.state.queue.length > 0) {
          const msg = this.state.queue.shift();
          this.state.processed++;
        }
        this.render();
      },
      reset() { this.state.queue = []; this.state.processed = 0; this.state.msgId = 0; this.render(); },
      render() {
        const queueDiv = document.getElementById('queue');
        if (this.state.queue.length === 0) {
          queueDiv.innerHTML = '<div style="color: #94a3b8; text-align: center; padding: 20px;">Queue empty</div>';
        } else {
          queueDiv.innerHTML = this.state.queue.map((m, i) => `
            <div class="message">
              Message #${m.id} ${this.state.type === 'priority' ? `[Priority: ${m.priority}]` : ''} - Position ${i + 1}
            </div>
          `).join('');
        }
        document.getElementById('type').textContent = this.state.type === 'fifo' ? 'FIFO' : 'Priority';
        document.getElementById('length').textContent = this.state.queue.length;
        document.getElementById('processed').textContent = this.state.processed;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
