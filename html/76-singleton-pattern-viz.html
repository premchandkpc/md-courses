<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Singleton Pattern</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .diagram { background: #334155; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: center; }
    .instance { background: #1e293b; padding: 15px; border-radius: 8px; border: 2px solid #60a5fa; margin: 10px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Singleton Pattern</h1>
    <a href="../data/15-design-patterns/01-creational-patterns.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Singleton Instance</h2>
      <div class="diagram" id="diagram"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.getInstance()">Get Instance</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Instances: <strong id="instances">0</strong></div>
        <div>State: <strong id="state">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Creational:</strong> Object creation
      </div>
      <div class="info-text">
        <strong>Single instance:</strong> Global access
      </div>
      <div class="info-text">
        <strong>Use case:</strong> Logger, Config
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { count: 0 },
      init() { this.render(); },
      getInstance() { this.state.count = Math.min(this.state.count + 1, 1); this.render(); },
      reset() { this.state.count = 0; this.render(); },
      render() {
        const diagDiv = document.getElementById('diagram');
        if(this.state.count > 0) {
          diagDiv.innerHTML = '<div class="instance">🎯 Singleton Instance</div>';
          document.getElementById('instances').textContent = '1';
          document.getElementById('state').textContent = '✓ Created';
        } else {
          diagDiv.innerHTML = '<div style="color:#94a3b8;padding:40px;">No instance</div>';
          document.getElementById('instances').textContent = '0';
          document.getElementById('state').textContent = '-';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
