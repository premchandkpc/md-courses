<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kubernetes Pod Scheduling</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    .node-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
    .node { padding: 15px; background: #334155; border-radius: 6px; border: 2px solid #64748b; min-height: 150px; }
    .node-title { font-weight: bold; margin-bottom: 8px; color: #60a5fa; }
    .pod { padding: 8px; background: #1e293b; margin: 5px 0; border-radius: 4px; font-size: 11px; border-left: 3px solid #10b981; }
    .pod.pending { border-left-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Kubernetes Pod Scheduling</h1>
    <a href="../data/07-kubernetes/01-kubernetes-basics.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Node Scheduler</h2>
      <div class="node-grid" id="nodes"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Scheduling</label>
        <button onclick="app.addPod()">Add Pod</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Nodes: <strong id="nodeCount">3</strong></div>
        <div>Pods: <strong id="podCount">0</strong></div>
        <div>Pending: <strong id="pending">0</strong></div>
      </div>
      <div class="info-text">
        <strong>Scheduler:</strong> Places pods on nodes based on resource requests
      </div>
      <div class="info-text">
        <strong>Selectors:</strong> Affinity rules constrain pod placement
      </div>
      <div class="info-text">
        <strong>Taints:</strong> Nodes can repel pods
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { nodes: [{id:1, cpu:0, mem:0}, {id:2, cpu:0, mem:0}, {id:3, cpu:0, mem:0}], pods: 0, pending: 0 },
      init() { this.render(); },
      addPod() { this.state.pods++; const cpu = Math.random() * 500; const node = this.state.nodes.reduce((a,b) => a.cpu < b.cpu ? a : b); if(node.cpu + cpu <= 1000) { node.cpu += cpu; } else { this.state.pending++; } this.render(); },
      reset() { this.state = { nodes: [{id:1, cpu:0, mem:0}, {id:2, cpu:0, mem:0}, {id:3, cpu:0, mem:0}], pods: 0, pending: 0 }; this.render(); },
      render() {
        const nodesDiv = document.getElementById('nodes');
        nodesDiv.innerHTML = this.state.nodes.map(n => `
          <div class="node">
            <div class="node-title">Node ${n.id}</div>
            <div style="font-size:11px;color:#94a3b8;">CPU: ${Math.round(n.cpu)}/1000m</div>
            <div class="pod" style="background:#1e293b;border-left:2px solid #64748b;margin-top:8px;">Ready</div>
          </div>
        `).join('');
        document.getElementById('nodeCount').textContent = this.state.nodes.length;
        document.getElementById('podCount').textContent = this.state.pods;
        document.getElementById('pending').textContent = this.state.pending;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
