<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithms & Complexity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    canvas { width: 100%; border: 1px solid #334155; border-radius: 6px; background: #1e293b; margin: 20px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Algorithms & Complexity</h1>
    <a href="../data/00-foundations/index.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Big O Complexity</h2>
      <canvas id="chart" width="400" height="150"></canvas>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Plot</label>
        <button onclick="app.drawChart()">Show Complexity</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Status: <strong id="status">-</strong></div>
        <div>Best: <strong id="best">-</strong></div>
      </div>
      <div class="info-text">
        <strong>O(1):</strong> Constant
      </div>
      <div class="info-text">
        <strong>O(log n):</strong> Binary search
      </div>
      <div class="info-text">
        <strong>O(n²):</strong> Nested loops
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { drawn: false },
      init() { this.reset(); },
      drawChart() {
        this.state.drawn = true;
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const curves = {
          'O(1)': (x) => 20,
          'O(log n)': (x) => 30 + Math.log2(x + 1) * 10,
          'O(n)': (x) => 20 + x * 2,
          'O(n²)': (x) => 20 + x * x
        };
        const colors = ['#10b981', '#60a5fa', '#fbbf24', '#ef4444'];
        Object.entries(curves).forEach(([label, fn], idx) => {
          ctx.strokeStyle = colors[idx];
          ctx.lineWidth = 2;
          ctx.beginPath();
          for(let i = 0; i < 150; i++) {
            const y = Math.min(150, fn(i / 30));
            i === 0 ? ctx.moveTo(i, 150 - y) : ctx.lineTo(i, 150 - y);
          }
          ctx.stroke();
        });
        document.getElementById('status').textContent = 'Complexity curves shown';
        document.getElementById('best').textContent = 'O(1) constant';
      },
      reset() {
        this.state.drawn = false;
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#94a3b8';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Click "Show Complexity"', canvas.width/2, canvas.height/2);
        document.getElementById('status').textContent = '-';
        document.getElementById('best').textContent = '-';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
