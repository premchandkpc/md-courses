<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distributed Systems - Raft Consensus Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
      color: #e3eaf0;
      font-family: 'Monaco', 'Menlo', monospace;
      overflow: hidden;
      height: 100vh;
    }
    .container {
      display: flex;
      height: 100vh;
      padding: 16px;
      gap: 16px;
    }
    .canvas-area {
      flex: 1;
      background: #0b0e14;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
    }
    .control-panel {
      width: 300px;
      background: #0b0e14;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h1, h3 {
      color: #00d4ff;
      letter-spacing: 1px;
    }
    h1 { font-size: 18px; margin-bottom: 12px; }
    h3 { font-size: 12px; text-transform: uppercase; margin-bottom: 8px; color: #a3aab8; }
    .control-group { display: flex; flex-direction: column; gap: 8px; }
    button {
      padding: 8px 12px;
      background: #1e3a5f;
      border: 1px solid #00d4ff;
      color: #00d4ff;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      transition: all 0.2s;
    }
    button:hover { background: #2a5a8f; box-shadow: 0 0 8px #00d4ff; }
    .metric {
      background: #1a2332;
      border: 1px solid #1e3a5f;
      border-radius: 4px;
      padding: 8px;
      font-size: 11px;
    }
    .metric-value {
      color: #34d399;
      font-weight: bold;
      font-size: 14px;
    }
    .metric-label {
      color: #a3aab8;
      font-size: 10px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .title-bar {
      background: #1a2332;
      border-bottom: 1px solid #1e3a5f;
      padding: 12px 16px;
    }
    .title-bar h1 { margin: 0; }
  </style>
</head>
<body>
  <div class="title-bar">
    <h1>Distributed Systems - Raft Consensus</h1>
  </div>

  <div class="container">
    <div class="canvas-area">
      <canvas id="canvas"></canvas>
    </div>

    <div class="control-panel">
      <div>
        <h3>Cluster Control</h3>
        <div class="control-group">
          <button id="startLeaderElection">Force Election</button>
          <button id="isolateNode" style="background: #ef4444; border-color: #ef4444; color: #0b0e14;">Isolate Node</button>
          <button id="healNode">Heal Node</button>
        </div>
      </div>

      <div>
        <h3>Replication</h3>
        <div class="control-group">
          <button id="appendEntry">Append Log Entry</button>
          <button id="commitEntry">Commit Entry</button>
        </div>
      </div>

      <div>
        <h3>Failure Injection</h3>
        <div class="control-group">
          <button id="createPartition" style="background: #ef4444; border-color: #ef4444; color: #0b0e14;">Network Partition</button>
          <button id="healPartition">Heal Partition</button>
        </div>
      </div>

      <div>
        <h3>Metrics</h3>
        <div class="metric">
          <div class="metric-label">Current Leader</div>
          <div class="metric-value" id="currentLeader">-</div>
        </div>
        <div class="metric">
          <div class="metric-label">Current Term</div>
          <div class="metric-value" id="currentTerm">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Log Entries</div>
          <div class="metric-value" id="logEntries">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Committed Entries</div>
          <div class="metric-value" id="committedEntries">0</div>
        </div>
      </div>

      <div>
        <h3>Simulation</h3>
        <div class="control-group">
          <button id="resetSim">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const sim = {
      nodes: [
        { id: 0, state: 'follower', term: 0, logLength: 0, x: 100, y: 150, isolated: false },
        { id: 1, state: 'follower', term: 0, logLength: 0, x: canvas.width/2 - 50, y: 100, isolated: false },
        { id: 2, state: 'follower', term: 0, logLength: 0, x: canvas.width - 100, y: 150, isolated: false }
      ],
      leader: null,
      currentTerm: 0,
      logEntries: [],
      committedIndex: -1,
      partitioned: false,
      partitionGroup: []
    };

    function startLeaderElection() {
      sim.currentTerm++;
      sim.nodes.forEach(node => node.term = sim.currentTerm);

      // Simulate election
      const nonIsolated = sim.nodes.filter(n => !n.isolated);
      if (nonIsolated.length > 0) {
        const newLeader = nonIsolated[Math.floor(Math.random() * nonIsolated.length)];
        sim.nodes.forEach(n => n.state = n.id === newLeader.id ? 'leader' : 'follower');
        sim.leader = newLeader.id;
      }
    }

    function appendLogEntry() {
      if (sim.leader !== null) {
        sim.logEntries.push({
          term: sim.currentTerm,
          index: sim.logEntries.length,
          data: `entry-${sim.logEntries.length}`,
          committed: false
        });

        // Replicate to followers
        sim.nodes.forEach(node => {
          if (node.id !== sim.leader && !node.isolated) {
            node.logLength = sim.logEntries.length;
          }
        });
      }
    }

    function commitEntry() {
      if (sim.leader !== null && sim.logEntries.length > 0) {
        const uncommittedIndex = sim.logEntries.findIndex(e => !e.committed);
        if (uncommittedIndex !== -1) {
          const nonIsolated = sim.nodes.filter(n => !n.isolated).length;
          if (nonIsolated > Math.floor(sim.nodes.length / 2)) {
            sim.logEntries[uncommittedIndex].committed = true;
            sim.committedIndex = uncommittedIndex;
          }
        }
      }
    }

    function isolateNode() {
      const nonIsolated = sim.nodes.filter(n => !n.isolated);
      if (nonIsolated.length > 0) {
        const node = nonIsolated[Math.floor(Math.random() * nonIsolated.length)];
        node.isolated = true;
        if (node.id === sim.leader) {
          startLeaderElection();
        }
      }
    }

    function healNode() {
      const isolated = sim.nodes.find(n => n.isolated);
      if (isolated) {
        isolated.isolated = false;
      }
    }

    function createPartition() {
      sim.partitioned = true;
      sim.partitionGroup = [0]; // Isolate node 0
      sim.nodes[0].isolated = true;
    }

    function healPartition() {
      sim.partitioned = false;
      sim.nodes.forEach(n => n.isolated = false);
    }

    function draw() {
      ctx.fillStyle = '#0b0e14';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw partition line if active
      if (sim.partitioned) {
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 3, 0);
        ctx.lineTo(canvas.width / 3, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Draw nodes
      sim.nodes.forEach(node => {
        const colors = {
          'leader': '#34d399',
          'candidate': '#fbbf24',
          'follower': '#00d4ff'
        };

        ctx.fillStyle = colors[node.state];
        ctx.globalAlpha = node.isolated ? 0.3 : 1;
        ctx.beginPath();
        ctx.arc(node.x, node.y, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        ctx.fillStyle = '#0b0e14';
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.id, node.x, node.y - 5);

        ctx.font = '10px monospace';
        ctx.fillText(`${node.state}`, node.x, node.y + 15);

        // Draw term and log info
        ctx.fillStyle = '#a3aab8';
        ctx.font = '9px monospace';
        ctx.fillText(`T${node.term}`, node.x, node.y + 35);
      });

      // Draw log entries
      const logStartX = 50;
      const logStartY = canvas.height - 150;
      ctx.fillStyle = '#a3aab8';
      ctx.font = '12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Log Entries (${sim.logEntries.length}):`, logStartX, logStartY);

      sim.logEntries.slice(-10).forEach((entry, idx) => {
        const y = logStartY + 30 + idx * 20;
        ctx.fillStyle = entry.committed ? '#34d399' : '#fbbf24';
        ctx.fillRect(logStartX + idx * 50, y - 15, 40, 15);
        ctx.fillStyle = '#0b0e14';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${entry.index}`, logStartX + idx * 50 + 20, y - 7);
      });

      // Info text
      ctx.fillStyle = '#e3eaf0';
      ctx.font = '11px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Term: ${sim.currentTerm} | Leader: ${sim.leader !== null ? 'Node ' + sim.leader : 'None'}`, 20, 30);
      ctx.fillText(`Quorum: ${Math.floor(sim.nodes.length / 2) + 1} nodes | Active: ${sim.nodes.filter(n => !n.isolated).length}`, 20, 50);
    }

    function animate() {
      draw();
      requestAnimationFrame(animate);
    }
    animate();

    // Event listeners
    document.getElementById('startLeaderElection').addEventListener('click', startLeaderElection);
    document.getElementById('appendEntry').addEventListener('click', appendLogEntry);
    document.getElementById('commitEntry').addEventListener('click', commitEntry);
    document.getElementById('isolateNode').addEventListener('click', isolateNode);
    document.getElementById('healNode').addEventListener('click', healNode);
    document.getElementById('createPartition').addEventListener('click', createPartition);
    document.getElementById('healPartition').addEventListener('click', healPartition);

    document.getElementById('resetSim').addEventListener('click', () => {
      sim.nodes.forEach(n => {
        n.state = 'follower';
        n.term = 0;
        n.logLength = 0;
        n.isolated = false;
      });
      sim.leader = null;
      sim.currentTerm = 0;
      sim.logEntries = [];
      sim.committedIndex = -1;
      sim.partitioned = false;
    });

    // Update metrics
    setInterval(() => {
      document.getElementById('currentLeader').textContent = sim.leader !== null ? 'Node ' + sim.leader : 'None';
      document.getElementById('currentTerm').textContent = sim.currentTerm;
      document.getElementById('logEntries').textContent = sim.logEntries.length;
      document.getElementById('committedEntries').textContent = sim.committedIndex + 1;
    }, 100);

    // Auto-elect leader
    if (sim.leader === null) startLeaderElection();
  </script>
</body>
</html>
