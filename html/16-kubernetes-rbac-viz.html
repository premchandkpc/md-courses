<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kubernetes RBAC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .rbac-flow { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .flow-step { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 12px; }
    .flow-step.allowed { border-left-color: #10b981; }
    .flow-step.denied { border-left-color: #ef4444; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Kubernetes RBAC</h1>
    <a href="../data/07-kubernetes/04-kubernetes-security.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">RBAC Authorization Flow</h2>
      <div class="rbac-flow" id="flow"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Role</label>
        <button onclick="app.setRole('admin')">Admin</button>
        <button onclick="app.setRole('user')">User</button>
        <button onclick="app.setRole('viewer')">Viewer</button>
      </div>
      <div class="status">
        <div>Role: <strong id="role">Admin</strong></div>
        <div>Allowed: <strong id="allowed">0</strong></div>
      </div>
      <div class="info-text">
        <strong>ServiceAccount:</strong> Identity for workloads
      </div>
      <div class="info-text">
        <strong>Role:</strong> Set of permissions
      </div>
      <div class="info-text">
        <strong>RoleBinding:</strong> Attach role to account
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { role: 'admin', actions: 0 },
      permissions: {
        admin: ['get pods', 'list pods', 'create pods', 'delete pods', 'get secrets'],
        user: ['get pods', 'list pods', 'get logs'],
        viewer: ['get pods', 'list pods']
      },
      init() { this.render(); },
      setRole(r) { this.state.role = r; this.state.actions = 0; this.render(); },
      render() {
        const perms = this.permissions[this.state.role];
        const flow = document.getElementById('flow');
        flow.innerHTML = perms.map((p, i) => `
          <div class="flow-step allowed">
            ${(i+1)}. ${p.toUpperCase()} ✓ Allowed
          </div>
        `).join('') + `
          <div class="flow-step denied">
            ${perms.length+1}. DELETE NODES ✗ Denied
          </div>
        `;
        document.getElementById('role').textContent = this.state.role.charAt(0).toUpperCase() + this.state.role.slice(1);
        document.getElementById('allowed').textContent = perms.length;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
