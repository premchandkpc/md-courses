<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programming Paradigms</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .paradigms { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .paradigm { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .paradigm.selected { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Programming Paradigms</h1>
    <a href="../data/00-foundations/index.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Paradigm Overview</h2>
      <div class="paradigms" id="paradigms"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Select</label>
        <button onclick="app.select('imperative')">Imperative</button>
        <button onclick="app.select('functional')">Functional</button>
        <button onclick="app.select('oop')">OOP</button>
        <button onclick="app.select('declarative')">Declarative</button>
      </div>
      <div class="status">
        <div>Selected: <strong id="selected">-</strong></div>
        <div>Approach: <strong id="approach">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Imperative:</strong> How to do
      </div>
      <div class="info-text">
        <strong>Functional:</strong> Pure functions
      </div>
      <div class="info-text">
        <strong>OOP:</strong> Objects & classes
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { selected: '' },
      paradigms: {
        'imperative': {name: 'Imperative', desc: 'Explicit steps, state mutations'},
        'functional': {name: 'Functional', desc: 'Pure functions, immutability'},
        'oop': {name: 'Object-Oriented', desc: 'Objects, inheritance, polymorphism'},
        'declarative': {name: 'Declarative', desc: 'What not how, SQL/React'}
      },
      init() { this.render(); },
      select(p) { this.state.selected = p; this.render(); },
      render() {
        const paradigmsDiv = document.getElementById('paradigms');
        paradigmsDiv.innerHTML = Object.keys(this.paradigms).map(key => {
          const p = this.paradigms[key];
          const isSelected = key === this.state.selected;
          return `<div class="paradigm ${isSelected ? 'selected' : ''}">
            ${isSelected ? '→' : '•'} ${p.name}: ${p.desc}
          </div>`;
        }).join('');
        if(this.state.selected && this.paradigms[this.state.selected]) {
          const p = this.paradigms[this.state.selected];
          document.getElementById('selected').textContent = p.name;
          document.getElementById('approach').textContent = p.desc;
        } else {
          document.getElementById('selected').textContent = '-';
          document.getElementById('approach').textContent = '-';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
