<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>System Design — Interactive Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0e14;--bg2:#11161e;--bg3:#18202a;--bg4:#1f2937;--border:#1e2a3a;--fg:#e3eaf0;--fg2:#94a3b8;--fg3:#64748b;--accent:#60a5fa;--accent-hover:#93c5fd;--green:#34d399;--purple:#a78bfa;--pink:#f472b6;--orange:#fb923c;--radius:10px;--font:'Inter',system-ui,-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.container{max-width:1200px;margin:0 auto;padding:40px 24px}
h1{font-size:32px;font-weight:800;letter-spacing:-.025em;margin-bottom:6px;display:flex;align-items:center;gap:12px}
.sub{color:var(--fg2);font-size:14px;margin-bottom:40px;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:40px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);text-decoration:none;color:var(--fg);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .2s}
.card:hover{background:var(--bg3);border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card:hover::before{opacity:1}
.card-icon{font-size:28px;margin-bottom:10px}
.card h3{font-size:16px;font-weight:700;margin-bottom:6px}
.card p{font-size:12.5px;color:var(--fg2);line-height:1.5;margin-bottom:8px}
.card .tags{display:flex;gap:4px;flex-wrap:wrap}
.card .tag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;background:var(--bg4);border-radius:4px;color:var(--fg3);border:1px solid var(--border)}
.card .tag.green{color:var(--green);border-color:rgba(52,211,149,.2);background:rgba(52,211,149,.06)}
.card .tag.purple{color:var(--purple);border-color:rgba(167,139,250,.2);background:rgba(167,139,250,.06)}
.card .tag.orange{color:var(--orange);border-color:rgba(251,146,60,.2);background:rgba(251,146,60,.06)}
.card .tag.pink{color:var(--pink);border-color:rgba(244,114,182,.2);background:rgba(244,114,182,.06)}
.card .tag.blue{color:var(--accent);border-color:rgba(96,165,250,.2);background:rgba(96,165,250,.06)}
.foundations{grid-column:1/-1;margin-bottom:8px}
.foundations h2{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--fg3);margin-bottom:12px}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--fg3);margin:24px 0 8px;padding:8px 12px;background:var(--bg2);border-radius:6px;border-left:3px solid var(--accent)}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--fg3);text-decoration:none;font-size:13px;margin-bottom:24px;transition:color .15s}
.back-link:hover{color:var(--accent)}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:32px}
.stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg2);padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px}
.search-box{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:14px;outline:none;font-family:var(--font);margin-bottom:24px;transition:border-color .15s}
.search-box:focus{border-color:var(--accent);background:var(--bg4)}
.search-box::placeholder{color:var(--fg3)}
@media(max-width:700px){.container{padding:20px 14px}h1{font-size:24px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="javascript:history.back()">← Back</a>
  <h1>📋 System Design — Interactive Index</h1>
  <p class="sub">Interactive architecture diagrams for every system design concept. Click any card to open the visual walkthrough.</p>
  <div class="stats">
    <span class="stat">📐 <span id="topicCount">0</span> topics</span>
    <span class="stat">🎨 <span id="diagramCount">0</span> interactive diagrams</span>
  </div>
  <input class="search-box" id="search" placeholder="Search topics..." autocomplete="off">
  <div class="section-title">⚡ Foundations</div>
  <div class="grid" id="foundationsGrid"></div>
  <div class="section-title">🌐 Networking</div>
  <div class="grid" id="networkingGrid"></div>
  <div class="section-title">📦 Systems</div>
  <div class="grid" id="systemsGrid"></div>
</div>
<script>
const topics = {
  foundations: [
    {icon:'⚡',name:'Latency',desc:'Sources of latency, measurement, optimization strategies, P99 tail latency, caching hierarchy',file:'00-foundations/latency-architecture.html',tags:['performance','blue']},
    {icon:'📊',name:'Throughput',desc:'Requests per second, bandwidth, saturation, Little\'s Law, scaling strategies',file:'00-foundations/throughput-architecture.html',tags:['scaling','green']},
    {icon:'🟢',name:'Availability',desc:'High availability, SLA/SLO/SLI, redundancy, failover, graceful degradation',file:'00-foundations/availability-architecture.html',tags:['reliability','green']},
    {icon:'🎯',name:'Consistency',desc:'Strong vs eventual consistency, CAP theorem, vector clocks, CRDTs',file:'00-foundations/consistency-architecture.html',tags:['distributed','purple']},
    {icon:'🌀',name:'PACELC',desc:'PACELC trade-offs, partition tolerance vs latency vs consistency',file:'00-foundations/pacelc-architecture.html',tags:['distributed','purple']},
    {icon:'🏛️',name:'CAP Theorem',desc:'Consistency, Availability, Partition Tolerance trade-offs, real-world choices',file:'00-foundations/cap-architecture.html',tags:['distributed','purple']},
    {icon:'🔒',name:'Reliability & Durability',desc:'Fault tolerance, replication, durability guarantees, data loss prevention',file:'00-foundations/reliability-architecture.html',tags:['reliability','green']},
    {icon:'🔄',name:'Idempotency',desc:'Idempotency keys, at-least-once vs exactly-once, retry strategies',file:'00-foundations/idempotency-architecture.html',tags:['patterns','orange']},
    {icon:'⏸️',name:'Backpressure',desc:'Load shedding, rate limiting, circuit breakers, graceful degradation',file:'00-foundations/backpressure-architecture.html',tags:['reliability','orange']},
  ],
  networking: [
    {icon:'🔗',name:'TCP/IP Stack',desc:'OSI model, TCP handshake, congestion control, flow control, Nagle\'s algorithm',file:'01-networking/tcp-ip-architecture.html',tags:['protocol','blue']},
    {icon:'🌐',name:'DNS Resolution',desc:'Recursive resolution, caching, TTL, anycast, DNS-based routing',file:'01-networking/dns-architecture.html',tags:['infra','blue']},
    {icon:'📨',name:'HTTP/HTTPS',desc:'HTTP/1.1, HTTP/2 multiplexing, HTTP/3 QUIC, TLS handshake, persistent connections',file:'01-networking/http-architecture.html',tags:['protocol','blue']},
    {icon:'📦',name:'UDP & Datagrams',desc:'Connectionless protocol, QUIC, DNS, streaming, real-time communication',file:'01-networking/udp-architecture.html',tags:['protocol','blue']},
    {icon:'🔌',name:'WebSockets',desc:'Upgrade handshake, full-duplex communication, reconnection strategies, frame types',file:'01-networking/websockets-architecture.html',tags:['realtime','purple']},
    {icon:'⚖️',name:'Load Balancing',desc:'ALB vs NLB, consistent hashing, health checks, connection draining, sticky sessions',file:'01-networking/load-balancing-architecture.html',tags:['infra','green']},
    {icon:'🗺️',name:'CDNs',desc:'Edge caching, origin shield, cache invalidation, geo-routing, DDoS mitigation',file:'01-networking/cdn-architecture.html',tags:['infra','green']},
  ],
  systems: [
    {icon:'▶️',name:'YouTube Recommendations',desc:'Two-tower retrieval, ranking, real-time signals, candidate generation',file:'youtube-architecture.html',tags:['ml','pink']},
    {icon:'🔍',name:'Google Search Ranking',desc:'Indexing, query understanding, ranking signals, PageRank, fresh documents',file:'search-architecture.html',tags:['ml','pink']},
    {icon:'📈',name:'Ads CTR Prediction',desc:'RTB pipeline, feature engineering, model serving, auction mechanics',file:'ads-architecture.html',tags:['ml','pink']},
    {icon:'🤖',name:'LLM Serving',desc:'Token generation, KV cache, continuous batching, speculative decoding, quantization',file:'llm-architecture.html',tags:['ml','pink']},
    {icon:'🎵',name:'TikTok Feed Ranking',desc:'For-you page, user embedding, content embedding, real-time personalization',file:'tiktok-architecture.html',tags:['ml','pink']},
    {icon:'🎬',name:'Netflix Recs',desc:'Personalized rows, A/B testing, bandits, multi-armed bandit, causal inference',file:'netflix-architecture.html',tags:['ml','pink']},
    {icon:'📍',name:'Maps & Geo',desc:'Spatial indexing, route optimization, ETA prediction, real-time traffic',file:'maps-architecture.html',tags:['geo','orange']},
  ]
};

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  for (const [key, group] of Object.entries(topics)) {
    const grid = document.getElementById(key + 'Grid');
    if (!grid) continue;
    const filtered = q ? group.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(tg => tg.includes(q))) : group;
    grid.innerHTML = filtered.map(t => `
      <a class="card" href="${t.file}">
        <div class="card-icon">${t.icon}</div>
        <h3>${t.name}</h3>
        <p>${t.desc}</p>
        <div class="tags">${t.tags.map(tg => `<span class="tag ${tg}">${tg}</span>`).join('')}</div>
      </a>
    `).join('');
  }
  document.getElementById('topicCount').textContent = Object.values(topics).flat().length;
  document.getElementById('diagramCount').textContent = Object.values(topics).flat().length;
}

document.getElementById('search').addEventListener('input', render);
render();

const cards = document.querySelectorAll('.card');
cards.forEach(c => c.addEventListener('click', e => {
  if (e.target.closest('.card')) { /* let default href work */ }
}));
</script>
</body>
</html>
