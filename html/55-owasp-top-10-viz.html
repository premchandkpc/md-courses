 const app = {
 state: { loaded: false, step: 0 },
 content: ["Concept from Owasp Top 10", "Learn and explore"],
 init() { this.loadState(); this.render(); this.saveState(); },
      loadState() {
        const saved = localStorage.getItem(window.location.pathname);
        if (saved) this.state = JSON.parse(saved);
      },
      saveState() {
        localStorage.setItem(window.location.pathname, JSON.stringify(this.state));
      },
 load() {
 this.state.loaded = true;
 setTimeout(() => this.drawVisualization(), 100);
 this.state.step = 0;
 this.render(); this.saveState();
 },
 nextStep() {
 if (this.state.loaded) {
 this.state.step = (this.state.step + 1) % this.content.length;
 this.render(); this.saveState();
 }
 },
 reset() {
 this.state = { loaded: false, step: 0 };
 this.render(); this.saveState();
 },
 render() {
 const container = document.getElementById('content-main');
 const status = document.getElementById('status');
 const progress = document.getElementById('progress');
 if (this.state.loaded) {
 const items = this.content.map((item, idx) => `
 <div class="item ${idx === this.state.step ? 'active' : ''}"><div class="item-title">${idx === this.state.step ? '→' : '•'} ${item.split(':')[0]}</div><div class="item-desc">${item.split(':').length > 1 ? item.split(':')[1].trim() : item}</div></div>
 `).join('');
 container.innerHTML = `<div class="item-list">${items}</div>`;
 status.textContent = '✓ Active';
 progress.textContent = `${Math.round((this.state.step + 1) / this.content.length * 100)}%`;
 } else {
 container.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:40px;">Click "Load" to view content</div>';
 status.textContent = 'Ready';
 progress.textContent = '0%';
 }
 }
 };
