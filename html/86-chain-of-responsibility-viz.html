<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chain of Responsibility</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .chain { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .handler { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .handler.processed { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Chain of Responsibility</h1>
    <a href="../data/15-design-patterns/02-behavioral-patterns.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Request Processing</h2>
      <div class="chain" id="chain"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Send Request</label>
        <button onclick="app.sendRequest()">Process</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Handlers: <strong id="handlers">3</strong></div>
        <div>Processed By: <strong id="processed">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Behavioral:</strong> Request propagation
      </div>
      <div class="info-text">
        <strong>Chain:</strong> Handler sequence
      </div>
      <div class="info-text">
        <strong>Use case:</strong> Middleware, logging
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { processed: -1 },
      handlers: ['Handler 1', 'Handler 2', 'Handler 3'],
      init() { this.render(); },
      sendRequest() { this.state.processed = 1; this.render(); },
      reset() { this.state.processed = -1; this.render(); },
      render() {
        const chainDiv = document.getElementById('chain');
        chainDiv.innerHTML = this.handlers.map((h, i) => `
          <div class="handler ${this.state.processed >= i ? 'processed' : ''}">
            ${this.state.processed >= i ? '✓' : '→'} ${h}
          </div>
        `).join('');
        document.getElementById('handlers').textContent = this.handlers.length;
        document.getElementById('processed').textContent = this.state.processed >= 0 ? this.handlers[this.state.processed] : '-';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
