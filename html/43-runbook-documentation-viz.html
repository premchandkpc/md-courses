<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runbook & Documentation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .runbook { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .step { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Runbook & Documentation</h1>
    <a href="../data/14-sre-observability/monitoring/02-grafana-slos-alerting-incident-response.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Incident Runbook</h2>
      <div class="runbook" id="runbook"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Scenario</label>
        <button onclick="app.setScenario('cpu')">High CPU</button>
        <button onclick="app.setScenario('db')">DB Unavailable</button>
        <button onclick="app.setScenario('network')">Network Issues</button>
      </div>
      <div class="status">
        <div>Issue: <strong id="issue">-</strong></div>
        <div>Steps: <strong id="steps">0</strong></div>
      </div>
      <div class="info-text">
        <strong>Runbooks:</strong> Step-by-step procedures
      </div>
      <div class="info-text">
        <strong>Playbooks:</strong> Automated recovery
      </div>
      <div class="info-text">
        <strong>Post-mortems:</strong> Learn from incidents
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { scenario: '' },
      scenarios: {
        cpu: {name: 'High CPU Alert', steps: ['Check running processes', 'Identify memory leaks', 'Restart service', 'Monitor recovery']},
        db: {name: 'Database Unavailable', steps: ['Check DB logs', 'Restart database', 'Check replication', 'Alert team']},
        network: {name: 'Network Latency', steps: ['Check router status', 'Inspect packet loss', 'Scale up infrastructure', 'Verify recovery']}
      },
      init() { this.render(); },
      setScenario(s) { this.state.scenario = s; this.render(); },
      render() {
        const runbookDiv = document.getElementById('runbook');
        if(this.state.scenario) {
          const scenario = this.scenarios[this.state.scenario];
          runbookDiv.innerHTML = scenario.steps.map((s, i) => `
            <div class="step">${i+1}. ${s}</div>
          `).join('');
          document.getElementById('issue').textContent = scenario.name;
          document.getElementById('steps').textContent = scenario.steps.length;
        } else {
          runbookDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Select an incident type</div>';
          document.getElementById('issue').textContent = '-';
          document.getElementById('steps').textContent = '0';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
