<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outage Timeline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .timeline { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .event { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #ef4444; font-size: 11px; }
    .event.resolved { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .event.investigating { border-left-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Outage Timeline</h1>
    <a href="../data/16-production-incidents/01-incident-postmortems-case-studies.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Incident Timeline</h2>
      <div class="timeline" id="timeline"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Simulate</label>
        <button onclick="app.nextEvent()">Next Event</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Status: <strong id="status">-</strong></div>
        <div>Duration: <strong id="duration">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Timeline:</strong> Incident progression
      </div>
      <div class="info-text">
        <strong>Events:</strong> Detection to resolution
      </div>
      <div class="info-text">
        <strong>MTTD/MTTR:</strong> Mean time metrics
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { step: 0 },
      events: [
        {time: '00:00', desc: '🚨 Alert: Spike in errors', type: 'error'},
        {time: '00:03', desc: '🔍 Investigation: Database connection pool exhausted', type: 'investigating'},
        {time: '00:08', desc: '⚙️ Fix: Increased pool size', type: 'investigating'},
        {time: '00:12', desc: '✓ Resolved: Service restored', type: 'resolved'}
      ],
      init() { this.render(); },
      nextEvent() { this.state.step = Math.min(this.state.step + 1, this.events.length); this.render(); },
      reset() { this.state.step = 0; this.render(); },
      render() {
        const tlDiv = document.getElementById('timeline');
        const shown = this.events.slice(0, this.state.step);
        if(shown.length) {
          tlDiv.innerHTML = shown.map(e => `
            <div class="event ${e.type === 'resolved' ? 'resolved' : e.type === 'investigating' ? 'investigating' : ''}">
              ${e.time}: ${e.desc}
            </div>
          `).join('');
          document.getElementById('status').textContent = this.state.step === this.events.length ? 'Resolved' : 'Investigating';
          document.getElementById('duration').textContent = `${this.state.step * 3}min`;
        } else {
          tlDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Click "Next Event"</div>';
          document.getElementById('status').textContent = '-';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
