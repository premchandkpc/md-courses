<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Serving & Inference</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .serving-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
    .serving-item { background: #334155; padding: 15px; border-radius: 8px; border-left: 3px solid #60a5fa; }
    .serving-item h3 { margin-bottom: 8px; font-size: 12px; }
    .detail { font-size: 11px; color: #cbd5e1; margin: 4px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Model Serving & Inference</h1>
    <a href="../data/01-ai-ml/mlops/01-mlops.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Inference Pipelines</h2>
      <div class="serving-grid" id="serving"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Type</label>
        <button onclick="app.setType('batch')">Batch Inference</button>
        <button onclick="app.setType('online')">Online Inference</button>
      </div>
      <div class="status">
        <div>Type: <strong id="type">Batch</strong></div>
        <div>Latency: <strong id="latency">Hours</strong></div>
      </div>
      <div class="info-text">
        <strong>Model serving:</strong> TensorFlow, PyTorch frameworks
      </div>
      <div class="info-text">
        <strong>Containerization:</strong> Docker + K8s deployment
      </div>
      <div class="info-text">
        <strong>Monitoring:</strong> Model drift detection
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { type: 'batch' },
      types: {
        batch: {
          title: 'Batch Inference',
          details: ['Process data in batches', 'Run nightly jobs', 'Cost-efficient'],
          latency: 'Hours'
        },
        online: {
          title: 'Online Inference',
          details: ['Real-time predictions', 'HTTP API endpoint', 'Low latency'],
          latency: 'Milliseconds'
        }
      },
      init() { this.render(); },
      setType(t) { this.state.type = t; this.render(); },
      render() {
        const t = this.types[this.state.type];
        const servingDiv = document.getElementById('serving');
        servingDiv.innerHTML = `
          <div class="serving-item">
            <h3>${t.title}</h3>
            ${t.details.map(d => `<div class="detail">• ${d}</div>`).join('')}
          </div>
          <div class="serving-item">
            <h3>Frameworks</h3>
            <div class="detail">TensorFlow Serving</div>
            <div class="detail">TorchServe</div>
            <div class="detail">KServe</div>
          </div>
        `;
        document.getElementById('type').textContent = this.state.type === 'batch' ? 'Batch' : 'Online';
        document.getElementById('latency').textContent = t.latency;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
