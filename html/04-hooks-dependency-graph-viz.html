<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hooks & Dependency Management</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .back-link:hover { background: #334155; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; transition: all 0.2s; }
    button:hover { background: #2563eb; }
    button.active { background: #10b981; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; line-height: 1.8; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    svg { display: block; width: 100%; height: 100%; }
    .hook-box { fill: #334155; stroke: #64748b; stroke-width: 2; rx: 4; }
    .hook-text { fill: #e2e8f0; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Hooks & Dependency Management</h1>
    <a href="../data/04-frontend/react/04-hooks-deep-dive/01-hooks-state.md" class="back-link">← Back to Docs</a>
  </header>
  <div class="container">
    <div id="canvas"><svg></svg></div>
    <div class="controls">
      <div class="control-group">
        <label>Hook Scenario</label>
        <button id="simple" onclick="app.setScenario('simple')" class="active">Simple</button>
        <button id="complex" onclick="app.setScenario('complex')">Complex Deps</button>
        <button id="stale" onclick="app.setScenario('stale')">Stale Closure</button>
      </div>
      <div class="status">
        <div>Scenario: <strong id="scenario">Simple</strong></div>
        <div>Re-renders: <strong id="rerenders">0</strong></div>
        <div>Deps Met: <strong id="deps-met" style="color: #10b981;">Yes</strong></div>
      </div>
      <div class="control-group">
        <label>Simulate</label>
        <button onclick="app.trigger()">State Change</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="info-text">
        <strong>Dependency array:</strong> Tells React when to run effect. Missing dependencies = stale closures.
      </div>
      <div class="info-text">
        <strong>Hook rules:</strong> Order must be stable. Conditionals break hooks list alignment.
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background: #3b82f6;"></div>
          <span>Hook</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #60a5fa;"></div>
          <span>Dependency</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #fbbf24;"></div>
          <span>Stale</span>
        </div>
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { scenario: 'simple', rerenders: 0, depsMet: true, triggerCount: 0 },
      init() { this.svg = d3.select('svg'); this.render(); },
      setScenario(s) { this.state.scenario = s; this.state.rerenders = 0; this.state.triggerCount = 0; document.querySelectorAll('.control-group:first-child button').forEach(b => b.classList.remove('active')); document.getElementById(s).classList.add('active'); this.updateStatus(); this.render(); },
      trigger() { this.state.rerenders++; this.state.triggerCount++; this.updateStatus(); this.render(); },
      reset() { this.state.rerenders = 0; this.state.triggerCount = 0; this.updateStatus(); this.render(); },
      updateStatus() {
        const scenarioText = this.state.scenario === 'simple' ? 'Simple' : this.state.scenario === 'complex' ? 'Complex Deps' : 'Stale Closure';
        document.getElementById('scenario').textContent = scenarioText;
        document.getElementById('rerenders').textContent = this.state.rerenders;
        const depsMet = this.state.scenario !== 'stale' || this.state.triggerCount < 3;
        document.getElementById('deps-met').textContent = depsMet ? 'Yes' : 'No (Bug!)';
        document.getElementById('deps-met').style.color = depsMet ? '#10b981' : '#ef4444';
      },
      render() {
        const width = this.svg.node().parentElement.clientWidth;
        const height = this.svg.node().parentElement.clientHeight;
        this.svg.selectAll('*').remove();
        const centerX = width / 2;
        let hooks = [];
        if (this.state.scenario === 'simple') {
          hooks = [
            { id: 'state', x: centerX - 100, y: 120, label: 'useState', color: '#3b82f6' },
            { id: 'effect', x: centerX + 100, y: 120, label: 'useEffect', color: '#3b82f6' }
          ];
        } else if (this.state.scenario === 'complex') {
          hooks = [
            { id: 'state1', x: centerX - 150, y: 100, label: 'useState(data)', color: '#3b82f6' },
            { id: 'state2', x: centerX, y: 100, label: 'useState(loading)', color: '#3b82f6' },
            { id: 'effect', x: centerX + 150, y: 100, label: 'useEffect', color: '#3b82f6' },
            { id: 'memo', x: centerX - 75, y: 200, label: 'useMemo', color: '#3b82f6' },
            { id: 'callback', x: centerX + 75, y: 200, label: 'useCallback', color: '#3b82f6' }
          ];
        } else {
          hooks = [
            { id: 'state', x: centerX - 120, y: 120, label: 'useState(count)', color: '#3b82f6' },
            { id: 'effect', x: centerX, y: 120, label: 'useEffect', color: '#fbbf24' },
            { id: 'callback', x: centerX + 120, y: 120, label: 'useCallback', color: '#fbbf24' }
          ];
        }
        hooks.forEach(h => {
          this.svg.append('rect').attr('class', 'hook-box').attr('x', h.x - 50).attr('y', h.y - 25).attr('width', 100).attr('height', 50).attr('fill', h.color);
          this.svg.append('text').attr('class', 'hook-text').attr('x', h.x).attr('y', h.y).text(h.label);
        });
        if (this.state.scenario === 'simple') {
          const deps = [{ x: centerX + 100, y: 200, label: '[data]' }];
          deps.forEach(d => {
            this.svg.append('line').attr('x1', hooks[1].x).attr('y1', hooks[1].y + 25).attr('x2', d.x).attr('y2', d.y - 25).attr('stroke', '#60a5fa').attr('stroke-width', 2);
            this.svg.append('text').attr('x', d.x).attr('y', d.y).attr('text-anchor', 'middle').attr('fill', '#60a5fa').attr('font-size', '12px').text(d.label);
          });
        } else if (this.state.scenario === 'complex') {
          const deps = [{ x: centerX + 150, y: 200, label: '[data, loading]' }];
          deps.forEach(d => {
            this.svg.append('line').attr('x1', hooks[2].x).attr('y1', hooks[2].y + 25).attr('x2', d.x).attr('y2', d.y - 25).attr('stroke', '#60a5fa').attr('stroke-width', 2);
            this.svg.append('text').attr('x', d.x).attr('y', d.y).attr('text-anchor', 'middle').attr('fill', '#60a5fa').attr('font-size', '12px').text(d.label);
          });
        } else {
          this.svg.append('text').attr('x', centerX).attr('y', height - 100).attr('text-anchor', 'middle').attr('fill', '#ef4444').attr('font-size', '14px').attr('font-weight', 'bold').text('❌ Stale Closure Bug');
          this.svg.append('text').attr('x', centerX).attr('y', height - 70).attr('text-anchor', 'middle').attr('fill', '#fbbf24').attr('font-size', '12px').text('Missing "count" in dependency array');
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
