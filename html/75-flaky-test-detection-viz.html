<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flaky Test Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .results { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .run { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .run.pass { border-left-color: #10b981; }
    .run.fail { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Flaky Test Detection</h1>
    <a href="../data/14-testing/03-performance-security-regression-testing.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Test Run Results</h2>
      <div class="results" id="results"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.runMultipleTimes()">Run 5x</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Runs: <strong id="runs">0</strong></div>
        <div>Pass Rate: <strong id="rate">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Flaky:</strong> Inconsistent results
      </div>
      <div class="info-text">
        <strong>Root cause:</strong> Timing/order
      </div>
      <div class="info-text">
        <strong>Fix:</strong> Isolate & stabilize
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { runs: [] },
      init() { this.render(); },
      runMultipleTimes() {
        this.state.runs = [];
        for(let i = 0; i < 5; i++) {
          // Flaky: 60% pass rate
          this.state.runs.push(Math.random() > 0.4);
        }
        this.render();
      },
      reset() { this.state.runs = []; this.render(); },
      render() {
        const resultsDiv = document.getElementById('results');
        if(this.state.runs.length) {
          resultsDiv.innerHTML = this.state.runs.map((pass, i) => `
            <div class="run ${pass ? 'pass' : 'fail'}">
              Run ${i+1}: ${pass ? '✓ Pass' : '✗ Fail'}
            </div>
          `).join('');
          const passed = this.state.runs.filter(r => r).length;
          const rate = Math.floor(passed / this.state.runs.length * 100);
          document.getElementById('runs').textContent = this.state.runs.length;
          document.getElementById('rate').textContent = rate === 100 ? 'Stable' : rate >= 80 ? 'Flaky' : 'Very Flaky';
        } else {
          resultsDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Click "Run 5x"</div>';
          document.getElementById('runs').textContent = '0';
          document.getElementById('rate').textContent = '-';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
