<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident Severity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .severities { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .severity { padding: 12px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .sev1 { border-left-color: #dc2626; background: rgba(220, 38, 38, 0.1); }
    .sev2 { border-left-color: #ea580c; background: rgba(234, 88, 12, 0.1); }
    .sev3 { border-left-color: #fbbf24; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Incident Severity</h1>
    <a href="../data/16-production-incidents/01-incident-postmortems-case-studies.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Severity Levels</h2>
      <div class="severities" id="severities"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Show Levels</label>
        <button onclick="app.showLevels()">Load</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Levels: <strong id="levels">0</strong></div>
        <div>Response Time: <strong id="response">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Sev 1:</strong> Complete outage
      </div>
      <div class="info-text">
        <strong>Sev 2:</strong> Degraded service
      </div>
      <div class="info-text">
        <strong>Sev 3:</strong> Minor issue
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { shown: false },
      levels: [
        {sev: 'Sev 1', desc: 'Critical outage - No service', response: '15min'},
        {sev: 'Sev 2', desc: 'Degraded - Some users affected', response: '30min'},
        {sev: 'Sev 3', desc: 'Minor issue - Limited impact', response: '2hours'}
      ],
      init() { this.render(); },
      showLevels() { this.state.shown = true; this.render(); },
      reset() { this.state.shown = false; this.render(); },
      render() {
        const sevDiv = document.getElementById('severities');
        if(this.state.shown) {
          sevDiv.innerHTML = this.levels.map((l, i) => {
            const classMap = ['sev1', 'sev2', 'sev3'];
            return `<div class="severity ${classMap[i]}">
              ${l.sev}: ${l.desc} (${l.response})
            </div>`;
          }).join('');
          document.getElementById('levels').textContent = this.levels.length;
          document.getElementById('response').textContent = '15min (Sev 1)';
        } else {
          sevDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Click "Load"</div>';
          document.getElementById('levels').textContent = '0';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
