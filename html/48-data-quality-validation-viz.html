<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Quality & Validation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .checks { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .check { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 12px; display: flex; justify-content: space-between; }
    .check.pass { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .check.fail { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Data Quality & Validation</h1>
    <a href="../data/02-data-engineering/data-quality-governance/01-data-governance.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Data Quality Checks</h2>
      <div class="checks" id="checks"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.runChecks()">Run Validation</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Checks: <strong id="checks_count">0/6</strong></div>
        <div>Quality: <strong id="quality">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Schema:</strong> Type & structure validation
      </div>
      <div class="info-text">
        <strong>Completeness:</strong> Null/missing checks
      </div>
      <div class="info-text">
        <strong>Uniqueness:</strong> Duplicate detection
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { running: false, passed: 0 },
      checks: [
        {name: 'Schema validation', pass: true},
        {name: 'Completeness check', pass: true},
        {name: 'Uniqueness check', pass: true},
        {name: 'Range validation', pass: false},
        {name: 'Referential integrity', pass: true},
        {name: 'Freshness check', pass: true}
      ],
      init() { this.render(); },
      runChecks() { this.state.running = true; this.state.passed = this.checks.filter(c => c.pass).length; this.render(); },
      reset() { this.state = { running: false, passed: 0 }; this.render(); },
      render() {
        const checksDiv = document.getElementById('checks');
        checksDiv.innerHTML = this.state.running ? this.checks.map(c => `
          <div class="check ${c.pass ? 'pass' : 'fail'}">
            <span>${c.name}</span>
            <span>${c.pass ? '✓' : '✗'}</span>
          </div>
        `).join('') : '<div style="color:#94a3b8;text-align:center;padding:20px;">Click Run Validation</div>';
        document.getElementById('checks_count').textContent = this.state.running ? `${this.state.passed}/6` : '0/6';
        document.getElementById('quality').textContent = this.state.running ? (this.state.passed === 6 ? '✓ Pass' : '⚠ Issues') : '-';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
