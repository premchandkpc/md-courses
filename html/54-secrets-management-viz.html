<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secrets Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .vault { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .secret { padding: 10px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #ef4444; font-size: 11px; }
    .secret.rotated { border-left-color: #10b981; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Secrets Management</h1>
    <a href="../data/13-security/02-cryptography-tls-secrets-management.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Secret Vault</h2>
      <div class="vault" id="vault"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.rotateSecrets()">Rotate Secrets</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Secrets: <strong id="count">3</strong></div>
        <div>Rotated: <strong id="rotated">No</strong></div>
      </div>
      <div class="info-text">
        <strong>Vault:</strong> HashiCorp Vault
      </div>
      <div class="info-text">
        <strong>Rotation:</strong> Periodic secret updates
      </div>
      <div class="info-text">
        <strong>Audit:</strong> Track secret access
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { rotated: false },
      secrets: [
        {name: 'DB_PASSWORD'},
        {name: 'API_KEY'},
        {name: 'JWT_SECRET'}
      ],
      init() { this.render(); },
      rotateSecrets() { this.state.rotated = true; this.render(); },
      reset() { this.state.rotated = false; this.render(); },
      render() {
        const vaultDiv = document.getElementById('vault');
        vaultDiv.innerHTML = this.secrets.map(s => `
          <div class="secret ${this.state.rotated ? 'rotated' : ''}">
            ${this.state.rotated ? '↻ ' : '🔒 '} ${s.name}
          </div>
        `).join('');
        document.getElementById('rotated').textContent = this.state.rotated ? 'Yes' : 'No';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
