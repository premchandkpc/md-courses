<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helm Package Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .chart { background: #334155; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 3px solid #60a5fa; }
    .chart-name { font-weight: bold; margin-bottom: 8px; }
    .chart-detail { font-size: 11px; color: #cbd5e1; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Helm Package Management</h1>
    <a href="../data/07-kubernetes/08-gitops-operators.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Available Charts</h2>
      <div id="charts"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Action</label>
        <button onclick="app.install()">Install Chart</button>
        <button onclick="app.upgrade()">Upgrade</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Releases: <strong id="releases">0</strong></div>
        <div>Status: <strong id="status">Ready</strong></div>
      </div>
      <div class="info-text">
        <strong>Helm:</strong> Package manager for Kubernetes
      </div>
      <div class="info-text">
        <strong>Chart:</strong> Collection of manifests + values
      </div>
      <div class="info-text">
        <strong>Release:</strong> Deployed chart instance
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { releases: 0 },
      charts: [
        {name: 'prometheus', version: '1.5.0', use: 'Monitoring'},
        {name: 'nginx-ingress', version: '2.1.0', use: 'Ingress'},
        {name: 'postgresql', version: '3.0.0', use: 'Database'}
      ],
      init() { this.render(); },
      install() { this.state.releases++; this.render(); },
      upgrade() { if(this.state.releases > 0) { this.render(); } },
      reset() { this.state.releases = 0; this.render(); },
      render() {
        const chartsDiv = document.getElementById('charts');
        chartsDiv.innerHTML = this.charts.map(c => `
          <div class="chart">
            <div class="chart-name">${c.name}</div>
            <div class="chart-detail">Version: ${c.version}</div>
            <div class="chart-detail">Use: ${c.use}</div>
          </div>
        `).join('');
        document.getElementById('releases').textContent = this.state.releases;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
