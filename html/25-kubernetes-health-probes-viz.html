<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kubernetes Health Probes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .probe-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 20px 0; }
    .probe { background: #334155; padding: 15px; border-radius: 8px; border: 2px solid #64748b; text-align: center; }
    .probe h3 { margin-bottom: 10px; font-size: 12px; }
    .probe-status { font-size: 24px; margin: 10px 0; }
    .probe.healthy { border-color: #10b981; }
    .probe.unhealthy { border-color: #ef4444; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Kubernetes Health Probes</h1>
    <a href="../data/07-kubernetes/01-kubernetes-basics.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Pod Health Status</h2>
      <div class="probe-grid" id="probes"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Pod Status</label>
        <button onclick="app.setHealth('all')">All Healthy</button>
        <button onclick="app.setHealth('liveness')">Liveness Failed</button>
        <button onclick="app.setHealth('startup')">Startup Failed</button>
      </div>
      <div class="status">
        <div>Readiness: <strong id="readiness">✓ Ready</strong></div>
        <div>Action: <strong id="action">Receive traffic</strong></div>
      </div>
      <div class="info-text">
        <strong>Startup:</strong> App initialization
      </div>
      <div class="info-text">
        <strong>Liveness:</strong> Restart dead containers
      </div>
      <div class="info-text">
        <strong>Readiness:</strong> Ready for traffic
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { health: 'all' },
      init() { this.render(); },
      setHealth(h) { this.state.health = h; this.render(); },
      render() {
        const probes = document.getElementById('probes');
        const statuses = {
          startup: this.state.health !== 'startup',
          readiness: this.state.health !== 'liveness',
          liveness: this.state.health !== 'liveness'
        };
        probes.innerHTML = Object.entries(statuses).map(([name, healthy]) => `
          <div class="probe ${healthy ? 'healthy' : 'unhealthy'}">
            <h3>${name.charAt(0).toUpperCase() + name.slice(1)}</h3>
            <div class="probe-status">${healthy ? '✓' : '✗'}</div>
            <div style="font-size:11px;color:#cbd5e1;">${healthy ? 'Pass' : 'Fail'}</div>
          </div>
        `).join('');
        document.getElementById('readiness').textContent = statuses.readiness ? '✓ Ready' : '✗ Not Ready';
        document.getElementById('action').textContent = statuses.readiness ? 'Receive traffic' : 'Exclude from LB';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
