<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Major Incidents Case Study</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .cases { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .case { padding: 12px; background: #1e293b; margin: 8px 0; border-radius: 4px; border-left: 3px solid #60a5fa; font-size: 11px; }
    .case.selected { border-left-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Major Incidents Case Study</h1>
    <a href="../data/16-production-incidents/01-incident-postmortems-case-studies.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Notable Incidents</h2>
      <div class="cases" id="cases"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Select Case</label>
        <button onclick="app.select('aws')">AWS Outage</button>
        <button onclick="app.select('github')">GitHub</button>
        <button onclick="app.select('stripe')">Stripe</button>
      </div>
      <div class="status">
        <div>Selected: <strong id="selected">-</strong></div>
        <div>Duration: <strong id="duration">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Learn:</strong> From large incidents
      </div>
      <div class="info-text">
        <strong>Systems:</strong> Complex failures
      </div>
      <div class="info-text">
        <strong>Patterns:</strong> Common causes
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { selected: '' },
      cases: {
        'aws': {name: 'AWS US-East-1 Outage 2020', duration: '4+ hours', cause: 'Network management'},
        'github': {name: 'GitHub Database Incident 2012', duration: '24+ hours', cause: 'Primary/secondary desync'},
        'stripe': {name: 'Stripe Payment Processing 2011', duration: '2+ hours', cause: 'Resource exhaustion'}
      },
      init() { this.render(); },
      select(c) { this.state.selected = c; this.render(); },
      render() {
        const casesDiv = document.getElementById('cases');
        casesDiv.innerHTML = Object.keys(this.cases).map(key => {
          const c = this.cases[key];
          const isSelected = key === this.state.selected;
          return `<div class="case ${isSelected ? 'selected' : ''}">
            ${isSelected ? '→' : '•'} ${c.name}
          </div>`;
        }).join('');
        if(this.state.selected && this.cases[this.state.selected]) {
          const c = this.cases[this.state.selected];
          document.getElementById('selected').textContent = c.name;
          document.getElementById('duration').textContent = c.duration;
        } else {
          document.getElementById('selected').textContent = '-';
          document.getElementById('duration').textContent = '-';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
