<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observability Three Pillars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
    .pillar { background: #334155; padding: 15px; border-radius: 8px; border-top: 4px solid #60a5fa; text-align: center; }
    .pillar h3 { margin-bottom: 8px; font-size: 13px; }
    .pillar-detail { font-size: 11px; color: #cbd5e1; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Observability Three Pillars</h1>
    <a href="../data/14-sre-observability/monitoring/03-opentelemetry-tracing-observability-debugging.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Observability Pillars</h2>
      <div class="pillars" id="pillars"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>View</label>
        <button onclick="app.setPillar('metrics')">Metrics</button>
        <button onclick="app.setPillar('logs')">Logs</button>
        <button onclick="app.setPillar('traces')">Traces</button>
      </div>
      <div class="status">
        <div>Selected: <strong id="selected">All</strong></div>
        <div>Integration: <strong id="integration">Complete</strong></div>
      </div>
      <div class="info-text">
        <strong>Metrics:</strong> Quantitative aggregates
      </div>
      <div class="info-text">
        <strong>Logs:</strong> Raw event details
      </div>
      <div class="info-text">
        <strong>Traces:</strong> Request flow across services
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { pillar: 'all' },
      init() { this.render(); },
      setPillar(p) { this.state.pillar = p; this.render(); },
      render() {
        const pillarsDiv = document.getElementById('pillars');
        const pillars = [
          {name: 'Metrics', color: '#3b82f6', examples: 'CPU, Memory, RPS'},
          {name: 'Logs', color: '#fbbf24', examples: 'Events, Errors, Debug'},
          {name: 'Traces', color: '#10b981', examples: 'Latency, Dependencies'}
        ];
        pillarsDiv.innerHTML = pillars.map(p => `
          <div class="pillar" style="border-top-color:${p.color}">
            <h3>${p.name}</h3>
            <div class="pillar-detail">${p.examples}</div>
          </div>
        `).join('');
        document.getElementById('selected').textContent = this.state.pillar === 'all' ? 'All' : this.state.pillar.charAt(0).toUpperCase() + this.state.pillar.slice(1);
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
