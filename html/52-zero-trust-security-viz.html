<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero-Trust Security</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .trust-model { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
    .model { background: #334155; padding: 15px; border-radius: 8px; border-left: 4px solid #60a5fa; }
    .model h3 { margin-bottom: 8px; font-size: 12px; }
    .model-item { font-size: 11px; color: #cbd5e1; margin: 4px 0; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Zero-Trust Security</h1>
    <a href="../data/13-security/03-zero-trust-penetration-testing-security-culture.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Trust Models</h2>
      <div class="trust-model" id="models"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Model</label>
        <button onclick="app.setModel('perimeter')">Perimeter-based</button>
        <button onclick="app.setModel('zero-trust')">Zero-Trust</button>
      </div>
      <div class="status">
        <div>Model: <strong id="model">-</strong></div>
        <div>Trust Level: <strong id="trust">-</strong></div>
      </div>
      <div class="info-text">
        <strong>Never trust:</strong> Verify everything always
      </div>
      <div class="info-text">
        <strong>Microsegmentation:</strong> Least privilege access
      </div>
      <div class="info-text">
        <strong>MFA:</strong> Multiple authentication factors
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { model: '' },
      models: {
        perimeter: {
          name: 'Perimeter-based',
          items: ['Firewall at edge', 'Trust inside', 'Less granular control', 'Risk: lateral movement']
        },
        'zero-trust': {
          name: 'Zero-Trust',
          items: ['Verify all requests', 'No implicit trust', 'Microsegmentation', 'Minimal blast radius']
        }
      },
      init() { this.render(); },
      setModel(m) { this.state.model = m; this.render(); },
      render() {
        const modelsDiv = document.getElementById('models');
        if(this.state.model) {
          const m = this.models[this.state.model];
          modelsDiv.innerHTML = `
            <div class="model" style="border-left-color:#ef4444;">
              <h3>Perimeter-Based</h3>
              <div class="model-item">• Trust inside</div>
              <div class="model-item">• Firewall edge</div>
            </div>
            <div class="model" style="border-left-color:#10b981;">
              <h3>Zero-Trust</h3>
              <div class="model-item">• Verify always</div>
              <div class="model-item">• MFA/MPC required</div>
            </div>
          `;
          document.getElementById('model').textContent = m.name;
          document.getElementById('trust').textContent = this.state.model === 'zero-trust' ? 'Low (verify all)' : 'High (inside)';
        } else {
          modelsDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:20px;">Select a model</div>';
        }
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
