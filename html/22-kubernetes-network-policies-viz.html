<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kubernetes Network Policies</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    svg { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Kubernetes Network Policies</h1>
    <a href="../data/07-kubernetes/03-kubernetes-networking.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas"><svg></svg></div>
    <div class="controls">
      <div class="control-group">
        <label>Policy</label>
        <button onclick="app.setPolicy('allow-all')">Allow All</button>
        <button onclick="app.setPolicy('deny-all')">Deny All</button>
        <button onclick="app.setPolicy('selective')">Selective</button>
      </div>
      <div class="status">
        <div>Policy: <strong id="policy">Allow All</strong></div>
        <div>Allowed: <strong id="allowed">3/3</strong></div>
      </div>
      <div class="info-text">
        <strong>NetworkPolicy:</strong> Ingress/egress rules
      </div>
      <div class="info-text">
        <strong>Selectors:</strong> Pod and namespace labels
      </div>
      <div class="info-text">
        <strong>Default deny:</strong> Zero-trust networking
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { policy: 'allow-all' },
      init() { this.svg = d3.select('svg'); this.render(); },
      setPolicy(p) { this.state.policy = p; this.render(); },
      render() {
        const width = this.svg.node().parentElement.clientWidth;
        const height = this.svg.node().parentElement.clientHeight;
        this.svg.selectAll('*').remove();

        const pods = [{x: 100, y: height/4, color: this.state.policy === 'deny-all' ? '#ef4444' : '#10b981'},
                      {x: 100, y: height/2, color: this.state.policy === 'deny-all' ? '#ef4444' : '#10b981'},
                      {x: 100, y: 3*height/4, color: this.state.policy === 'deny-all' ? '#ef4444' : '#10b981'}];

        pods.forEach(p => {
          this.svg.append('circle').attr('cx', p.x).attr('cy', p.y).attr('r', 20).attr('fill', p.color);
          this.svg.append('text').attr('x', p.x).attr('y', p.y+3).attr('text-anchor', 'middle').attr('fill', '#e2e8f0').attr('font-size', '11px').text('Pod');
        });

        if(this.state.policy === 'selective') {
          this.svg.append('line').attr('x1', 125).attr('y1', height/4).attr('x2', width-100).attr('y2', height/2).attr('stroke', '#10b981').attr('stroke-width', 2);
          this.svg.append('text').attr('x', width-100).attr('y', height/2-10).attr('fill', '#10b981').attr('font-size', '10px').text('✓ Allowed');
        }

        document.getElementById('policy').textContent = this.state.policy.replace('-', ' ').toUpperCase();
        document.getElementById('allowed').textContent = this.state.policy === 'allow-all' ? '3/3' : this.state.policy === 'selective' ? '1/3' : '0/3';
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
