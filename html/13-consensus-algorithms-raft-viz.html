<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consensus Algorithms & Raft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; }
    h1 { font-size: 24px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
    .node-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 20px 0; }
    .node { padding: 12px; background: #334155; border-radius: 6px; border-left: 4px solid #60a5fa; font-size: 11px; font-family: monospace; }
    .node.leader { border-left-color: #fbbf24; }
    .node.follower { border-left-color: #60a5fa; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Consensus Algorithms & Raft</h1>
    <a href="../data/09-distributed-systems/02-consensus-raft.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">Raft Consensus</h2>
      <div class="node-grid" id="nodes"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Simulation</label>
        <button onclick="app.elect()">Trigger Election</button>
        <button onclick="app.commitLog()">Commit Log Entry</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Leader: <strong id="leader">-</strong></div>
        <div>Term: <strong id="term">1</strong></div>
        <div>Committed: <strong id="committed">0</strong></div>
      </div>
      <div class="info-text">
        <strong>Raft:</strong> Consensus via leader election and log replication
      </div>
      <div class="info-text">
        <strong>Quorum:</strong> Need majority to commit entries (3/5 = 2 servers)
      </div>
      <div class="info-text">
        <strong>Fault tolerant:</strong> Survives N/2 failures
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { nodes: [{ role: 'follower', term: 1, log: 0 }, { role: 'leader', term: 1, log: 0 }, { role: 'follower', term: 1, log: 0 }, { role: 'follower', term: 1, log: 0 }, { role: 'follower', term: 1, log: 0 }], term: 1, committed: 0 },
      init() { this.render(); },
      elect() { this.state.term++; this.state.nodes.forEach((n, i) => { n.role = i === Math.floor(Math.random() * 5) ? 'leader' : 'follower'; n.term = this.state.term; }); this.render(); },
      commitLog() { const leader = this.state.nodes.find(n => n.role === 'leader'); if (leader) { leader.log++; this.state.committed++; } this.render(); },
      reset() { this.state = { nodes: [{ role: 'follower', term: 1, log: 0 }, { role: 'leader', term: 1, log: 0 }, { role: 'follower', term: 1, log: 0 }, { role: 'follower', term: 1, log: 0 }, { role: 'follower', term: 1, log: 0 }], term: 1, committed: 0 }; this.render(); },
      render() {
        const nodesDiv = document.getElementById('nodes');
        nodesDiv.innerHTML = this.state.nodes.map((n, i) => `
          <div class="node ${n.role}">
            Node ${i + 1} [${n.role.toUpperCase()}] Term: ${n.term} Log: ${n.log}
          </div>
        `).join('');
        const leader = this.state.nodes.find(n => n.role === 'leader');
        document.getElementById('leader').textContent = leader ? 'Node ' + (this.state.nodes.indexOf(leader) + 1) : 'None';
        document.getElementById('term').textContent = this.state.term;
        document.getElementById('committed').textContent = this.state.committed;
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
