<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grafana Dashboards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 24px; }
    .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; padding: 8px 12px; border: 1px solid #334155; border-radius: 4px; }
    .container { display: flex; height: calc(100vh - 60px); }
    #canvas { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); overflow: auto; padding: 20px; }
    .controls { width: 300px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .control-group { margin-bottom: 20px; }
    .control-group label { display: block; font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 8px; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
    .panel { background: #334155; padding: 12px; border-radius: 6px; border: 1px solid #64748b; }
    .panel-title { font-size: 11px; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
    .panel-value { font-size: 18px; font-weight: bold; color: #60a5fa; }
    .status { background: #334155; padding: 12px; border-radius: 6px; font-size: 12px; font-family: monospace; margin: 10px 0; }
    .info-text { font-size: 12px; color: #cbd5e1; line-height: 1.6; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🎨 Grafana Dashboards</h1>
    <a href="../data/14-sre-observability/monitoring/02-grafana-slos-alerting-incident-response.md" class="back-link">← Back to Notes</a>
  </header>
  <div class="container">
    <div id="canvas">
      <h2 style="margin-bottom: 20px;">System Dashboard</h2>
      <div class="dashboard" id="dashboard"></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Update</label>
        <button onclick="app.update()">Refresh Metrics</button>
        <button onclick="app.reset()">Reset</button>
      </div>
      <div class="status">
        <div>Uptime: <strong id="uptime">99.9%</strong></div>
        <div>Alerts: <strong id="alerts">0</strong></div>
      </div>
      <div class="info-text">
        <strong>Dashboards:</strong> Visualize Prometheus metrics
      </div>
      <div class="info-text">
        <strong>Graphs:</strong> Time series visualization
      </div>
      <div class="info-text">
        <strong>Alerts:</strong> Threshold-based notifications
      </div>
    </div>
  </div>
  <script>
    const app = {
      state: { uptime: 99.9, alerts: 0, cpu: 45, mem: 62, latency: 125, errors: 2 },
      init() { this.render(); },
      update() { this.state = { uptime: 99.9 + Math.random(), alerts: Math.floor(Math.random() * 3), cpu: 40 + Math.random() * 20, mem: 55 + Math.random() * 25, latency: 100 + Math.random() * 50, errors: Math.floor(Math.random() * 5) }; this.render(); },
      reset() { this.state = { uptime: 99.9, alerts: 0, cpu: 45, mem: 62, latency: 125, errors: 2 }; this.render(); },
      render() {
        const dashboard = document.getElementById('dashboard');
        dashboard.innerHTML = `
          <div class="panel">
            <div class="panel-title">CPU Usage</div>
            <div class="panel-value">${Math.round(this.state.cpu)}%</div>
          </div>
          <div class="panel">
            <div class="panel-title">Memory</div>
            <div class="panel-value">${Math.round(this.state.mem)}%</div>
          </div>
          <div class="panel">
            <div class="panel-title">Latency</div>
            <div class="panel-value">${Math.round(this.state.latency)}ms</div>
          </div>
          <div class="panel">
            <div class="panel-title">Errors/min</div>
            <div class="panel-value">${Math.floor(this.state.errors)}</div>
          </div>
        `;
        document.getElementById('uptime').textContent = this.state.uptime.toFixed(1) + '%';
        document.getElementById('alerts').textContent = Math.floor(this.state.alerts);
      }
    };
    window.addEventListener('load', () => app.init());
  </script>
</body>
</html>
